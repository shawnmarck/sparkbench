# Generated by spark-inference recipe scaffold (microsoft-phi-4-eugr)
recipe_version: "1"
name: microsoft-phi-4-eugr
description: eugr vLLM serve for microsoft/phi-4

model: phi-4
container: vllm-node

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 16384
  max_num_seqs: 4
  max_num_batched_tokens: 8192

command: |
  vllm serve /models/microsoft/phi-4/hf \
    --host {host} \
    --port {port} \
    --served-model-name phi-4 \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --kv-cache-dtype auto \
    --attention-backend flashinfer \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --load-format fastsafetensors
