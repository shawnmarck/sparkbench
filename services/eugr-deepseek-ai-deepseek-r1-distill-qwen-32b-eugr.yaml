recipe_version: '1'
name: deepseek-ai-deepseek-r1-distill-qwen-32b-eugr
description: eugr vLLM serve for deepseek-ai/deepseek-r1-distill-qwen-32b
model: deepseek-r1-distill-qwen-32b
container: vllm-node
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 131072
  max_num_seqs: 4
  max_num_batched_tokens: 8192
command: "vllm serve /models/deepseek-ai/deepseek-r1-distill-qwen-32b/hf \\\n  --host\
  \ {host} \\\n  --port {port} \\\n  --served-model-name deepseek-r1-distill-qwen-32b\
  \ \\\n  --tensor-parallel-size {tensor_parallel} \\\n  --trust-remote-code \\\n\
  \  --kv-cache-dtype auto \\\n  --attention-backend flashinfer \\\n  --gpu-memory-utilization\
  \ {gpu_memory_utilization} \\\n  --max-model-len {max_model_len} \\\n  --max-num-seqs\
  \ {max_num_seqs} \\\n  --max-num-batched-tokens {max_num_batched_tokens} \\\n  --enable-chunked-prefill\
  \ \\\n  --enable-prefix-caching \\\n  --load-format fastsafetensors\n"
