recipe_version: '1'
name: empero-ai-qwythos-9b-claude-mythos-5-1m-eugr
description: eugr vLLM serve for empero-ai/qwythos-9b-claude-mythos-5-1m
model: qwythos-9b-claude-mythos-5-1m
container: vllm-node
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 799744
  max_num_seqs: 4
  max_num_batched_tokens: 8192
command: "vllm serve /models/empero-ai/qwythos-9b-claude-mythos-5-1m/hf \\\n  --host\
  \ {host} \\\n  --port {port} \\\n  --served-model-name qwythos-9b-claude-mythos-5-1m\
  \ \\\n  --tensor-parallel-size {tensor_parallel} \\\n  --trust-remote-code \\\n\
  \  --kv-cache-dtype fp8 \\\n  --gpu-memory-utilization {gpu_memory_utilization}\
  \ \\\n  --max-model-len {max_model_len} \\\n  --max-num-seqs {max_num_seqs} \\\n\
  \  --max-num-batched-tokens {max_num_batched_tokens} \\\n  --enable-chunked-prefill\
  \ \\\n  --enable-prefix-caching \\\n  --load-format auto\n"
