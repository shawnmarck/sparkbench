# Laguna S 2.1 NVFP4 baseline (no DFlash) — same serve knobs as dflash recipe
# minus speculative-config, for apples-to-apples PBM comparison.
recipe_version: "1"
name: poolside-laguna-s-2-1-eugr
description: eugr vLLM serve for poolside/laguna-s-2.1 (NVFP4, no speculative)

model: laguna-s-2.1
container: vllm-node

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 8192

command: |
  vllm serve /models/poolside/laguna-s-2.1/nvfp4 \
    --host {host} \
    --port {port} \
    --served-model-name laguna-s-2.1 \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --kv-cache-dtype auto \
    --attention-backend flashinfer \
    --moe-backend marlin \
    --enable-auto-tool-choice \
    --tool-call-parser poolside_v1 \
    --reasoning-parser poolside_v1 \
    --default-chat-template-kwargs '{{"enable_thinking": true}}' \
    --override-generation-config '{{"temperature": 0.7, "top_p": 0.95}}' \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --load-format auto
