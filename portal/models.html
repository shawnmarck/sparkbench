      if (recipe.lifecycle === 'testing') { const sv = model.spark_verify || {}; const st = sv.spark_status || 'unverified'; if (st === 'unverified') model.spark_verify = { ...sv, spark_status: 'wip' }; }
      applyFilters();
      refreshPane();
    }
    function removeRecipeFromModel(profileId) {
      for (const model of all) {
        const profiles = model.inference_profiles;
        if (!profiles || !profiles.some((p) => p.id === profileId)) continue;
        model.inference_profiles = profiles.filter((p) => p.id !== profileId);
        applyFilters(); refreshPane(); return;
      }
    }

    /* ── API ACTIONS ─────────────────────────────────────── */
    async function recipeApi(path, body, btn) {
      btn.disabled = true; btn.classList.add('busy');
      try {
        const res = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ confirm: true, ...body }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        if (data.recipe) patchRecipeOnModel(data.recipe);
        else if (path.includes('/discard') && body.profile) removeRecipeFromModel(body.profile);
        await refreshInferenceStatus();
        setTimeout(() => loadData(true).catch(() => {}), 2000);
        return data;
      } catch (err) { alert(err.message); return null; }
      finally { btn.disabled = false; btn.classList.remove('busy'); }
    }

    async function startProfile(profileId, tier, btn) {
      if (tier === 'heavy') { if (!confirm('Heavy profile ("' + profileId + '") may take several minutes to load.\n\nContinue?')) return; }
      btn.disabled = true; btn.classList.add('busy');
      try {
        const body = { profile: profileId, confirm: true };
        if (tier === 'heavy') body.confirm_heavy = true;
        const res = await fetch('/api/inference/switch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        await refreshInferenceStatus();
        applyFilters();
        gotoInference({ profile: profileId, infLogFocus: true });
      } catch (err) { alert(err.message); }
      finally { btn.disabled = false; btn.classList.remove('busy'); }
    }

    async function setSparkVerify(path, spark_status, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, spark_status }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters(); refreshPane();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function setRemovalQueue(path, pending, btn) {
      const scope = btn.dataset.scope || 'local';
      const shelfAlso = pending && scope === 'both';
      if (pending && btn.dataset.shelf === '—') {
        if (!confirm(`"${btn.dataset.name}" is NOT on NAS shelf.\n\nQueue ${btn.dataset.local} for local deletion anyway?`)) return;
      } else if (pending && shelfAlso) {
        if (!confirm(`Queue FULL removal for "${btn.dataset.name}"?\n\nDeletes local (${btn.dataset.local}) AND NAS (${btn.dataset.shelf}) at 03:00.`)) return;
      } else if (pending) {
        if (!confirm(`Queue LOCAL removal for "${btn.dataset.name}" (${btn.dataset.local})?\n\nPurges at 03:00. NAS copy (${btn.dataset.shelf}) is kept.`)) return;
      }
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/removal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, pending, shelf: shelfAlso }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters(); refreshPane();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function modelAction(action, path, btn, extra) {
      if (activeJob.running) return;
      if (action === 'remove-local') {
        const msg = btn.dataset.shelf && btn.dataset.shelf !== '—'
          ? `Delete "${btn.dataset.name}" (${btn.dataset.local}) NOW?\n\nNAS copy (${btn.dataset.shelf}) is kept.`
          : `WARNING: "${btn.dataset.name}" is NOT on NAS.\n\nDelete ${btn.dataset.local} immediately?`;
        if (!confirm(msg)) return;
      }
      if (action === 'fetch' && !confirm(`Download golden weights for ${path} from Hugging Face?\n\nThis may take a long time for large models.`)) return;
      btn.disabled = true; btn.classList.add('busy');
      try {
        const url = action === 'fetch' ? '/api/models/fetch' : '/api/shelf/' + action;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, confirm: true, ...extra }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        await refreshShelfStatus();
        startJobPoll();
      } catch (err) { alert(err.message); btn.disabled = false; btn.classList.remove('busy'); }
    }

    function startJobPoll() {
      if (jobTimer) return;
      jobTimer = setInterval(async () => {
        await refreshShelfStatus();
        if (!activeJob.running) { clearInterval(jobTimer); jobTimer = null; loadData(true).catch(() => {}); }
      }, JOB_POLL_MS);
    }

    async function refreshShelfStatus() {
      try {
        const res = await fetch('/api/shelf/status', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        shelfMounted = !!data.shelf_mounted;
        activeJob = data.job || { running: false };
        $('shelf-meta').textContent = shelfMounted ? 'NAS online' : 'NAS offline';
        renderJobBanner();
        if (activeJob.running) startJobPoll();
      } catch (_) {}
    }

    /* ── FILTERS & PREFS ─────────────────────────────────── */
    function readPrefs() { try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { return {}; } }
    function savePrefs() {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        q: $('q').value, lab: $('lab').value, status: $('status').value,
        sparkFilters, tagFilter, hfTaskFilter, groupByFamily, sortCol, sortDir,
        visibleColumns: columnOverride ? [...columnOverride] : null,
      }));
    }

    function readSortPrefs(stored) {
      if (stored.sortCol) return { col: stored.sortCol, dir: stored.sortDir || 'asc' };
      const legacyMap = { 'newest': { col: 'release_date', dir: 'desc' }, 'oldest': { col: 'release_date', dir: 'asc' }, 'name-asc': { col: 'model', dir: 'asc' }, 'name-desc': { col: 'model', dir: 'desc' }, 'size-desc': { col: 'local', dir: 'desc' }, 'size-asc': { col: 'local', dir: 'asc' }, 'ctx-desc': { col: 'ctx', dir: 'desc' }, 'ctx-asc': { col: 'ctx', dir: 'asc' }, 'params-desc': { col: 'params', dir: 'desc' }, 'params-asc': { col: 'params', dir: 'asc' }, 'bench-desc': { col: 'bench', dir: 'desc' }, 'bench-asc': { col: 'bench', dir: 'asc' } };
      return legacyMap[stored.sort] || { col: 'release_date', dir: 'desc' };
    }

    function updateTagPickerButton() { const btn = $('tag-picker-btn'); if (!tagFilter.length) btn.textContent = 'All'; else if (tagFilter.length === 1) btn.textContent = formatTagLabel(tagFilter[0]); else btn.textContent = `${tagFilter.length} selected`; }
    function renderTagPickerList(available, query) {
      const list = $('tag-picker-list'); const q = (query || '').toLowerCase(); list.innerHTML = '';
      available.filter((t) => !q || formatTagLabel(t).toLowerCase().includes(q) || tagKey(t).includes(q)).forEach((tag) => {
        const k = tagKey(tag); const row = document.createElement('label'); row.className = 'tag-picker-item';
        row.innerHTML = `<input type="checkbox" value="${esc(k)}" ${tagFilter.includes(k) ? 'checked' : ''}><span>${esc(formatTagLabel(tag))}</span>`;
        row.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) { if (!tagFilter.includes(k)) tagFilter = [...tagFilter, k]; } else { tagFilter = tagFilter.filter((t) => t !== k); }
          updateTagPickerButton(); applyFilters();
        });
        list.appendChild(row);
      });
      if (!list.children.length) list.innerHTML = '<div class="tag-picker-item" style="cursor:default;color:var(--muted)">No matches</div>';
    }
    function setTagFilter(next) { tagFilter = [...next].map(tagKey); updateTagPickerButton(); renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value); applyFilters(); }
    function closeTagPicker() {
      unbindPickerMenuClamp();
      resetPickerMenuPosition($('tag-picker-menu'));
      $('tag-picker-menu').hidden = true;
      $('tag-picker-btn').setAttribute('aria-expanded', 'false');
    }
    function openTagPicker() {
      renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value);
      const picker = document.querySelector('.tag-filter-group .tag-picker');
      const menu = $('tag-picker-menu');
      menu.hidden = false;
      $('tag-picker-btn').setAttribute('aria-expanded', 'true');
      bindPickerMenuClamp(picker, menu, { preferRight: false });
      $('tag-picker-search').focus();
    }

    function applyFilters() {
      const q = $('q').value.toLowerCase();
      const lab = $('lab').value, status = $('status').value;
      hfTaskFilter = tagKey($('hf-task').value);
      savePrefs();
      let filtered = all.filter(m => {
        if (lab && m.lab !== lab) return false;
        if (tagFilter.length && !tagFilter.every((t) => catalogTagSet(m).has(t))) return false;
        if (hfTaskFilter && tagKey(m.pipeline_tag) !== hfTaskFilter) return false;
        if (status && m.status !== status) return false;
        if (!modelMatchesSparkFilter(m)) return false;
        if (q) {
          const hay = [m.name, m.lab, m.slug, m.hf_repo, m.why_downloaded, modelSummary(m), m.pipeline_tag, ...catalogCapabilities(m), ...notableHfTags(m)].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      filtered = sortModels(filtered);
      const queuedTotal = all.filter(removalPending).length;
      const queuedPart = queuedTotal ? ` · ${queuedTotal} pending delete` : '';
      const filterBits = [];
      if (tagFilter.length) filterBits.push(tagFilter.map((t) => formatTagLabel(t)).join(' + '));
      if (hfTaskFilter) filterBits.push(formatTagLabel(hfTaskFilter));
      const tagPart = filterBits.length ? ` · ${filterBits.join(' · ')}` : '';
      const dateStr = window.__generated ? `${fmtDate(window.__generated)} ${fmtTime(window.__generated)}` : '';
      const suffix = `${tagPart}${queuedPart}${dateStr ? ' · updated ' + dateStr : ''}`.trim();
      if (window.SparkInventoryGrid) {
        SparkInventoryGrid.renderSummary($('summary'), { filtered: filtered.length, total: all.length, suffix });
      } else {
        $('summary').textContent = `Showing ${filtered.length} of ${all.length} ${suffix}`;
      }
      $('summary').classList.toggle('meta-danger', !!queuedTotal);
      render(filtered);
      // close pane if selected model no longer in filtered set
      if (selectedModelId && !filtered.some(m => m.id === selectedModelId)) closePane();
      else updateSelectedRow();
    }

    function populateFilters(models, preserve) {
      const stored = readPrefs();
      const storedTags = (stored.tagFilter || (stored.cap ? [stored.cap] : [])).map(tagKey);
      const prev = preserve ? {
        lab: $('lab').value, status: $('status').value, hfTaskFilter,
        q: $('q').value, sparkFilters, tagFilter, groupByFamily,
        sortCol, sortDir,
      } : {
        sparkFilters: loadSparkFilters(stored),
        q: stored.q || '', lab: stored.lab || '', status: stored.status || '',
        tagFilter: storedTags, hfTaskFilter: tagKey(stored.hfTaskFilter || ''),
        groupByFamily: !!stored.groupByFamily,
        ...readSortPrefs(stored),
      };
      const fill = (id, key, items, fn) => {
        const el = $(id), first = el.options[0].outerHTML;
        el.innerHTML = first;
        items.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = fn ? fn(v) : v; el.appendChild(o); });
        if (prev[key] && [...el.options].some(o => o.value === prev[key])) el.value = prev[key];
      };
      fill('lab', 'lab', [...new Set(models.map(m => m.lab))].sort(), v => v.split(/[-_]/).map(w => w[0].toUpperCase() + w.slice(1)).join(' '));
      fill('status', 'status', [...new Set(models.map(m => m.status))].sort(), null);
      fill('hf-task', 'hfTaskFilter', collectHfTasks(models), (v) => formatTagLabel(v));
      const catalogKeys = new Set(collectCatalogTags(models).map(tagKey));
      tagFilter = (prev.tagFilter || []).map(tagKey).filter((k) => catalogKeys.has(k));
      hfTaskFilter = prev.hfTaskFilter || '';
      if (hfTaskFilter && ![...$('hf-task').options].some((o) => o.value === hfTaskFilter)) hfTaskFilter = '';
      $('hf-task').value = hfTaskFilter;
      updateTagPickerButton();
      renderTagPickerList(collectCatalogTags(models), '');
      $('q').value = prev.q || '';
      sparkFilters = prev.sparkFilters || [];
      groupByFamily = !!prev.groupByFamily;
      if (prev.sortCol) { sortCol = prev.sortCol; sortDir = prev.sortDir || 'asc'; }
      else if (prev.col) { sortCol = prev.col; sortDir = prev.dir || 'asc'; }
      loadColumnPrefs(stored);
      applyColumnVisibility();
      updateSparkFilterChips();
      updateViewChips();
    }

    function renderJobBanner() {
      const el = $('job-banner');
      if (!activeJob.running) { el.classList.remove('active'); el.textContent = ''; return; }
      const tail = (activeJob.log_tail || []).slice(-2).join(' · ');
      el.classList.add('active');
      el.textContent = `${jobLabels[activeJob.action] || activeJob.action} ${activeJob.path || '…'} (pid ${activeJob.pid})${tail ? ' — ' + tail : ''}`;
    }

    function scrollToHighlight() {
      if (!highlightPath) return;
      const row = document.querySelector(`tr.model-row[data-path="${CSS.escape(highlightPath)}"]`);
      if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    /* ── EVENT HANDLERS ──────────────────────────────────── */

    // Table: row clicks + family group toggles
    $('models-tbody').addEventListener('click', (e) => {
      const familyHead = e.target.closest('tr.family-head-row');
      if (familyHead) {
        const key = familyHead.dataset.familyKey;
        if (!key) return;
        const collapsed = familyHead.classList.contains('collapsed');
        if (collapsed) { modelGroupsOpen.add(key); } else { modelGroupsOpen.delete(key); }
        familyHead.classList.toggle('collapsed', !collapsed);
        document.querySelectorAll(`tr.family-member[data-family-key="${CSS.escape(key)}"]`).forEach((tr) => { tr.hidden = !collapsed; });
        return;
      }
      const modelRow = e.target.closest('tr.model-row');
      if (modelRow) {
        const id = modelRow.dataset.id;
        if (!id) return;
        if (selectedModelId === id) { closePane(); return; }
        openPane(id);
        // open family group if in family view
        const familyKey = modelRow.dataset.familyKey;
        if (familyKey) modelGroupsOpen.add(familyKey);
        return;
      }
    });

    // Table thead: column sort
    $('models-thead').addEventListener('click', (e) => {
      const th = e.target.closest('th[data-sort-col]');
      if (th) handleColumnSort(th.dataset.sortCol);
    });

    // Pane: all actions
    $('model-detail-pane').addEventListener('click', (e) => {
      const vbtn = e.target.closest('[data-verify]');
      if (vbtn) { e.stopPropagation(); setSparkVerify(vbtn.dataset.path, vbtn.dataset.verify, vbtn); return; }
      const qbtn = e.target.closest('[data-action="queue-removal"]');
      if (qbtn && !qbtn.disabled) { e.stopPropagation(); setRemovalQueue(qbtn.dataset.path, qbtn.dataset.pending === '1', qbtn); return; }
      const scaffoldBtn = e.target.closest('[data-action="recipe-scaffold"]');
      if (scaffoldBtn && !scaffoldBtn.disabled) { e.stopPropagation(); recipeApi('/api/inference/recipes/scaffold', { inventory_path: scaffoldBtn.dataset.path, auto: true }, scaffoldBtn); return; }
      const testBtn = e.target.closest('[data-action="recipe-testing"]');
      if (testBtn && !testBtn.disabled) { e.stopPropagation(); recipeApi('/api/inference/recipes/testing', { profile: testBtn.dataset.profile }, testBtn); return; }
      const promoteBtn = e.target.closest('[data-action="recipe-promote"]');
      if (promoteBtn && !promoteBtn.disabled) { e.stopPropagation(); if (!confirm('Mark recipe "' + promoteBtn.dataset.profile + '" as works?')) return; recipeApi('/api/inference/recipes/promote', { profile: promoteBtn.dataset.profile }, promoteBtn); return; }
      const discardBtn = e.target.closest('[data-action="recipe-discard"]');
      if (discardBtn && !discardBtn.disabled) { e.stopPropagation(); if (!confirm('Discard draft recipe "' + discardBtn.dataset.profile + '"?')) return; recipeApi('/api/inference/recipes/discard', { profile: discardBtn.dataset.profile }, discardBtn); return; }
      const sbtn = e.target.closest('[data-action="start-profile"]');
      if (sbtn && !sbtn.disabled) { e.stopPropagation(); startProfile(sbtn.dataset.profile, sbtn.dataset.tier, sbtn); return; }
      const noteBtn = e.target.closest('[data-action="bench-note-save"]');
      if (noteBtn && !noteBtn.disabled) { e.stopPropagation(); const row = noteBtn.closest('td'); const input = row ? row.querySelector('.bench-note-input') : null; const note = input ? input.value.trim() : ''; saveBenchNote(noteBtn.dataset.profile, noteBtn.dataset.runId, note, noteBtn); return; }
      const btn = e.target.closest('[data-action]');
      if (!btn || btn.disabled) return;
      e.stopPropagation();
      const extra = (btn.dataset.action === 'remove-local' && (!btn.dataset.shelf || btn.dataset.shelf === '—')) ? { force: true } : {};
      modelAction(btn.dataset.action, btn.dataset.path, btn, extra);
    });

    // Pane: bench history toggle
    $('model-detail-pane').addEventListener('toggle', (e) => {
      const det = e.target.closest('details.bench-history');
      if (!det || !det.dataset.profile || !det.isConnected) return;
      if (det.open) {
        benchHistoryOpen.add(det.dataset.profile);
        loadBenchHistory(det, { force: !benchHistoryCache[det.dataset.profile] });
      } else {
        benchHistoryOpen.delete(det.dataset.profile);
      }
    }, true);

    // Pane close button + keyboard
    $('pane-close').addEventListener('click', () => closePane());
    $('pane-backdrop').addEventListener('click', () => closePane());
    document.addEventListener('keydown', (e) => {
      if (!selectedModelId || paneInputFocused()) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        closePane();
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        navigatePane(1);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        navigatePane(-1);
      }
    });

    // Controls
    let filterDebounce = null;
    function scheduleApplyFilters() { clearTimeout(filterDebounce); filterDebounce = setTimeout(() => applyFilters(), 120); }
    $('q').addEventListener('input', scheduleApplyFilters);
    $('q').addEventListener('change', applyFilters);
    ['lab', 'status', 'hf-task'].forEach(id => {
      $(id).addEventListener('input', applyFilters);
      $(id).addEventListener('change', applyFilters);
    });
    $('filter-chips').addEventListener('click', (e) => {
      const groupChip = e.target.closest('[data-group]');
      if (groupChip) { setGroupByFamily(groupChip.dataset.group === 'family'); return; }
      const sparkChip = e.target.closest('[data-spark]');
      if (sparkChip) toggleSparkFilter(sparkChip.dataset.spark);
    });
    $('tag-picker-btn').addEventListener('click', (e) => { e.stopPropagation(); if ($('tag-picker-menu').hidden) openTagPicker(); else closeTagPicker(); });
    $('tag-picker-clear').addEventListener('click', () => setTagFilter([]));
    $('tag-picker-done').addEventListener('click', () => closeTagPicker());
    $('tag-picker-search').addEventListener('input', (e) => renderTagPickerList(collectCatalogTags(all), e.target.value));
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.tag-picker')) closeTagPicker();
      if (!e.target.closest('.col-picker')) closeColPicker();
    });

    $('col-picker-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if ($('col-picker-menu').hidden) openColPicker();
      else closeColPicker();
    });
    $('col-picker-reset').addEventListener('click', () => resetColumnPrefs());
    $('col-picker-done').addEventListener('click', () => closeColPicker());
    initColumnLayoutObserver();

    /* ── DATA LOADING ────────────────────────────────────── */
    function loadData(preserve) {
      return fetch('models.json?' + Date.now(), { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          all = data.models || [];
          shelfMounted = !!data.shelf_mounted;
          window.__generated = data.generated_at;
          if (highlightPath) {
            const hit = all.find((m) => m.rel_path === highlightPath || m.id === highlightPath);
            if (hit) {
              selectedModelId = hit.id;
              modelGroupsOpen.add(modelFamilyKey(hit));
            }
          }
          populateFilters(all, preserve);
          applyFilters();
          if (highlightPath && selectedModelId) openPane(selectedModelId);
          else if (selectedModelId && !paneInputFocused()) refreshPane();
          refreshShelfStatus();
          refreshInferenceStatus();
        });
    }

    highlightPath = new URLSearchParams(location.search).get('highlight');

    loadData(false).catch(err => {
      $('summary').textContent = 'Failed to load models.json';
      $('models-empty').textContent = String(err);
      $('models-empty').hidden = false;
    });
    pollTimer = setInterval(() => {
      if (document.visibilityState !== 'visible') return;
      loadData(true).catch(() => {});
    }, REFRESH_MS);
    infPollTimer = setInterval(() => refreshInferenceStatus(), INF_POLL_MS);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') { loadData(true).catch(() => {}); refreshInferenceStatus(); }
    });
  </script>
</body>
</html>
