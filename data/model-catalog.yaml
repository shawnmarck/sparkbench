# Canonical metadata for Spark model inventory.
# Disk scan merges actual sizes + status. HF API fills release date / description when missing.
# Regenerate dashboard: spark-inventory-build

models:
  - id: nvidia/qwen3.6-35b-a3b-nvfp4
    lab: nvidia
    name: Qwen3.6-35B-A3B (NVFP4)
    slug: qwen3.6-35b-a3b
    hf_repo: nvidia/Qwen3.6-35B-A3B-NVFP4
    capabilities: [general, moe, multimodal, vllm, nvfp4, agentic]
    why_downloaded: >
      Your requested flagship Qwen3.6 MoE (~3B active / 35B total). NVIDIA NVFP4 build
      is the native Spark/Blackwell vLLM path — primary production inference target.
    variants:
      - format: nvfp4
        subpath: nvfp4
        engine: vllm
        hf_repo: nvidia/Qwen3.6-35B-A3B-NVFP4

  - id: unsloth/qwen3.6-35b-a3b-gguf
    lab: unsloth
    name: Qwen3.6-35B-A3B (GGUF)
    slug: qwen3.6-35b-a3b
    hf_repo: unsloth/Qwen3.6-35B-A3B-GGUF
    capabilities: [general, moe, llamacpp, gguf, agentic]
    why_downloaded: >
      Same Qwen3.6 base model for llama.cpp bake-off. Q4_K_M + MXFP4_MOE quants only
      (full Unsloth repo is ~550GB).
    variants:
      - format: gguf
        subpath: gguf
        engine: llamacpp
        hf_repo: unsloth/Qwen3.6-35B-A3B-GGUF
        note: Q4_K_M + MXFP4_MOE

  - id: nvidia/qwen3-30b-a3b
    lab: nvidia
    name: Qwen3-30B-A3B
    slug: qwen3-30b-a3b
    hf_repo: nvidia/Qwen3-30B-A3B-NVFP4
    capabilities: [general, moe, fast, vllm, nvfp4, tool-calling]
    why_downloaded: >
      Faster MoE sibling for interactive agent loops — lower latency and memory
      pressure when max intelligence isn't required.
    variants:
      - format: nvfp4
        subpath: nvfp4
        engine: vllm
        hf_repo: nvidia/Qwen3-30B-A3B-NVFP4

  - id: nousresearch/hermes-4-14b
