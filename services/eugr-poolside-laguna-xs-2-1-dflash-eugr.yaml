# Laguna XS 2.1 + DFlash speculative (poolside) — manual scaffold 2026-07-08
recipe_version: "1"
name: poolside-laguna-xs-2-1-dflash-eugr
description: eugr vLLM DFlash speculative serve for poolside/laguna-xs-2.1

model: laguna-xs-2.1-dflash
container: vllm-node

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 32768

command: |
  vllm serve /models/poolside/laguna-xs-2.1/hf \
    --host {host} \
    --port {port} \
    --served-model-name laguna-xs-2.1-dflash \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --kv-cache-dtype auto \
    --attention-backend flash_attn \
    --enable-auto-tool-choice \
    --tool-call-parser poolside_v1 \
    --reasoning-parser poolside_v1 \
    --default-chat-template-kwargs '{{"enable_thinking": true}}' \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --load-format auto \
    --speculative-config '{{"method": "dflash", "model": "/models/poolside/laguna-xs-2.1-dflash/dflash", "num_speculative_tokens": 15}}'
