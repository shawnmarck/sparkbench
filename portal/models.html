<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sparky — Model Inventory</title>
  <link rel="stylesheet" href="/themes/theme-ui.css">
  <link rel="stylesheet" href="/themes/theme-b.css" id="theme-b-stylesheet" media="not all">
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var fromUrl = p.get('theme');
      if (fromUrl) localStorage.setItem('sparky-theme', fromUrl);
      var t = fromUrl || localStorage.getItem('sparky-theme') || 'a';
      if (t === 'b') {
        document.documentElement.classList.add('theme-b');
        document.getElementById('theme-b-stylesheet').media = 'all';
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #76b900;
      --border: #2a2f3a;
      --warn: #e8b84a;
      --ok: #6bc46d;
      --dl: #6eb5ff;
      --control-bg: #141820;
      --control-bg-hover: #171b24;
      --control-text: #c5cad3;
      --control-border: rgba(255, 255, 255, 0.07);
      --menu-bg: #12151c;
      --menu-hover: rgba(255, 255, 255, 0.04);
      --menu-border: rgba(255, 255, 255, 0.06);
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
    body.embedded .portal-link, body.embedded .page-head { display: none; }
    body.embedded main { padding-top: .85rem; }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    a { color: var(--accent); }
    .top { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; justify-content: space-between; margin-bottom: 1.25rem; }
    h1 { font-size: 1.5rem; margin: 0; }
    .sub { color: var(--muted); font-size: .9rem; margin: .25rem 0 0; }
    .controls { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; align-items: flex-end; }
    .control-group { display: flex; flex-direction: column; gap: .2rem; }
    .control-group label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    input, select {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      color: var(--control-text);
      border-radius: 8px;
      padding: .5rem .75rem;
      font-size: .9rem;
      transition: background .15s, border-color .15s;
    }
    input::placeholder { color: rgba(154, 160, 166, 0.75); }
    input:hover, select:hover { background: var(--control-bg-hover); border-color: rgba(255, 255, 255, 0.09); }
    input:focus, select:focus {
      outline: none;
      background: var(--control-bg-hover);
      border-color: rgba(255, 255, 255, 0.11);
      box-shadow: none;
    }
    select option, select optgroup {
      background: var(--menu-bg);
      color: var(--control-text);
    }
    input[type=search] { min-width: 180px; flex: 1; }
    .chip-row { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; width: 100%; }
    .chip-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: .15rem; }
    .chip { appearance: none; border: 1px solid var(--border); background: var(--card); color: #c5cdd8; font: inherit; font-size: .78rem; padding: .32rem .62rem; border-radius: 999px; cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
    .chip:hover { border-color: #3a4a2a; }
    .chip.active { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .chip.active.spark-works { border-color: #2a4a2a; background: #142014; color: var(--ok); }
    .chip.active.spark-failed { border-color: #4a2a2a; background: #241414; color: #e8a0a0; }
    .chip.active.spark-wip { border-color: #2a3a4a; background: #141c24; color: var(--dl); }
    .chip.active.spark-queued { border-color: #4a402a; background: #241c10; color: var(--warn); }
    .meta-warn { color: var(--warn); }
    .meta { color: var(--muted); font-size: .82rem; margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .model-list { display: flex; flex-direction: column; gap: .35rem; }
    .model-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .model-row.queued { border-left: 3px solid var(--warn); }
    .model-row.open { border-color: #3a4a3a; }
    .row-main { width: 100%; display: grid; grid-template-columns: 1fr auto auto; gap: .5rem 1rem; align-items: center; padding: .65rem .85rem; background: transparent; border: 0; color: inherit; font: inherit; text-align: left; cursor: pointer; }
    .row-main:hover { background: #12151c; }
    .row-title { min-width: 0; }
    .row-title strong { display: block; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-title code { font-size: .74rem; color: var(--muted); }
    .row-badges { display: flex; flex-wrap: wrap; gap: .3rem; justify-content: flex-end; }
    .row-meta { grid-column: 1 / -1; font-size: .76rem; color: var(--muted); font-family: ui-monospace, monospace; display: flex; flex-wrap: wrap; gap: .65rem 1rem; }
    .row-meta b { color: #c5cdd8; font-weight: 500; }
    .chevron { color: var(--muted); font-size: .85rem; transition: transform .15s; }
    .model-row.open .chevron { transform: rotate(90deg); }
    .row-detail { display: none; padding: 0 .85rem .85rem; border-top: 1px solid var(--border); }
    .model-row.open .row-detail { display: block; }
    .badge { font-size: .7rem; padding: .12rem .4rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
    .badge.cap { border-color: #3a4a2a; color: #b8d88a; }
    .badge.hf-task { border-color: #3a4a5a; color: #9ec8ff; font-weight: 500; }
    .tag-block { padding: .6rem .75rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); font-size: .82rem; line-height: 1.45; }
    .tag-line { display: flex; gap: .55rem; align-items: baseline; margin-top: .35rem; }
    .tag-line:first-child { margin-top: 0; }
    .tag-line-label { flex-shrink: 0; width: 5.5rem; font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .tag-line-val { color: #c8cdd4; min-width: 0; }
    .tag-more { margin-top: .45rem; font-size: .76rem; color: var(--muted); line-height: 1.4; }
    .tag-more summary { cursor: pointer; color: #9aa0a6; list-style: none; }
    .tag-more summary::-webkit-details-marker { display: none; }
    .tag-more summary::before { content: '▸ '; font-size: .7rem; }
    .tag-more[open] summary::before { content: '▾ '; }
    .tag-picker { position: relative; }
    .tag-picker-btn {
      min-width: 7.5rem;
      text-align: left;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      color: var(--control-text);
      border-radius: 8px;
      padding: .5rem .75rem;
      font: inherit;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .tag-picker-btn:hover { background: var(--control-bg-hover); border-color: rgba(255, 255, 255, 0.09); }
    .tag-picker-btn[aria-expanded="true"] { background: var(--control-bg-hover); border-color: rgba(255, 255, 255, 0.1); }
    .tag-picker-menu {
      position: absolute;
      top: calc(100% + .25rem);
      left: 0;
      z-index: 12;
      min-width: 14rem;
      max-width: 18rem;
      max-height: 14rem;
      overflow: auto;
      padding: .4rem;
      border-radius: 10px;
      border: 1px solid var(--menu-border);
      background: var(--menu-bg);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.32);
    }
    .tag-picker-menu[hidden] { display: none; }
    .tag-picker-search {
      width: 100%;
      margin-bottom: .35rem;
      padding: .38rem .5rem;
      font-size: .82rem;
      background: rgba(0, 0, 0, 0.22);
      border-color: var(--menu-border);
      color: var(--control-text);
    }
    .tag-picker-item {
      display: flex;
      align-items: center;
      gap: .45rem;
      padding: .3rem .4rem;
      border-radius: 6px;
      font-size: .82rem;
      color: var(--control-text);
      cursor: pointer;
    }
    .tag-picker-item:hover { background: var(--menu-hover); }
    .tag-picker-item input { accent-color: #5a9200; }
    .tag-picker-foot { display: flex; justify-content: space-between; gap: .35rem; margin-top: .35rem; padding-top: .35rem; border-top: 1px solid var(--menu-border); }
    .tag-picker-foot button { appearance: none; border: 0; background: transparent; color: var(--muted); font: inherit; font-size: .74rem; cursor: pointer; padding: .15rem 0; }
    .tag-picker-foot button:hover { color: var(--accent); }
    .badge.status-ready { border-color: #2a4a2a; color: var(--ok); }
    .badge.status-downloading { border-color: #2a3a4a; color: var(--dl); }
    .badge.status-partial, .badge.status-missing, .badge.status-shelf-only { border-color: #4a402a; color: var(--warn); }
    .badge.spark-unverified { border-color: #3a3a3a; color: var(--muted); }
    .badge.spark-wip { border-color: #2a3a4a; color: var(--dl); }
    .badge.spark-works { border-color: #2a4a2a; color: var(--ok); }
    .badge.spark-failed { border-color: #4a2a2a; color: #e8a0a0; }
    .badge.queued { border-color: #4a402a; color: var(--warn); }
    .badge.engine-vllm { border-color: #2a3a5a; color: #9ec8ff; }
    .badge.engine-llamacpp { border-color: #3a4a2a; color: #b8d88a; }
    .release-est { opacity: .75; font-style: italic; }
    .detail-section { margin-top: .75rem; }
    .badges { display: flex; flex-wrap: wrap; gap: .35rem; }
    .storage { display: grid; gap: .45rem; padding: .65rem .75rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); }
    .storage-row { display: flex; flex-wrap: wrap; gap: .5rem .75rem; align-items: center; font-size: .82rem; }
    .storage-label { color: var(--muted); min-width: 5.5rem; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; }
    .loc-badge { display: inline-flex; align-items: center; gap: .35rem; padding: .18rem .5rem; border-radius: 999px; border: 1px solid var(--border); font-family: ui-monospace, monospace; font-size: .78rem; }
    .loc-badge.on { border-color: #2a4a2a; color: var(--ok); }
    .loc-badge.off { border-color: #3a3a3a; color: var(--muted); }
    .loc-badge.warn { border-color: #4a402a; color: var(--warn); }
    .actions { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .55rem; }
    .btn { appearance: none; border: 1px solid var(--border); background: #1a1f2a; color: var(--text); font: inherit; font-size: .8rem; padding: .38rem .7rem; border-radius: 8px; cursor: pointer; }
    .btn:hover:not(:disabled) { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary { border-color: #2a4a5a; color: var(--dl); }
    .btn.danger { border-color: #4a2a2a; color: #e8a0a0; }
    .btn.danger.active { border-color: #6a4040; background: #2a1810; color: var(--warn); }
    .btn.warn-outline { border-color: #4a402a; color: var(--warn); }
    .btn.busy { border-color: #4a402a; color: var(--warn); }
    .verify-row { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .verify-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: .15rem; }
    .btn.verify { font-size: .74rem; padding: .28rem .55rem; }
    .btn.verify.active-works { border-color: #2a4a2a; color: var(--ok); background: #142014; }
    .btn.verify.active-failed { border-color: #4a2a2a; color: #e8a0a0; background: #241414; }
    .btn.verify.active-wip { border-color: #2a3a4a; color: var(--dl); background: #141c24; }
    .btn.verify.active { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .verify-note, .queue-note { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: .35rem; }
    .badge.tok-s { border-color: #2a3a4a; color: #8ec8ff; }
    .why { font-size: .88rem; line-height: 1.45; color: #c8cdd4; padding: .6rem .75rem; background: #12151c; border-radius: 8px; border-left: 3px solid var(--accent); }
    .desc { font-size: .86rem; color: var(--muted); line-height: 1.45; }
    .variants table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .variants th, .variants td { text-align: left; padding: .35rem .4rem; border-top: 1px solid var(--border); }
    .variants th { color: var(--muted); font-weight: 500; }
    .empty { color: var(--muted); padding: 2rem; text-align: center; }
    code { background: #12151c; padding: .1rem .35rem; border-radius: 4px; font-size: .85em; }
    .job-banner { display: none; margin-bottom: 1rem; padding: .65rem .85rem; border-radius: 10px; border: 1px solid #2a3a4a; background: #121a24; color: #c5d4e8; font-size: .84rem; font-family: ui-monospace, monospace; }
    .job-banner.active { display: block; }
    @media (max-width: 640px) { .row-main { grid-template-columns: 1fr auto; } .row-badges { grid-column: 1 / -1; justify-content: flex-start; } }
    html.theme-b body { background: #000 !important; }
    html.theme-b body.embedded { height: 100%; min-height: 100%; }
    html.theme-b body.embedded .page-shell { min-height: 100%; }
    html.theme-b .page-shell > main { background: transparent; }
    body.embedded .theme-toggle-floating { display: none; }
  </style>
  <script>if (window.self !== window.top) document.documentElement.classList.add('embedded-pending');</script>
</head>
<body>
  <button type="button" class="theme-toggle theme-toggle-floating" id="theme-toggle" title="Nebula background" aria-label="Toggle nebula background">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle class="theme-toggle-ring" cx="12" cy="12" r="8.6" stroke="currentColor" stroke-width=".55" stroke-dasharray="3.5 16" fill="none"/>
      <circle class="theme-toggle-core" cx="12" cy="12" r="1.6" fill="currentColor"/>
      <g class="theme-toggle-orbit">
        <circle cx="7.2" cy="9" r="1" fill="currentColor" opacity=".75"/>
        <circle cx="17" cy="8.2" r="1" fill="currentColor" opacity=".75"/>
        <circle cx="15.2" cy="16" r=".9" fill="currentColor" opacity=".55"/>
        <circle cx="8.2" cy="15.4" r=".75" fill="currentColor" opacity=".45"/>
        <path d="M12 12L7.2 9M12 12L17 8.2M12 12L15.2 16M7.2 9L8.2 15.4" stroke="currentColor" stroke-width=".65" stroke-linecap="round" opacity=".35"/>
      </g>
    </svg>
  </button>
  <div class="page-shell">
    <div class="theme-b-nebula-wrap" id="theme-b-nebula-wrap" aria-hidden="true">
      <canvas id="theme-b-nebula-canvas"></canvas>
      <div class="scrim"></div>
    </div>
  <main>
    <div class="top page-head">
      <div>
        <h1>Model inventory</h1>
        <p class="sub">Compact list · expand for actions · removals purge nightly 03:00</p>
      </div>
      <a href="/" class="portal-link" target="_top">← Portal</a>
    </div>

    <div class="controls">
      <input type="search" id="q" placeholder="Search…" autocomplete="off" aria-label="Search">
      <div class="control-group">
        <label for="lab">Lab</label>
        <select id="lab"><option value="">All</option></select>
      </div>
      <div class="control-group">
        <label for="status">Download</label>
        <select id="status"><option value="">All</option></select>
      </div>
      <div class="control-group">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="name-asc">Name A→Z</option>
          <option value="name-desc">Name Z→A</option>
          <option value="size-desc">Largest on disk</option>
          <option value="size-asc">Smallest on disk</option>
          <option value="ctx-desc">Max context ↓</option>
          <option value="ctx-asc">Max context ↑</option>
          <option value="params-desc">Parameters ↓</option>
          <option value="params-asc">Parameters ↑</option>
          <option value="lab">Lab A→Z</option>
        </select>
      </div>
      <div class="control-group tag-filter-group">
        <label for="tag-picker-btn">Capabilities</label>
        <div class="tag-picker">
          <button type="button" class="tag-picker-btn" id="tag-picker-btn" aria-expanded="false" aria-haspopup="listbox">All</button>
          <div class="tag-picker-menu" id="tag-picker-menu" hidden>
            <input type="search" class="tag-picker-search" id="tag-picker-search" placeholder="Search…" autocomplete="off">
            <div class="tag-picker-list" id="tag-picker-list" role="listbox"></div>
            <div class="tag-picker-foot">
              <button type="button" id="tag-picker-clear">Clear</button>
              <button type="button" id="tag-picker-done">Done</button>
            </div>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label for="hf-task">HF task</label>
        <select id="hf-task"><option value="">All</option></select>
      </div>
      <div class="chip-row" id="spark-filter">
        <span class="chip-label">Spark</span>
        <button type="button" class="chip active" data-spark="">All</button>
        <button type="button" class="chip" data-spark="unverified">Untested</button>
        <button type="button" class="chip" data-spark="wip">Testing</button>
        <button type="button" class="chip" data-spark="works">Works</button>
        <button type="button" class="chip" data-spark="failed">Failed</button>
        <button type="button" class="chip" data-spark="queued">Queued</button>
      </div>
    </div>

    <div class="job-banner" id="job-banner"></div>
    <div class="meta">
      <span id="summary">Loading…</span>
      <span id="shelf-meta"></span>
      <span><span class="live-dot"></span> 30s refresh</span>
    </div>
    <div class="model-list" id="list"></div>
  </main>
  </div>
  <script src="/assets/sparky-theme.js"></script>
  <script>
    if (document.documentElement.classList.contains('embedded-pending')) {
      document.body.classList.add('embedded');
      document.documentElement.classList.remove('embedded-pending');
    }
    SparkyTheme.init();
  </script>
  <script>
    let all = [], shelfMounted = false, activeJob = { running: false };
    let expandedId = null, pollTimer = null, jobTimer = null;
    const REFRESH_MS = 30000, JOB_POLL_MS = 2000, PREFS_KEY = 'spark-models-filters';
    const sparkLabels = { unverified: 'Untested', wip: 'Testing', works: 'Works', failed: 'Failed' };
    const engineLabels = { vllm: 'vLLM', llamacpp: 'GGUF' };
    const jobLabels = { pull: 'Fetching', push: 'Pushing', 'remove-local': 'Deleting' };
    let sparkFilter = '';
    let tagFilter = [];
    let hfTaskFilter = '';
    const HF_NOISE = new Set(['transformers', 'safetensors', 'endpoints_compatible', 'text-generation-inference', 'eval-results', 'gguf', 'ggml']);

    const $ = (id) => document.getElementById(id);
    const tagKey = (t) => (t || '').toLowerCase();
    const formatTagLabel = (tag) => {
      if (!tag) return '';
      if (/^license:/i.test(tag)) return tag.split(':')[1].toUpperCase();
      return tag.split(/[-_]/).map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    };
    const isNoiseTag = (t) => {
      if (!t) return true;
      const k = tagKey(t);
      if (HF_NOISE.has(k)) return true;
      return /^(arxiv:|license:|region:|base_model:)/i.test(t);
    };
    const catalogCapabilities = (m) => m.capabilities || [];
    const catalogTagSet = (m) => new Set(catalogCapabilities(m).map(tagKey));
    const notableHfTags = (m) => {
      const seen = new Set();
      const out = [];
      (m.tags || []).forEach((t) => {
        const k = tagKey(t);
        if (isNoiseTag(t) || k === tagKey(m.pipeline_tag) || seen.has(k)) return;
        seen.add(k);
        out.push(t);
      });
      return out.sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    };
    const collectCatalogTags = (models) => [...new Set(models.flatMap((m) => catalogCapabilities(m)))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const collectHfTasks = (models) => [...new Set(models.map((m) => m.pipeline_tag).filter(Boolean))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const tagLine = (items) => items.map((t) => esc(formatTagLabel(t))).join(' · ') || '—';
    const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmtDate = (iso, est) => {
      if (!iso) return '—';
      let text;
      try { text = new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
      catch { text = iso.slice(0, 10); }
      return est ? `<span class="release-est" title="Estimated from local files">~${text}</span>` : text;
    };
    const fmtRelease = (m) => fmtDate(m.release_date, m.release_date_source === 'local_earliest');
    const modelEngines = (m) => {
      if (m.engines && m.engines.length) return m.engines;
      return [...new Set((m.variants || []).map(v => v.engine).filter(Boolean))];
    };
    const engineBadgeHtml = (m) => modelEngines(m).map(e =>
      `<span class="badge engine engine-${esc(e)}">${esc(engineLabels[e] || e)}</span>`
    ).join('');
    const fmtTime = (iso) => { if (!iso) return ''; try { return new Date(iso).toLocaleTimeString(); } catch { return ''; } };
    const fmtCtx = (n) => !n ? '—' : n >= 1000 ? (n / 1000).toFixed(0) + 'K' : String(n);
    const fmtParams = (m) => {
      if (m.param_active_b && m.param_b) return m.param_active_b + 'B active / ' + m.param_b + 'B';
      if (m.param_b) return m.param_b + 'B';
      return '—';
    };
    const sparkStatus = (m) => (m.spark_verify && m.spark_verify.spark_status) || 'unverified';
    const removalPending = (m) => !!(m.spark_verify && m.spark_verify.removal_pending);
    const parseDate = (iso) => { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; };
    const localSize = (m) => (m.local && m.local.present) ? m.local.size_human : '—';
    const shelfSize = (m) => (m.shelf && m.shelf.present) ? m.shelf.size_human : '—';

    function sortModels(models) {
      const mode = $('sort').value;
      const arr = [...models];
      const n = (v) => v == null ? -1 : Number(v);
      arr.sort((a, b) => {
        switch (mode) {
          case 'newest': return parseDate(b.release_date) - parseDate(a.release_date) || a.name.localeCompare(b.name);
          case 'oldest': return parseDate(a.release_date) - parseDate(b.release_date) || a.name.localeCompare(b.name);
          case 'name-desc': return b.name.localeCompare(a.name);
          case 'size-desc': return (b.local && b.local.size_bytes || b.size_bytes || 0) - (a.local && a.local.size_bytes || a.size_bytes || 0);
          case 'size-asc': return (a.local && a.local.size_bytes || a.size_bytes || 0) - (b.local && b.local.size_bytes || b.size_bytes || 0);
          case 'ctx-desc': return n(b.max_context) - n(a.max_context) || a.name.localeCompare(b.name);
          case 'ctx-asc': return n(a.max_context) - n(b.max_context) || a.name.localeCompare(b.name);
          case 'params-desc': return n(b.param_b) - n(a.param_b) || a.name.localeCompare(b.name);
          case 'params-asc': return n(a.param_b) - n(b.param_b) || a.name.localeCompare(b.name);
          case 'lab': return a.lab.localeCompare(b.lab) || a.name.localeCompare(b.name);
          default: return a.name.localeCompare(b.name);
        }
      });
      return arr;
    }

    function locBadge(label, loc, mounted) {
      if (!mounted && label === 'NAS') return '<span class="loc-badge warn">NAS offline</span>';
      if (loc && loc.present) return `<span class="loc-badge on">${esc(loc.size_human)}</span>`;
      return '<span class="loc-badge off">not present</span>';
    }

    function modelBusy(m) { return activeJob.running && activeJob.path === m.rel_path; }

    function renderDetail(m) {
      const rel = esc(m.rel_path || m.id);
      const spark = sparkStatus(m);
      const sv = m.spark_verify || {};
      const queued = removalPending(m);
      const busy = modelBusy(m);
      const verifyBtns = ['unverified', 'wip', 'works', 'failed'].map(s => {
        const label = s === 'unverified' ? 'Untested' : s === 'wip' ? 'Testing' : s === 'works' ? 'Works' : 'Failed';
        return `<button type="button" class="btn verify${spark === s ? ' active active-' + s : ''}" data-verify="${s}" data-path="${rel}">${label}</button>`;
      }).join('');
      const vars = (m.variants || []).length ? `<div class="variants detail-section"><table>
        <tr><th>Format</th><th>Engine</th><th>Size</th><th>Status</th></tr>
        ${m.variants.map(v => `<tr><td>${esc(v.format)}</td><td>${esc(v.engine)}</td><td>${esc(v.size_human)}</td><td>${esc(v.status)}</td></tr>`).join('')}
      </table></div>` : '';
      const queueBtn = queued
        ? `<button type="button" class="btn danger active" data-action="queue-removal" data-pending="0" data-path="${rel}">Cancel removal</button>`
        : `<button type="button" class="btn danger" data-action="queue-removal" data-pending="1" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) ? 'disabled' : ''}>Queue removal</button>`;
      const caps = catalogCapabilities(m);
      const task = m.pipeline_tag;
      const hfTags = notableHfTags(m);
      const hfPreview = hfTags.slice(0, 4);
      const hfExtra = hfTags.slice(4);
      const tagBlock = (caps.length || task || hfPreview.length) ? `<div class="detail-section tag-block">
          ${caps.length ? `<div class="tag-line"><span class="tag-line-label">Catalog</span><span class="tag-line-val">${tagLine(caps)}</span></div>` : ''}
          ${task ? `<div class="tag-line"><span class="tag-line-label">HF task</span><span class="tag-line-val">${task ? `<span class="badge hf-task">${esc(formatTagLabel(task))}</span>` : '—'}</span></div>` : ''}
          ${hfPreview.length ? `<div class="tag-line"><span class="tag-line-label">HF tags</span><span class="tag-line-val">${tagLine(hfPreview)}</span></div>` : ''}
          ${hfExtra.length ? `<details class="tag-more"><summary>${hfExtra.length} more HF tag${hfExtra.length === 1 ? '' : 's'}</summary>${tagLine(hfExtra)}</details>` : ''}
          ${m.hf_url ? `<div class="tag-line" style="margin-top:.5rem"><span class="tag-line-label"></span><span class="tag-line-val"><a href="${esc(m.hf_url)}" target="_blank" rel="noopener">All tags on Hugging Face ↗</a></span></div>` : ''}
        </div>` : '';
      return `
        ${tagBlock}
        <div class="detail-section verify-row"><span class="verify-label">Spark</span>${verifyBtns}</div>
        ${sv.note ? `<div class="verify-note">${esc(sv.note)}</div>` : ''}
        <div class="detail-section storage">
          <div class="storage-row"><span class="storage-label">Local</span>${locBadge('Local', m.local, true)}</div>
          <div class="storage-row"><span class="storage-label">NAS</span>${locBadge('NAS', m.shelf, shelfMounted)}</div>
          <div class="actions">
            <button type="button" class="btn primary" data-action="pull" data-path="${rel}" ${!shelfMounted || !(m.shelf && m.shelf.present) || busy ? 'disabled' : ''}>Fetch ↓</button>
            <button type="button" class="btn" data-action="push" data-path="${rel}" ${!shelfMounted || !(m.local && m.local.present) || busy ? 'disabled' : ''}>Push ↑</button>
            ${queueBtn}
            <button type="button" class="btn warn-outline" data-action="remove-local" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) || busy ? 'disabled' : ''}>Delete now</button>
          </div>
          ${queued ? '<div class="queue-note">Queued for removal — purges daily at 03:00. NAS copy is kept.</div>' : ''}
        </div>
        ${m.why_downloaded ? `<div class="detail-section why">${esc(m.why_downloaded)}</div>` : ''}
        ${m.description ? `<div class="detail-section desc">${esc(m.description)}</div>` : ''}
        ${vars}`;
    }

    function render(models) {
      const list = $('list');
      if (!models.length) { list.innerHTML = '<div class="empty">No models match filters.</div>'; return; }
      list.innerHTML = models.map(m => {
        const id = esc(m.id);
        const open = expandedId === m.id;
        const spark = sparkStatus(m);
        const queued = removalPending(m);
        const svRow = m.spark_verify || {};
        const tokS = svRow.tok_s != null ? `<span class="badge tok-s">~${Math.round(svRow.tok_s)} tok/s</span>` : '';
        const badges = [
          engineBadgeHtml(m),
          tokS,
          queued ? '<span class="badge queued">queued</span>' : '',
          `<span class="badge spark-${spark}">${esc(sparkLabels[spark])}</span>`,
          `<span class="badge status-${m.status || 'missing'}">${esc(m.status)}</span>`,
        ].join('');
        return `<article class="model-row${open ? ' open' : ''}${queued ? ' queued' : ''}" data-id="${id}">
          <button type="button" class="row-main" data-expand="${id}">
            <div class="row-title"><strong>${esc(m.name)}</strong><code>${esc(m.rel_path || m.id)}</code></div>
            <div class="row-badges">${badges}</div>
            <span class="chevron">▸</span>
            <div class="row-meta">
              <span><b>Local</b> ${esc(localSize(m))}</span>
              <span><b>Shelf</b> ${esc(shelfSize(m))}</span>
              <span><b>Released</b> ${fmtRelease(m)}</span>
              <span><b>Ctx</b> ${fmtCtx(m.max_context)}</span>
              <span><b>Params</b> ${fmtParams(m)}</span>
            </div>
          </button>
          <div class="row-detail">${open ? renderDetail(m) : ''}</div>
        </article>`;
      }).join('');
      renderJobBanner();
    }

    function renderJobBanner() {
      const el = $('job-banner');
      if (!activeJob.running) { el.classList.remove('active'); el.textContent = ''; return; }
      const tail = (activeJob.log_tail || []).slice(-2).join(' · ');
      el.classList.add('active');
      el.textContent = `${jobLabels[activeJob.action] || activeJob.action} ${activeJob.path || '…'} (pid ${activeJob.pid})${tail ? ' — ' + tail : ''}`;
    }

    function readPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { return {}; }
    }

    function savePrefs() {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        q: $('q').value, lab: $('lab').value, status: $('status').value,
        sort: $('sort').value, sparkFilter, tagFilter, hfTaskFilter,
      }));
    }

    function updateTagPickerButton() {
      const btn = $('tag-picker-btn');
      if (!tagFilter.length) btn.textContent = 'All';
      else if (tagFilter.length === 1) btn.textContent = formatTagLabel(tagFilter[0]);
      else btn.textContent = `${tagFilter.length} selected`;
    }

    function renderTagPickerList(available, query) {
      const list = $('tag-picker-list');
      const q = (query || '').toLowerCase();
      list.innerHTML = '';
      available.filter((t) => !q || formatTagLabel(t).toLowerCase().includes(q) || tagKey(t).includes(q)).forEach((tag) => {
        const k = tagKey(tag);
        const row = document.createElement('label');
        row.className = 'tag-picker-item';
        row.innerHTML = `<input type="checkbox" value="${esc(k)}" ${tagFilter.includes(k) ? 'checked' : ''}><span>${esc(formatTagLabel(tag))}</span>`;
        row.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) {
            if (!tagFilter.includes(k)) tagFilter = [...tagFilter, k];
          } else {
            tagFilter = tagFilter.filter((t) => t !== k);
          }
          updateTagPickerButton();
          applyFilters();
        });
        list.appendChild(row);
      });
      if (!list.children.length) list.innerHTML = '<div class="tag-picker-item" style="cursor:default;color:var(--muted)">No matches</div>';
    }

    function setTagFilter(next) {
      tagFilter = [...next].map(tagKey);
      updateTagPickerButton();
      renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value);
      applyFilters();
    }

    function closeTagPicker() {
      $('tag-picker-menu').hidden = true;
      $('tag-picker-btn').setAttribute('aria-expanded', 'false');
    }

    function openTagPicker() {
      renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value);
      $('tag-picker-menu').hidden = false;
      $('tag-picker-btn').setAttribute('aria-expanded', 'true');
      $('tag-picker-search').focus();
    }

    function setSparkFilter(value) {
      sparkFilter = value || '';
      document.querySelectorAll('#spark-filter .chip').forEach((chip) => {
        const on = chip.dataset.spark === sparkFilter;
        chip.classList.toggle('active', on);
        chip.classList.toggle('spark-works', on && sparkFilter === 'works');
        chip.classList.toggle('spark-failed', on && sparkFilter === 'failed');
        chip.classList.toggle('spark-wip', on && sparkFilter === 'wip');
        chip.classList.toggle('spark-queued', on && sparkFilter === 'queued');
      });
      applyFilters();
    }

    function applyFilters() {
      const q = $('q').value.toLowerCase();
      const lab = $('lab').value, status = $('status').value;
      hfTaskFilter = tagKey($('hf-task').value);
      savePrefs();
      let filtered = all.filter(m => {
        if (lab && m.lab !== lab) return false;
        if (tagFilter.length && !tagFilter.every((t) => catalogTagSet(m).has(t))) return false;
        if (hfTaskFilter && tagKey(m.pipeline_tag) !== hfTaskFilter) return false;
        if (status && m.status !== status) return false;
        if (sparkFilter === 'queued') {
          if (!removalPending(m)) return false;
        } else if (sparkFilter && sparkStatus(m) !== sparkFilter) {
          return false;
        }
        if (q) {
          const hay = [m.name, m.lab, m.slug, m.hf_repo, m.why_downloaded, m.pipeline_tag, ...catalogCapabilities(m), ...notableHfTags(m)].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      filtered = sortModels(filtered);
      const queuedTotal = all.filter(removalPending).length;
      const queuedPart = queuedTotal ? ` · ${queuedTotal} queued for purge` : '';
      const filterBits = [];
      if (tagFilter.length) filterBits.push(tagFilter.map((t) => formatTagLabel(t)).join(' + '));
      if (hfTaskFilter) filterBits.push(formatTagLabel(hfTaskFilter));
      const tagPart = filterBits.length ? ` · ${filterBits.join(' · ')}` : '';
      $('summary').innerHTML = `Showing ${filtered.length} of ${all.length}${tagPart}${queuedPart} · updated ${fmtDate(window.__generated)} ${fmtTime(window.__generated)}`;
      if (queuedTotal) $('summary').classList.add('meta-warn'); else $('summary').classList.remove('meta-warn');
      render(filtered);
    }

    function populateFilters(models, preserve) {
      const stored = readPrefs();
      const storedTags = (stored.tagFilter || (stored.cap ? [stored.cap] : [])).map(tagKey);
      const prev = preserve ? {
        lab: $('lab').value, status: $('status').value, hfTaskFilter,
        sort: $('sort').value, q: $('q').value, sparkFilter, tagFilter,
      } : {
        sort: 'newest',
        sparkFilter: stored.worksOnly ? 'works' : (stored.sparkFilter || ''),
        q: stored.q || '', lab: stored.lab || '', status: stored.status || '',
        tagFilter: storedTags,
        hfTaskFilter: tagKey(stored.hfTaskFilter || ''),
      };
      const fill = (id, key, items, fn) => {
        const el = $(id), first = el.options[0].outerHTML;
        el.innerHTML = first;
        items.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = fn ? fn(v) : v; el.appendChild(o); });
        if (prev[key] && [...el.options].some(o => o.value === prev[key])) el.value = prev[key];
      };
      fill('lab', 'lab', [...new Set(models.map(m => m.lab))].sort(), v => v.split(/[-_]/).map(w => w[0].toUpperCase() + w.slice(1)).join(' '));
      fill('status', 'status', [...new Set(models.map(m => m.status))].sort(), null);
      fill('hf-task', 'hfTaskFilter', collectHfTasks(models), (v) => formatTagLabel(v));
      const catalogKeys = new Set(collectCatalogTags(models).map(tagKey));
      tagFilter = (prev.tagFilter || []).map(tagKey).filter((k) => catalogKeys.has(k));
      hfTaskFilter = prev.hfTaskFilter || '';
      if (hfTaskFilter && ![...$('hf-task').options].some((o) => o.value === hfTaskFilter)) hfTaskFilter = '';
      $('hf-task').value = hfTaskFilter;
      updateTagPickerButton();
      renderTagPickerList(collectCatalogTags(models), '');
      $('sort').value = prev.sort || 'newest';
      $('q').value = prev.q || '';
      sparkFilter = prev.sparkFilter || '';
      document.querySelectorAll('#spark-filter .chip').forEach((chip) => {
        const on = chip.dataset.spark === sparkFilter;
        chip.classList.toggle('active', on);
        chip.classList.toggle('spark-works', on && sparkFilter === 'works');
        chip.classList.toggle('spark-failed', on && sparkFilter === 'failed');
        chip.classList.toggle('spark-wip', on && sparkFilter === 'wip');
        chip.classList.toggle('spark-queued', on && sparkFilter === 'queued');
      });
    }

    async function setSparkVerify(path, spark_status, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, spark_status }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function setRemovalQueue(path, pending, btn) {
      if (pending && btn.dataset.shelf === '—') {
        if (!confirm(`"${btn.dataset.name}" is NOT on NAS shelf.\n\nQueue ${btn.dataset.local} for deletion anyway?`)) return;
      } else if (pending) {
        if (!confirm(`Queue "${btn.dataset.name}" (${btn.dataset.local}) for removal?\n\nPurges at 03:00. NAS copy (${btn.dataset.shelf}) kept.`)) return;
      }
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/removal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, pending }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function modelAction(action, path, btn, extra) {
      if (activeJob.running) return;
      if (action === 'remove-local') {
        const msg = btn.dataset.shelf && btn.dataset.shelf !== '—'
          ? `Delete "${btn.dataset.name}" (${btn.dataset.local}) NOW?\n\nNAS copy (${btn.dataset.shelf}) is kept.`
          : `WARNING: "${btn.dataset.name}" is NOT on NAS.\n\nDelete ${btn.dataset.local} immediately?`;
        if (!confirm(msg)) return;
      }
      btn.disabled = true; btn.classList.add('busy');
      try {
        const res = await fetch('/api/shelf/' + action, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, confirm: true, ...extra }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        await refreshShelfStatus();
        startJobPoll();
      } catch (err) { alert(err.message); btn.disabled = false; btn.classList.remove('busy'); }
    }

    function startJobPoll() {
      if (jobTimer) return;
      jobTimer = setInterval(async () => {
        await refreshShelfStatus();
        if (!activeJob.running) { clearInterval(jobTimer); jobTimer = null; loadData(true).catch(() => {}); }
      }, JOB_POLL_MS);
    }

    async function refreshShelfStatus() {
      try {
        const res = await fetch('/api/shelf/status', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        shelfMounted = !!data.shelf_mounted;
        activeJob = data.job || { running: false };
        $('shelf-meta').textContent = shelfMounted ? 'NAS online' : 'NAS offline';
        renderJobBanner();
        if (activeJob.running) startJobPoll();
      } catch (_) {}
    }

    $('list').addEventListener('click', (e) => {
      const expand = e.target.closest('[data-expand]');
      if (expand) {
        const id = expand.dataset.expand;
        expandedId = expandedId === id ? null : id;
        applyFilters();
        return;
      }
      const vbtn = e.target.closest('[data-verify]');
      if (vbtn) { e.stopPropagation(); setSparkVerify(vbtn.dataset.path, vbtn.dataset.verify, vbtn); return; }
      const qbtn = e.target.closest('[data-action="queue-removal"]');
      if (qbtn && !qbtn.disabled) { e.stopPropagation(); setRemovalQueue(qbtn.dataset.path, qbtn.dataset.pending === '1', qbtn); return; }
      const btn = e.target.closest('[data-action]');
      if (!btn || btn.disabled) return;
      e.stopPropagation();
      const extra = (btn.dataset.action === 'remove-local' && (!btn.dataset.shelf || btn.dataset.shelf === '—')) ? { force: true } : {};
      modelAction(btn.dataset.action, btn.dataset.path, btn, extra);
    });

    ['q','lab','status','sort','hf-task'].forEach(id => {
      $(id).addEventListener('input', applyFilters);
      $(id).addEventListener('change', applyFilters);
    });

    $('spark-filter').addEventListener('click', (e) => {
      const chip = e.target.closest('[data-spark]');
      if (!chip) return;
      setSparkFilter(chip.dataset.spark);
    });

    $('tag-picker-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if ($('tag-picker-menu').hidden) openTagPicker();
      else closeTagPicker();
    });
    $('tag-picker-clear').addEventListener('click', () => setTagFilter([]));
    $('tag-picker-done').addEventListener('click', () => closeTagPicker());
    $('tag-picker-search').addEventListener('input', (e) => renderTagPickerList(collectCatalogTags(all), e.target.value));
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.tag-picker')) closeTagPicker();
    });
    function loadData(preserve) {
      return fetch('models.json?' + Date.now(), { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          all = data.models || [];
          shelfMounted = !!data.shelf_mounted;
          window.__generated = data.generated_at;
          populateFilters(all, preserve);
          applyFilters();
          refreshShelfStatus();
        });
    }

    loadData(false).catch(err => {
      $('summary').textContent = 'Failed to load models.json';
      $('list').innerHTML = `<div class="empty">${esc(String(err))}</div>`;
    });
    pollTimer = setInterval(() => loadData(true).catch(() => {}), REFRESH_MS);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') loadData(true).catch(() => {}); });
  </script>
</body>
</html>
