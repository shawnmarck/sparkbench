recipe_version: '1'
name: qwen-qwen3-coder-next-eugr
description: eugr vLLM serve for qwen/qwen3-coder-next
model: qwen3-coder-next
container: vllm-node
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 8192
command: "vllm serve /models/qwen/qwen3-coder-next/fp8 \\\n  --host {host} \\\n  --port\
  \ {port} \\\n  --served-model-name qwen3-coder-next \\\n  --tensor-parallel-size\
  \ {tensor_parallel} \\\n  --trust-remote-code \\\n  --kv-cache-dtype auto \\\n \
  \ --attention-backend flashinfer \\\n  --gpu-memory-utilization {gpu_memory_utilization}\
  \ \\\n  --max-model-len {max_model_len} \\\n  --max-num-seqs {max_num_seqs} \\\n\
  \  --max-num-batched-tokens {max_num_batched_tokens} \\\n  --enable-chunked-prefill\
  \ \\\n  --enable-prefix-caching \\\n  --load-format fastsafetensors\n"
