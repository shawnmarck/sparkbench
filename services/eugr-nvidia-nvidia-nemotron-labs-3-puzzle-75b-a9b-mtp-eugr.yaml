# Generated by spark-inference Nemotron Puzzle scaffold (nvidia-nvidia-nemotron-labs-3-puzzle-75b-a9b-mtp-eugr)
recipe_version: "1"
name: nvidia-nvidia-nemotron-labs-3-puzzle-75b-a9b-mtp-eugr
description: NVIDIA Nemotron Puzzle 75B NVFP4 + MTP (HF README vLLM flags)

model: nvidia-nemotron-labs-3-puzzle-75b-a9b-mtp
container: vllm-node

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.75
  max_model_len: 262144
  max_num_seqs: 2
  max_num_batched_tokens: 8192

command: |
  vllm serve /models/nvidia/nvidia-nemotron-labs-3-puzzle-75b-a9b/hf \
    --host {host} \
    --port {port} \
    --served-model-name nvidia-nemotron-labs-3-puzzle-75b-a9b-mtp \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --enable-expert-parallel \
    --async-scheduling \
    --mamba-backend flashinfer \
    --mamba_ssm_cache_dtype float16 \
    --enable-mamba-cache-stochastic-rounding \
    --mamba-cache-philox-rounds 5 \
    --speculative-config '{{"method": "mtp", "num_speculative_tokens": 3}}' \
    --tool-call-parser qwen3_coder \
    --reasoning-parser nemotron_v3 \
    --enable-auto-tool-choice \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --load-format fastsafetensors
