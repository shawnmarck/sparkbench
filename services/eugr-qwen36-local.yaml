recipe_version: '1'
name: Sparky Qwen3.6 NVFP4 local
description: nvidia/Qwen3.6-35B-A3B-NVFP4 from /models on sparky solo
model: nvidia/Qwen3.6-35B-A3B-NVFP4
container: vllm-node
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 256000
  max_num_seqs: 6
  max_num_batched_tokens: 8192
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
command: "vllm serve /models/nvidia/qwen3.6-35b-a3b/nvfp4 \\\n  --host {host} \\\n\
  \  --port {port} \\\n  --served-model-name qwen3.6-35b-a3b-nvfp4 \\\n  --tensor-parallel-size\
  \ {tensor_parallel} \\\n  --trust-remote-code \\\n  --kv-cache-dtype auto \\\n \
  \ --attention-backend flashinfer \\\n  --moe-backend marlin \\\n  --gpu-memory-utilization\
  \ {gpu_memory_utilization} \\\n  --max-model-len {max_model_len} \\\n  --max-num-seqs\
  \ {max_num_seqs} \\\n  --max-num-batched-tokens {max_num_batched_tokens} \\\n  --enable-chunked-prefill\
  \ \\\n  --enable-prefix-caching \\\n  --load-format fastsafetensors \\\n  --reasoning-parser\
  \ qwen3 \\\n  --tool-call-parser qwen3_xml \\\n  --enable-auto-tool-choice\n"
