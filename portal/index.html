<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sparky — Home Lab Portal</title>
  <link rel="stylesheet" href="/themes/theme-ui.css">
  <link rel="stylesheet" href="/themes/theme-b.css" id="theme-b-stylesheet" media="not all">
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var fromUrl = p.get('theme');
      if (fromUrl) localStorage.setItem('sparky-theme', fromUrl);
      var t = fromUrl || localStorage.getItem('sparky-theme') || 'a';
      if (t === 'b') {
        document.documentElement.classList.add('theme-b');
        document.getElementById('theme-b-stylesheet').media = 'all';
      }
    })();
  </script>
  <style>
    :root { color-scheme: dark; --bg: #0f1117; --card: #1a1d27; --text: #e6e6e6; --muted: #9aa0a6; --accent: #76b900; --border: #2a2f3a; --ok: #6bc46d; --warn: #e8b84a; --down: #c85c5c; --nav-h: 52px; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
    .topnav { height: var(--nav-h); flex-shrink: 0; display: flex; align-items: center; gap: 1rem; padding: 0 1rem; border-bottom: 1px solid var(--border); background: #12151c; }
    .brand { font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap; text-decoration: none; cursor: pointer; }
    .brand:hover { color: #8fd400; }
    .brand small { color: var(--muted); font-weight: 500; font-size: .72rem; margin-left: .45rem; }
    .nav { display: flex; flex-wrap: wrap; gap: .25rem; flex: 1; }
    .nav-btn { display: inline-block; appearance: none; border: 1px solid transparent; background: transparent; color: #c5cdd8; font: inherit; font-size: .82rem; padding: .4rem .7rem; border-radius: 8px; cursor: pointer; text-decoration: none; transition: color .15s, border-color .15s, background .15s; }
    .nav-btn:hover { color: var(--text); border-color: var(--border); background: var(--card); }
    .nav-btn.active { color: var(--accent); border-color: #3a4a2a; background: #1a2210; }
    .nav-btn .ext { opacity: .45; font-size: .7rem; margin-left: .2rem; }
    .nav-btn.experimental { opacity: .55; }
    .nav-btn.experimental::after { content: 'exp'; font-size: .58rem; margin-left: .25rem; color: var(--warn); vertical-align: super; }
    .nav-meta { display: flex; align-items: center; gap: .5rem; white-space: nowrap; }
    .live { display: inline-flex; align-items: center; gap: .35rem; font-size: .72rem; color: var(--muted); font-family: ui-monospace, monospace; }
    .live i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .live-stale { color: var(--warn); }
    .live-stale i { background: var(--warn); box-shadow: none; animation: none; }
    .shell { flex: 1; min-height: 0; position: relative; }
    .dashboard { height: 100%; overflow: auto; padding: 1.25rem 1rem 2rem; }
    .dashboard-inner { max-width: 800px; margin: 0 auto; }
    .frame-panel { position: absolute; inset: 0; display: none; flex-direction: column; background: var(--bg); }
    .frame-panel.open { display: flex; }
    .frame-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: .75rem; padding: .45rem .75rem; border-bottom: 1px solid var(--border); font-size: .78rem; color: var(--muted); font-family: ui-monospace, monospace; background: #12151c; }
    .frame-bar a { color: var(--accent); text-decoration: none; }
    .frame-bar a:hover { text-decoration: underline; }
    iframe { flex: 1; width: 100%; border: 0; background: var(--bg); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; }
    .card-head { display: flex; align-items: baseline; flex-wrap: wrap; gap: .45rem .75rem; margin-bottom: .65rem; }
    .card h2 { margin: 0; font-size: 1.05rem; color: var(--accent); }
    .card-head-meta { display: inline-flex; align-items: center; gap: .35rem; font-size: .82rem; color: var(--muted); font-family: ui-monospace, monospace; }
    .card-head-meta .sep { opacity: .45; }
    .uptime-icon { width: 13px; height: 13px; flex-shrink: 0; opacity: .75; }

    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-top: .5rem; }
    .metric-grid + .metric-grid { margin-top: 1.25rem; }
    @media (max-width: 720px) { .metric-grid { grid-template-columns: 1fr 1fr; } .nav-btn { padding: .35rem .5rem; } }
    @media (max-width: 480px) { .metric-grid { grid-template-columns: 1fr; } .brand small { display: none; } }
    .metric h3 { margin: 0 0 .35rem; font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; }
    .metric-head { display: flex; align-items: flex-end; justify-content: space-between; gap: .5rem; margin-bottom: .45rem; }
    .metric > .metric-value { margin-bottom: .45rem; }
    .metric-head .metric-value { margin-bottom: 0; }
    .metric-hint { font-size: .72rem; color: var(--muted); font-family: ui-monospace, monospace; text-align: right; white-space: nowrap; padding-bottom: .25rem; }
    .net-dir { font-size: 1rem; color: var(--muted); margin-right: .1rem; font-weight: 500; }
    .metric-value { font-size: 2rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .metric-value span { font-size: 1rem; color: var(--muted); font-weight: 500; }
    .metric-bar { height: 8px; background: #12151c; border-radius: 999px; overflow: hidden; margin-top: 0; border: 1px solid var(--border); }
    .metric-bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #5a9200, var(--accent)); border-radius: 999px; transition: width .35s ease; }
    .spark { height: 28px; margin-top: .45rem; opacity: .9; }
    .spark svg { width: 100%; height: 100%; display: block; }
    .metric-sub { margin-top: .4rem; font-size: .78rem; color: var(--muted); font-family: ui-monospace, monospace; }
    .metric-value.temp-ok { color: var(--ok); }
    .metric-value.temp-warm { color: #d4b84a; }
    .metric-value.temp-warn { color: var(--warn); }
    .metric-value.temp-hot { color: #f08a5d; }
    .temp-bar { position: relative; overflow: visible; }
    .temp-bar > i { border-radius: 999px; transition: width .35s ease, background .35s ease; }
    .temp-bar .temp-redline { position: absolute; top: -3px; bottom: -3px; left: 85%; width: 2px; margin-left: -1px; background: #e85c5c; border-radius: 1px; opacity: .9; pointer-events: none; z-index: 1; box-shadow: 0 0 6px #e85c5c88; }
    .temp-bar .temp-redline::after { content: '85°'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: .58rem; color: #e85c5c; font-family: ui-monospace, monospace; letter-spacing: -.02em; }
    .temp-fill-ok { background: linear-gradient(90deg, #5a9200, var(--accent)); }
    .temp-fill-warm { background: linear-gradient(90deg, #a88c2a, var(--warn)); }
    .temp-fill-warn { background: linear-gradient(90deg, #c87830, #f08a5d); }
    .temp-fill-hot { background: linear-gradient(90deg, #c85c5c, #ff6b4a); }
    .section-title { margin: 1rem 0 .5rem; font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 600; }
    .storage-grid { display: grid; gap: .75rem; }
    .storage-card { padding: .65rem .75rem; background: #12151c; border: 1px solid var(--border); border-radius: 10px; }
    .storage-head { display: flex; flex-wrap: wrap; gap: .35rem .75rem; justify-content: space-between; align-items: baseline; margin-bottom: .45rem; font-size: .8rem; }
    .storage-head strong { color: var(--text); font-weight: 600; }
    .storage-models { color: var(--accent); font-family: ui-monospace, monospace; }
    .storage-disk { color: var(--muted); font-family: ui-monospace, monospace; font-size: .76rem; }
    .storage-card .metric-bar { margin: 0; height: 6px; }
    .storage-offline { color: var(--down); font-size: .78rem; font-family: ui-monospace, monospace; }
    .status-row { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-top: .35rem; }
    .pill { display: inline-flex; align-items: center; gap: .35rem; font-size: .78rem; padding: .25rem .55rem; border-radius: 999px; border: 1px solid var(--border); font-family: ui-monospace, monospace; color: #c5cdd8; }
    .pill.up { border-color: #2a4a2a; color: var(--ok); }
    .pill.down { border-color: #4a2a2a; color: var(--down); }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .svc-list { display: grid; gap: .45rem; margin-top: .5rem; }
    .svc-item { display: flex; flex-wrap: wrap; gap: .35rem .75rem; justify-content: space-between; font-size: .8rem; font-family: ui-monospace, monospace; color: #c5cdd8; padding: .45rem .55rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); }
    .svc-item .name { color: var(--text); font-weight: 600; }
    .svc-item .ports { color: var(--accent); }
  </style>
</head>
<body>
  <header class="topnav">
    <a href="/" class="brand" id="brand-home">Sparky<small>home lab</small></a>
    <nav class="nav" id="nav">
      <a href="/" class="nav-btn active" data-view="system">System</a>
      <a href="/models.html" class="nav-btn" data-src="/models.html" data-title="Model inventory">Models</a>
      <a href="http://sparky:3000/" class="nav-btn" data-src="http://sparky:3000/" data-title="Open WebUI" data-popout="http://sparky:3000/">Chat</a>
      <a href="http://sparky:19999/v3/" class="nav-btn" data-src="http://sparky:19999/v3/" data-title="Netdata" data-popout="http://sparky:19999/v3/">Netdata</a>
    </nav>
    <div class="nav-meta">
      <button type="button" class="theme-toggle" id="theme-toggle" title="Nebula background" aria-label="Toggle nebula background">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle class="theme-toggle-ring" cx="12" cy="12" r="8.6" stroke="currentColor" stroke-width=".55" stroke-dasharray="3.5 16" fill="none"/>
          <circle class="theme-toggle-core" cx="12" cy="12" r="1.6" fill="currentColor"/>
          <g class="theme-toggle-orbit">
            <circle cx="7.2" cy="9" r="1" fill="currentColor" opacity=".75"/>
            <circle cx="17" cy="8.2" r="1" fill="currentColor" opacity=".75"/>
            <circle cx="15.2" cy="16" r=".9" fill="currentColor" opacity=".55"/>
            <circle cx="8.2" cy="15.4" r=".75" fill="currentColor" opacity=".45"/>
            <path d="M12 12L7.2 9M12 12L17 8.2M12 12L15.2 16M7.2 9L8.2 15.4" stroke="currentColor" stroke-width=".65" stroke-linecap="round" opacity=".35"/>
          </g>
        </svg>
      </button>
      <span class="live" id="live"><i></i>live</span>
    </div>
  </header>

  <div class="shell">
    <div class="theme-b-nebula-wrap" id="theme-b-nebula-wrap" aria-hidden="true">
      <canvas id="theme-b-nebula-canvas"></canvas>
      <div class="scrim"></div>
    </div>
    <div class="dashboard" id="dashboard">
      <div class="dashboard-inner">
        <div class="card" id="system-card">
          <div class="card-head">
            <h2>System</h2>
            <div class="card-head-meta">
              <span id="gpu-name">—</span>
              <span class="sep">·</span>
              <svg class="uptime-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <span id="uptime-text">—</span>
              <span class="sep">·</span>
              <span id="load-line">load —</span>
            </div>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <h3>CPU</h3>
              <div class="metric-head">
                <div class="metric-value"><span id="cpu-util">—</span><span>%</span></div>
                <div class="metric-hint" id="cpu-sub">peak —%</div>
              </div>
              <div class="metric-bar"><i id="cpu-bar"></i></div>
              <div class="spark" id="cpu-spark"></div>
            </div>
            <div class="metric">
              <h3>GPU</h3>
              <div class="metric-head">
                <div class="metric-value"><span id="gpu-util">—</span><span>%</span></div>
                <div class="metric-hint" id="gpu-sub">— W</div>
              </div>
              <div class="metric-bar"><i id="gpu-bar"></i></div>
              <div class="spark" id="gpu-spark"></div>
            </div>
            <div class="metric">
              <h3>Memory</h3>
              <div class="metric-head">
                <div class="metric-value"><span id="mem-util">—</span><span>%</span></div>
                <div class="metric-hint" id="mem-sub">— / — GB</div>
              </div>
              <div class="metric-bar"><i id="mem-bar"></i></div>
              <div class="spark" id="mem-spark"></div>
            </div>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <h3>GPU temp</h3>
              <div class="metric-value" id="gpu-temp-val"><span id="gpu-temp">—</span><span>°C</span></div>
              <div class="metric-bar temp-bar"><i id="gpu-temp-bar" class="temp-fill-ok"></i><span class="temp-redline" title="DGX Spark caution threshold"></span></div>
              <div class="spark" id="gpu-temp-spark"></div>
            </div>
            <div class="metric">
              <h3>CPU temp</h3>
              <div class="metric-value" id="cpu-temp-val"><span id="cpu-temp">—</span><span>°C</span></div>
              <div class="metric-bar temp-bar"><i id="cpu-temp-bar" class="temp-fill-ok"></i><span class="temp-redline" title="DGX Spark caution threshold"></span></div>
              <div class="spark" id="cpu-temp-spark"></div>
            </div>
            <div class="metric">
              <h3>Network</h3>
              <div class="metric-head">
                <div class="metric-value"><span class="net-dir">↓</span><span id="net-rx">—</span><span>Mbps</span></div>
                <div class="metric-hint" id="net-sub">↑ — · —</div>
              </div>
              <div class="metric-bar"><i id="net-bar"></i></div>
              <div class="spark" id="net-spark"></div>
            </div>
          </div>

          <div class="section-title">Inference &amp; containers</div>
          <div class="status-row" id="inference-status"></div>
          <div class="svc-list" id="containers"></div>

          <div class="section-title">Model storage</div>
          <div class="storage-grid" id="storage"></div>
        </div>
      </div>
    </div>

    <div class="frame-panel" id="frame-panel">
      <div class="frame-bar">
        <span id="frame-title">—</span>
        <a id="frame-popout" href="#" target="_blank" rel="noopener">Open in new tab ↗</a>
      </div>
      <iframe id="content-frame" title="Sparky portal content" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script src="/assets/sparky-theme.js"></script>
  <script>
    SparkyTheme.init();
  </script>
  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const dashboard = $('dashboard');
      const framePanel = $('frame-panel');
      const frame = $('content-frame');
      const nav = $('nav');
      let pollTimer = null;
      let onSystem = true;

      const fmtGb = (mb) => (mb / 1024).toFixed(1);
      const setBar = (el, pct) => { el.style.width = Math.max(0, Math.min(100, pct)) + '%'; };
      const TEMP_SCALE_MAX = 100;
      const TEMP_REDLINE_C = 85;

      function tempZone(c) {
        if (c == null && c !== 0) return { cls: '', fill: 'temp-fill-ok' };
        if (c >= TEMP_REDLINE_C) return { cls: 'temp-hot', fill: 'temp-fill-hot' };
        if (c >= 75) return { cls: 'temp-warn', fill: 'temp-fill-warn' };
        if (c >= 65) return { cls: 'temp-warm', fill: 'temp-fill-warm' };
        return { cls: 'temp-ok', fill: 'temp-fill-ok' };
      }

      const setTempWidget = (wrapId, valId, barId, c) => {
        const zone = tempZone(c);
        $(wrapId).className = 'metric-value ' + zone.cls;
        $(valId).textContent = c != null ? Math.round(c) : '—';
        const bar = $(barId);
        bar.style.width = (c != null ? Math.min(100, (c / TEMP_SCALE_MAX) * 100) : 0) + '%';
        bar.className = zone.fill;
      };

      function sparkline(el, values, color) {
        if (!values || !values.length) { el.innerHTML = ''; return; }
        const w = 120, h = 28;
        const max = Math.max(...values, 1);
        const pts = values.map((v, i) => {
          const x = values.length === 1 ? w / 2 : (i / (values.length - 1)) * w;
          const y = h - (v / max) * (h - 2) - 1;
          return x.toFixed(1) + ',' + y.toFixed(1);
        }).join(' ');
        const fill = color + '33';
        const area = pts + ' ' + w + ',' + h + ' 0,' + h;
        el.innerHTML = '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">'
          + '<polygon fill="' + fill + '" points="' + area + '"/>'
          + '<polyline fill="none" stroke="' + color + '" stroke-width="1.5" points="' + pts + '"/>'
          + '</svg>';
      }

      function fmtStorageSize(gb) {
        if (gb == null) return '—';
        if (gb >= 1024) return (gb / 1024).toFixed(1) + ' TB';
        return gb.toFixed(1) + ' GB';
      }

      function renderStorage(volumes) {
        $('storage').innerHTML = (volumes || []).map((v) => {
          if (!v.online) {
            return '<div class="storage-card"><div class="storage-head"><strong>' + v.label + '</strong>'
              + '<span class="storage-offline">offline</span></div>'
              + '<div class="storage-disk">' + v.models_path + '</div></div>';
          }
          const models = v.models_gb != null
            ? '<span class="storage-models">' + fmtStorageSize(v.models_gb) + ' models</span>'
            : '<span class="storage-models">models —</span>';
          const disk = fmtStorageSize(v.used_gb) + ' / ' + fmtStorageSize(v.total_gb)
            + ' · ' + fmtStorageSize(v.avail_gb) + ' free';
          return '<div class="storage-card"><div class="storage-head"><strong>' + v.label + '</strong>' + models + '</div>'
            + '<div class="metric-bar"><i style="width:' + v.used_pct + '%"></i></div>'
            + '<div class="storage-disk">' + disk + '</div></div>';
        }).join('');
      }

      function renderInference(inf) {
        const engines = (inf && inf.engines) || [];
        if (!engines.length) {
          const cls = inf && inf.up ? 'pill up' : 'pill down';
          const label = inf && inf.up ? ('Inference · ' + (inf.model || 'ready')) : 'Inference offline';
          $('inference-status').innerHTML = '<span class="' + cls + '"><span class="pill-dot"></span>' + label + '</span>';
          return;
        }
        $('inference-status').innerHTML = engines.map((e) => {
          const cls = e.up ? 'pill up' : 'pill down';
          const label = e.up ? (e.label + ' · ' + (e.model || 'ready')) : (e.label + ' offline');
          return '<span class="' + cls + '"><span class="pill-dot"></span>' + label + '</span>';
        }).join('');
      }

      function renderContainers(list) {
        if (!list.length) {
          $('containers').innerHTML = '<div class="svc-item"><span class="name">No running containers</span></div>';
          return;
        }
        $('containers').innerHTML = list.map((c) =>
          '<div class="svc-item"><span class="name">' + c.name + '</span>'
          + '<span>' + c.status + '</span>'
          + (c.ports ? '<span class="ports">' + c.ports + '</span>' : '')
          + '</div>'
        ).join('');
      }

      async function tick() {
        if (!onSystem) return;
        try {
          const res = await fetch('/api/gpu', { cache: 'no-store' });
          if (!res.ok) throw new Error('bad status');
          const d = await res.json();
          const hist = d.history || {};

          $('gpu-name').textContent = d.gpu_name;
          $('uptime-text').textContent = d.uptime_human;
          $('load-line').textContent = 'load ' + d.load_1 + ' · ' + d.load_5 + ' · ' + d.load_15;
          $('cpu-util').textContent = d.cpu_util_pct.toFixed(1);
          $('gpu-util').textContent = d.gpu_util_pct.toFixed(1);
          $('mem-util').textContent = d.memory_used_pct.toFixed(1);
          setBar($('cpu-bar'), d.cpu_util_pct);
          setBar($('gpu-bar'), d.gpu_util_pct);
          setBar($('mem-bar'), d.memory_used_pct);
          $('cpu-sub').textContent = 'peak core ' + d.cpu_peak_core_pct.toFixed(1) + '%';
          $('mem-sub').textContent = fmtGb(d.memory_used_mb) + ' / ' + fmtGb(d.memory_total_mb) + ' GB';
          $('gpu-sub').textContent = d.gpu_power_w != null ? d.gpu_power_w + ' W' : '— W';

          sparkline($('cpu-spark'), hist.cpu_util_pct, '#6eb5ff');
          sparkline($('gpu-spark'), hist.gpu_util_pct, '#76b900');
          sparkline($('mem-spark'), hist.memory_used_pct, '#c5a3ff');

          setTempWidget('gpu-temp-val', 'gpu-temp', 'gpu-temp-bar', d.gpu_temp_c);
          setTempWidget('cpu-temp-val', 'cpu-temp', 'cpu-temp-bar', d.cpu_temp_c);
          sparkline($('gpu-temp-spark'), hist.gpu_temp_c, '#f08a5d');
          sparkline($('cpu-temp-spark'), hist.cpu_temp_c, '#e8b84a');

          const net = d.network || {};
          if (net.rx_mbps != null) {
            $('net-rx').textContent = net.rx_mbps.toFixed(1);
            $('net-sub').textContent = '↑ ' + net.tx_mbps.toFixed(1) + ' Mbps · ' + (net.label || net.iface || '—');
            const netMax = Math.min(10000, Math.max(100, ...(hist.net_rx_mbps || []), net.rx_mbps));
            setBar($('net-bar'), (net.rx_mbps / netMax) * 100);
          } else {
            $('net-rx').textContent = '—';
            $('net-sub').textContent = net.iface
              ? ('↑ — Mbps · ' + (net.label || net.iface))
              : 'offline';
            setBar($('net-bar'), 0);
          }
          sparkline($('net-spark'), hist.net_rx_mbps, '#6bc46d');

          renderStorage(d.storage || []);
          renderInference(d.inference || {});
          renderContainers(d.containers || []);

          $('live').classList.remove('live-stale');
          $('live').lastChild.textContent = 'live';
        } catch (e) {
          $('live').classList.add('live-stale');
          $('live').lastChild.textContent = 'offline';
        }
      }

      function setActiveNav(btn) {
        nav.querySelectorAll('.nav-btn').forEach((b) => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
      }

      function showSystem(btn) {
        onSystem = true;
        setActiveNav(btn);
        dashboard.style.display = '';
        framePanel.classList.remove('open');
        frame.removeAttribute('src');
        tick();
      }

      function showFrame(btn) {
        const src = btn.dataset.src;
        const title = btn.dataset.title || src;
        const popout = btn.dataset.popout || src;
        const frameSrc = window.SparkyTheme && SparkyTheme.themedUrl
          ? SparkyTheme.themedUrl(src)
          : src;
        const popoutHref = window.SparkyTheme && SparkyTheme.themedUrl
          ? SparkyTheme.themedUrl(popout)
          : popout;
        onSystem = false;
        setActiveNav(btn);
        dashboard.style.display = 'none';
        framePanel.classList.add('open');
        $('frame-title').textContent = title;
        $('frame-popout').href = popoutHref;
        frame.src = frameSrc;
      }

      function navModifierClick(e) {
        return e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button === 1;
      }

      function handleNavClick(btn, e) {
        if (navModifierClick(e)) return;
        e.preventDefault();
        if (btn.dataset.view === 'system') {
          showSystem(btn);
          history.replaceState(null, '', '#system');
          return;
        }
        if (btn.dataset.src) {
          showFrame(btn);
          const slug = (btn.textContent || 'view').trim().toLowerCase();
          history.replaceState(null, '', '#' + slug);
        }
      }

      nav.addEventListener('click', (e) => {
        const btn = e.target.closest('.nav-btn');
        if (!btn) return;
        handleNavClick(btn, e);
      });

      nav.addEventListener('auxclick', (e) => {
        const btn = e.target.closest('.nav-btn');
        if (!btn || e.button !== 1) return;
        if (!navModifierClick(e)) e.preventDefault();
      });

      $('brand-home').addEventListener('click', (e) => {
        if (navModifierClick(e)) return;
        e.preventDefault();
        showSystem(nav.querySelector('[data-view="system"]'));
        history.replaceState(null, '', '#system');
      });

      const hash = location.hash.replace('#', '');
      if (hash && hash !== 'system') {
        const match = Array.from(nav.querySelectorAll('.nav-btn')).find((b) =>
          (b.textContent || '').trim().toLowerCase() === hash
        );
        if (match && match.dataset.src) showFrame(match);
        else showSystem(nav.querySelector('[data-view="system"]'));
      } else {
        showSystem(nav.querySelector('[data-view="system"]'));
      }

      pollTimer = setInterval(tick, 1000);
      tick();
    })();
  </script>
</body>
</html>
