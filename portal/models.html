<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sparky — Model Inventory</title>
  <link rel="stylesheet" href="/themes/theme-ui.css">
  <link rel="stylesheet" href="/themes/theme-b.css" id="theme-b-stylesheet" media="not all">
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var fromUrl = p.get('theme');
      if (fromUrl) localStorage.setItem('sparky-theme', fromUrl);
      var t = fromUrl || localStorage.getItem('sparky-theme') || 'a';
      if (t === 'b') {
        document.documentElement.classList.add('theme-b');
        document.getElementById('theme-b-stylesheet').media = 'all';
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #76b900;
      --border: #2a2f3a;
      --warn: #e8b84a;
      --ok: #6bc46d;
      --dl: #6eb5ff;
      --down: #e85858;
      --control-bg: #141820;
      --control-bg-hover: #171b24;
      --control-text: #c5cad3;
      --control-border: rgba(255, 255, 255, 0.07);
      --menu-bg: #12151c;
      --menu-hover: rgba(255, 255, 255, 0.04);
      --menu-border: rgba(255, 255, 255, 0.06);
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
    body.embedded .portal-link, body.embedded .page-head { display: none; }
    body.embedded main { padding-top: .85rem; }
    main { max-width: 1600px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    a { color: var(--accent); }
    .top { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; justify-content: space-between; margin-bottom: 1.25rem; }
    h1 { font-size: 1.5rem; margin: 0; }
    .page-title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: .35rem .5rem; }
    .title-sep { color: var(--muted); font-weight: 400; opacity: .5; }
    .title-summary { font-size: .82rem; font-weight: 400; color: var(--muted); font-family: ui-monospace, monospace; }
    .title-summary.meta-danger { color: var(--down); }
    .sub { color: var(--muted); font-size: .9rem; margin: .25rem 0 0; }
    .chip-label-sep { margin-left: .5rem; }
    .controls { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; align-items: flex-end; }
    .control-group { display: flex; flex-direction: column; gap: .2rem; }
    .control-group label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    input, select {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      color: var(--control-text);
      border-radius: 8px;
      padding: .5rem .75rem;
      font-size: .9rem;
      transition: background .15s, border-color .15s;
    }
    input::placeholder { color: rgba(154, 160, 166, 0.75); }
    input:hover, select:hover { background: var(--control-bg-hover); border-color: rgba(255, 255, 255, 0.09); }
    input:focus, select:focus {
      outline: none;
      background: var(--control-bg-hover);
      border-color: rgba(255, 255, 255, 0.11);
      box-shadow: none;
    }
    select option, select optgroup { background: var(--menu-bg); color: var(--control-text); }
    input[type=search] { min-width: 180px; flex: 1; }
    .chip-row { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; width: 100%; }
    .chip-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: .15rem; }
    .chip { appearance: none; border: 1px solid var(--border); background: var(--card); color: #c5cdd8; font: inherit; font-size: .78rem; padding: .32rem .62rem; border-radius: 999px; cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
    .chip:hover { border-color: #3a4a2a; }
    .chip.active { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .chip.active.spark-works { border-color: #2a4a2a; background: #142014; color: var(--ok); }
    .chip.active.spark-golden { border-color: #4a3a1a; background: #1a1408; color: #d4a84b; }
    .chip.active.spark-failed { border-color: #4a2a2a; background: #241414; color: #e8a0a0; }
    .chip.active.spark-wip { border-color: #2a3a4a; background: #141c24; color: var(--dl); }
    .chip.active.spark-pending-delete { border-color: #5a2a2a; background: #241010; color: #e87878; }
    .meta-warn { color: var(--warn); }
    .meta-danger { color: var(--down); }
    .meta { color: var(--muted); font-size: .82rem; margin-bottom: .65rem; display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px var(--ok); }

    /* tag picker */
    .tag-picker { position: relative; }
    .tag-picker-btn {
      min-width: 7.5rem; text-align: left; background: var(--control-bg); border: 1px solid var(--control-border);
      color: var(--control-text); border-radius: 8px; padding: .5rem .75rem; font: inherit; font-size: .9rem;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .tag-picker-btn:hover { background: var(--control-bg-hover); border-color: rgba(255,255,255,0.09); }
    .tag-picker-btn[aria-expanded="true"] { background: var(--control-bg-hover); border-color: rgba(255,255,255,0.1); }
    .tag-picker-menu {
      position: absolute; top: calc(100% + .25rem); left: 0; z-index: 12;
      min-width: 14rem; max-width: 18rem; max-height: 14rem; overflow: auto;
      padding: .4rem; border-radius: 10px; border: 1px solid var(--menu-border);
      background: var(--menu-bg); box-shadow: 0 6px 18px rgba(0,0,0,.32);
    }
    .tag-picker-menu[hidden] { display: none; }
    .tag-picker-search { width: 100%; margin-bottom: .35rem; padding: .38rem .5rem; font-size: .82rem; background: rgba(0,0,0,.22); border-color: var(--menu-border); color: var(--control-text); }
    .tag-picker-item { display: flex; align-items: center; gap: .45rem; padding: .3rem .4rem; border-radius: 6px; font-size: .82rem; color: var(--control-text); cursor: pointer; }
    .tag-picker-item:hover { background: var(--menu-hover); }
    .tag-picker-item input { accent-color: #5a9200; }
    .tag-picker-foot { display: flex; justify-content: space-between; gap: .35rem; margin-top: .35rem; padding-top: .35rem; border-top: 1px solid var(--menu-border); }
    .tag-picker-foot button { appearance: none; border: 0; background: transparent; color: var(--muted); font: inherit; font-size: .74rem; cursor: pointer; padding: .15rem 0; }
    .tag-picker-foot button:hover { color: var(--accent); }
    .col-picker-hint {
      font-size: .72rem;
      color: var(--muted);
      padding: 0 .4rem .35rem;
      line-height: 1.35;
    }
    .col-picker .tag-picker-menu {
      min-width: 15rem;
      max-height: 18rem;
    }
    .tag-picker-menu.is-clamped {
      position: fixed;
      z-index: 100;
    }

    /* ── COLUMN VISIBILITY (JS-driven via body.cols-managed) ─ */
    body.cols-managed th[data-col],
    body.cols-managed td[data-col] { display: none; }
    body.cols-managed th[data-col=model],
    body.cols-managed td[data-col=model] { display: table-cell; }
    body.cols-managed.col-vis-local th[data-col=local],
    body.cols-managed.col-vis-local td[data-col=local],
    body.cols-managed.col-vis-shelf th[data-col=shelf],
    body.cols-managed.col-vis-shelf td[data-col=shelf],
    body.cols-managed.col-vis-ctx th[data-col=ctx],
    body.cols-managed.col-vis-ctx td[data-col=ctx],
    body.cols-managed.col-vis-params th[data-col=params],
    body.cols-managed.col-vis-params td[data-col=params],
    body.cols-managed.col-vis-active th[data-col=active],
    body.cols-managed.col-vis-active td[data-col=active],
    body.cols-managed.col-vis-spark th[data-col=spark],
    body.cols-managed.col-vis-spark td[data-col=spark],
    body.cols-managed.col-vis-dl th[data-col=dl],
    body.cols-managed.col-vis-dl td[data-col=dl],
    body.cols-managed.col-vis-release_date th[data-col=release_date],
    body.cols-managed.col-vis-release_date td[data-col=release_date],
    body.cols-managed.col-vis-arch th[data-col=arch],
    body.cols-managed.col-vis-arch td[data-col=arch],
    body.cols-managed.col-vis-engine th[data-col=engine],
    body.cols-managed.col-vis-engine td[data-col=engine],
    body.cols-managed.col-vis-inf th[data-col=inf],
    body.cols-managed.col-vis-inf td[data-col=inf],
    body.cols-managed.col-vis-bench th[data-col=bench],
    body.cols-managed.col-vis-bench td[data-col=bench],
    body.cols-managed.col-vis-caps th[data-col=caps],
    body.cols-managed.col-vis-caps td[data-col=caps] { display: table-cell; }

    /* ── MODELS SPLIT LAYOUT ─────────────────────────────── */
    .models-layout {
      container-type: inline-size;
      container-name: models;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      min-width: 0;
    }
    .models-table-wrap {
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    /* ── SORTABLE TABLE ──────────────────────────────────── */
    .models-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }
    .models-table thead th {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 2;
      padding: .35rem .55rem;
      text-align: left;
      font-size: .63rem;
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    .models-table thead th.sortable { cursor: pointer; }
    .models-table thead th.sortable:hover { color: var(--text); }
    .models-table thead th[aria-sort] { color: var(--accent); }
    .models-table thead th.col-local,
    .models-table thead th.col-shelf,
    .models-table thead th.col-ctx,
    .models-table thead th.col-params,
    .models-table thead th.col-active,
    .models-table thead th.col-bench { text-align: right; }

    .models-table tbody tr.model-row {
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .models-table tbody tr.model-row:hover td { background: #12151c; }
    .models-table tbody tr.model-row.selected td { background: #131a10; border-bottom-color: #2a3a1a; }
    .models-table tbody tr.model-row.highlight td { background: #10161a; }
    .models-table tbody tr.model-row.pending-delete .col-model { border-left: 3px solid var(--down); }

    .models-table td {
      padding: .42rem .55rem;
      vertical-align: middle;
      white-space: nowrap;
    }
    .models-table td.col-model { white-space: normal; min-width: 160px; max-width: 280px; }
    .col-local, .col-shelf, .col-ctx, .col-params, .col-active, .col-bench { text-align: right; }
    .col-local, .col-shelf { font-family: ui-monospace, monospace; font-size: .76rem; color: #c8cdd4; }
    .col-ctx, .col-params, .col-active { font-family: ui-monospace, monospace; font-size: .76rem; color: #c8cdd4; }
    .col-bench { font-family: ui-monospace, monospace; font-size: .76rem; color: #9ec8ff; }
    .col-caps { max-width: 120px; }

    .model-name { display: block; font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .model-path { display: block; font-size: .66rem; color: var(--muted); font-family: ui-monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: .08rem; }
    .row-lab {
      display: inline-block; font-size: .64rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
      color: var(--accent); border: 1px solid #3a4a2a; background: #141a10; border-radius: 4px;
      padding: .03rem .28rem; margin-right: .35rem; vertical-align: middle;
    }
    .row-variant { color: #c5cdd8; }
    .pending-del-tag { color: #e87878; font-size: .62rem; font-weight: 700; margin-left: .3rem; }
    .badge.golden-tag { border-color: #4a3a1a; color: #d4a84b; font-size: .62rem; margin-left: .35rem; }
    .rail-empty { color: var(--muted); opacity: .4; font-family: ui-monospace, monospace; }

    /* ── FAMILY GROUPING IN TABLE ────────────────────────── */
    tr.family-head-row td {
      padding: .3rem .55rem;
      background: #0a0c10;
      color: var(--muted);
      font-size: .68rem;
      font-family: ui-monospace, monospace;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
    }
    tr.family-head-row:hover td { background: #0d1015; }
    .family-toggle { appearance: none; border: 0; background: transparent; color: var(--accent); font-size: .6rem; cursor: pointer; padding: 0 .3rem 0 0; transition: transform .12s; vertical-align: middle; }
    tr.family-head-row:not(.collapsed) .family-toggle { transform: rotate(90deg); }
    .family-name { color: #c5cdd8; font-weight: 600; margin-right: .4rem; }
    .family-meta { color: var(--muted); font-size: .63rem; }
    .family-count { color: var(--muted); font-size: .62rem; margin-left: .3rem; }
    tr.family-head-row.has-active .family-name { color: var(--accent); }
    .family-active-tag { color: var(--ok); font-size: .62rem; font-weight: 600; margin-left: .4rem; }

    /* ── DETAIL PANE ─────────────────────────────────────── */
    #model-detail-pane {
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      display: none;
      flex-direction: column;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.35);
    }
    body[data-pane] #model-detail-pane { display: flex; }
    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem .85rem .5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: .5rem;
    }
    .pane-title { font-size: .84rem; font-weight: 600; color: #c5cdd8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
    .pane-close { appearance: none; border: 0; background: transparent; color: var(--muted); font-size: 1rem; line-height: 1; cursor: pointer; padding: .1rem .2rem; flex-shrink: 0; }
    .pane-close:hover { color: var(--text); }
    .pane-body { padding: .65rem .85rem .85rem; overflow-y: auto; flex: 1; }
    .pane-body::-webkit-scrollbar { width: 6px; }
    .pane-body::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 3px; }

    /* ── MOBILE BACKDROP ─────────────────────────────────── */
    #pane-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 49;
    }

    /* ── BADGES, ACTIONS, DETAIL SECTIONS ────────────────── */
    .badge { font-size: .7rem; padding: .12rem .4rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
    .badge.cap { border-color: #3a4a2a; color: #b8d88a; }
    .badge.hf-task { border-color: #3a4a5a; color: #9ec8ff; font-weight: 500; }
    .badge.status-ready { border-color: #2a4a2a; color: var(--ok); }
    .badge.status-downloading { border-color: #2a3a4a; color: var(--dl); }
    .badge.status-partial, .badge.status-missing, .badge.status-shelf-only { border-color: #4a402a; color: var(--warn); }
    .badge.spark-unverified { border-color: #3a3a3a; color: var(--muted); }
    .badge.spark-wip { border-color: #2a3a4a; color: var(--dl); }
    .badge.spark-works { border-color: #2a4a2a; color: var(--ok); }
    .badge.spark-failed { border-color: #4a2a2a; color: #e8a0a0; }
    .badge.pending-delete { border-color: #5a2a2a; color: #e87878; background: #1a1010; }
    .badge.engine-vllm, .badge.engine-eugr { border-color: #2a3a5a; color: #9ec8ff; }
    .badge.engine-llamacpp { border-color: #3a4a2a; color: #b8d88a; }
    .badge.inf-profile { border-color: #2a3a4a; color: #9ec8ff; }
    .badge.inf-active { border-color: #3a4a2a; color: var(--accent); }
    .badge.inf-loading { border-color: #4a402a; color: var(--warn); }
    .badge.tok-s { border-color: #2a4a5a; color: #9ec8ff; }
    .badge.tok-s.unbench { border-color: #3a3a3a; color: var(--muted); }
    .badge.life-draft { border-color: #3a3a3a; color: var(--muted); }
    .badge.life-testing { border-color: #2a3a4a; color: var(--dl); }
    .badge.life-works, .badge.life-production { border-color: #2a4a2a; color: var(--ok); }
    .badge.sidecar-req { border-color: #3a3a5a; color: #b8b8ff; font-size: .62rem; }
    .badge.tier-heavy { border-color: #4a402a; color: var(--warn); }
    .badge.spec-dflash { border-color: #2a4a5a; color: #9ec8ff; background: #101820; }
    .badge.spec-mtp { border-color: #4a2a6a; color: #c49cff; background: #140c1a; }
    .badge.arch-moe { border-color: #6a4020; color: #f0a060; background: #1a140c; }
    .badge.arch-dense { border-color: #2a5858; color: #70b8b0; background: #0c1818; }
    .tag-block { padding: .6rem .75rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); font-size: .82rem; line-height: 1.45; }
    .tag-line { display: flex; gap: .55rem; align-items: baseline; margin-top: .35rem; }
    .tag-line:first-child { margin-top: 0; }
    .tag-line-label { flex-shrink: 0; width: 5.5rem; font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .tag-line-val { color: #c8cdd4; min-width: 0; }
    .tag-more { margin-top: .45rem; font-size: .76rem; color: var(--muted); line-height: 1.4; }
    .tag-more summary { cursor: pointer; color: #9aa0a6; list-style: none; }
    .tag-more summary::-webkit-details-marker { display: none; }
    .tag-more summary::before { content: '▸ '; font-size: .7rem; }
    .tag-more[open] summary::before { content: '▾ '; }
    .release-est { opacity: .75; font-style: italic; }
    .detail-section { margin-top: .75rem; }
    .badges { display: flex; flex-wrap: wrap; gap: .35rem; }
    .storage { display: grid; gap: .45rem; padding: .65rem .75rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); }
    .storage-row { display: flex; flex-wrap: wrap; gap: .5rem .75rem; align-items: center; font-size: .82rem; }
    .storage-label { color: var(--muted); min-width: 5.5rem; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; }
    .loc-badge { display: inline-flex; align-items: center; gap: .35rem; padding: .18rem .5rem; border-radius: 999px; border: 1px solid var(--border); font-family: ui-monospace, monospace; font-size: .78rem; }
    .loc-badge.on { border-color: #2a4a2a; color: var(--ok); }
    .loc-badge.off { border-color: #3a3a3a; color: var(--muted); }
    .loc-badge.warn { border-color: #4a402a; color: var(--warn); }
    .actions { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .55rem; }
    .btn { appearance: none; border: 1px solid var(--border); background: #1a1f2a; color: var(--text); font: inherit; font-size: .8rem; padding: .38rem .7rem; border-radius: 8px; cursor: pointer; }
    .btn:hover:not(:disabled) { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.primary { border-color: #2a4a5a; color: var(--dl); }
    .btn.danger { border-color: #4a2a2a; color: #e8a0a0; }
    .btn.danger.active { border-color: #6a4040; background: #2a1810; color: var(--warn); }
    .btn.warn-outline { border-color: #4a402a; color: var(--warn); }
    .btn.busy { border-color: #4a402a; color: var(--warn); }
    .verify-row { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .verify-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: .15rem; }
    .btn.verify { font-size: .74rem; padding: .28rem .55rem; }
    .btn.verify.active-works { border-color: #2a4a2a; color: var(--ok); background: #142014; }
    .btn.verify.active-failed { border-color: #4a2a2a; color: #e8a0a0; background: #241414; }
    .btn.verify.active-wip { border-color: #2a3a4a; color: var(--dl); background: #141c24; }
    .btn.verify.active { border-color: #3a4a2a; background: #1a2210; color: var(--accent); }
    .verify-note, .queue-note { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: .35rem; }
    .model-about h4 { margin: 0 0 .45rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .model-summary { max-height: 9rem; overflow-y: auto; font-size: .88rem; line-height: 1.5; color: #c8cdd4; padding: .65rem .75rem; background: #12151c; border-radius: 8px; border: 1px solid var(--border); white-space: pre-wrap; }
    .model-summary::-webkit-scrollbar { width: 8px; }
    .model-summary::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 4px; }

  <script>
    let all = [], shelfMounted = false, activeJob = { running: false };
    let infStatus = null, highlightPath = null;
    let selectedModelId = null, pollTimer = null, jobTimer = null, infPollTimer = null;
    let lastInfSnapshot = '';
    const benchHistoryOpen = new Set();
    const modelGroupsOpen = new Set();
    const benchHistoryCache = {};
    let benchNoteDrafts = {};
    let sortCol = 'release_date', sortDir = 'desc';
    const REFRESH_MS = 30000, JOB_POLL_MS = 2000, INF_POLL_MS = 10000, PREFS_KEY = 'spark-models-filters';
    const sparkLabels = { unverified: 'Untested', wip: 'Testing', works: 'Works', failed: 'Failed' };
    const engineLabels = { vllm: 'vLLM', eugr: 'vLLM', llamacpp: 'GGUF' };
    const engineCssClass = (e) => (e === 'eugr' ? 'vllm' : e);
    const engineTitle = (e) => {
      if (e === 'eugr') return 'vLLM via eugr spark-vllm-docker (port 8000)';
      if (e === 'vllm') return 'vLLM';
      if (e === 'llamacpp') return 'llama.cpp GGUF (port 8081)';
      return e || '';
    };
    const jobLabels = { pull: 'Fetching', push: 'Pushing', fetch: 'Downloading', 'remove-local': 'Deleting' };
    const SPARK_FILTER_OPTS = ['unverified', 'wip', 'works', 'failed', 'golden', 'pending-delete'];
    let sparkFilters = [];
    let tagFilter = [];
    let hfTaskFilter = '';
    let groupByFamily = false;
    const HF_NOISE = new Set(['transformers', 'safetensors', 'endpoints_compatible', 'text-generation-inference', 'eval-results', 'gguf', 'ggml']);

    const $ = (id) => document.getElementById(id);

    /* ── TABLE COLUMNS ──────────────────────────────────── */
    const TABLE_COLS = [
      { key: 'model',   label: 'Model',     sortable: true  },
      { key: 'local',   label: 'Local',     sortable: true  },
      { key: 'shelf',   label: 'Shelf',     sortable: true  },
      { key: 'ctx',     label: 'Model CTX', sortable: true  },
      { key: 'params',  label: 'Params',    sortable: true  },
      { key: 'active',  label: 'Active',    sortable: true  },
      { key: 'spark',   label: 'Spark',     sortable: true  },
      { key: 'dl',      label: 'Download',  sortable: true  },
      { key: 'release_date', label: 'Released', sortable: true },
      { key: 'arch',    label: 'Arch',      sortable: false },
      { key: 'engine',  label: 'Engine',    sortable: false },
      { key: 'inf',     label: 'Inference', sortable: false },
      { key: 'bench',   label: 'Bench',     sortable: true  },
      { key: 'caps',    label: 'Caps',      sortable: false },
    ];
    const COL_AUTO_DEFAULT = [
      'model', 'local', 'ctx', 'params', 'active', 'spark',
      'release_date', 'arch', 'engine', 'bench', 'caps',
    ];
    const COL_AUTO = {
      narrow: ['model', 'local', 'ctx', 'params', 'spark', 'bench'],
      constrained: COL_AUTO_DEFAULT,
      wide: COL_AUTO_DEFAULT,
    };
    let columnOverride = null;
    let layoutBandWidth = 1200;
    let layoutResizeTimer = null;

    function layoutBand(w) {
      if (w < 900) return 'narrow';
      if (w < 1600) return 'constrained';
      return 'wide';
    }

    function effectiveVisibleColumns() {
      if (columnOverride) return columnOverride;
      return new Set(COL_AUTO[layoutBand(layoutBandWidth)]);
    }

    function visibleColumnCount() {
      return effectiveVisibleColumns().size;
    }

    function applyColumnVisibility() {
      const vis = effectiveVisibleColumns();
      document.body.classList.add('cols-managed');
      TABLE_COLS.forEach((c) => {
        document.body.classList.toggle('col-vis-' + c.key, vis.has(c.key));
      });
      updateColPickerButton();
    }

    function loadColumnPrefs(stored) {
      if (Array.isArray(stored.visibleColumns) && stored.visibleColumns.length) {
        const valid = stored.visibleColumns.filter((k) => TABLE_COLS.some((c) => c.key === k));
        columnOverride = new Set(valid.length ? valid : ['model']);
        columnOverride.add('model');
      } else {
        columnOverride = null;
      }
    }

    function setColumnOverride(cols) {
      columnOverride = cols;
      savePrefs();
      applyColumnVisibility();
      applyFilters();
    }

    function updateColPickerButton() {
      const btn = $('col-picker-btn');
      if (!btn) return;
      const n = effectiveVisibleColumns().size;
      if (columnOverride) {
        btn.textContent = `${n} cols`;
        btn.title = 'Custom column set';
      } else {
        const band = layoutBand(layoutBandWidth);
        btn.textContent = `Auto · ${n}`;
        btn.title = `Auto columns (${band} layout)`;
      }
    }

    function renderColPickerList() {
      const list = $('col-picker-list');
      if (!list) return;
      list.innerHTML = '';
      const vis = columnOverride ? new Set(columnOverride) : new Set(effectiveVisibleColumns());
      TABLE_COLS.forEach((col) => {
        const row = document.createElement('label');
        row.className = 'tag-picker-item';
        const locked = col.key === 'model';
        row.innerHTML = `<input type="checkbox" value="${esc(col.key)}" ${vis.has(col.key) ? 'checked' : ''} ${locked ? 'disabled' : ''}><span>${esc(col.label)}</span>`;
        if (!locked) {
          row.querySelector('input').addEventListener('change', (e) => {
            const current = columnOverride
              ? new Set(columnOverride)
              : new Set(effectiveVisibleColumns());
            if (e.target.checked) current.add(col.key);
            else current.delete(col.key);
            current.add('model');
            columnOverride = current;
            savePrefs();
            applyColumnVisibility();
            applyFilters();
            renderColPickerList();
          });
        }
        list.appendChild(row);
      });
      const hint = $('col-picker-hint');
      if (hint) {
        hint.textContent = columnOverride
          ? 'Custom set saved — Reset auto to follow panel width again.'
          : `Auto (${layoutBand(layoutBandWidth)}) — check any column to customize.`;
      }
    }

    function resetPickerMenuPosition(menuEl) {
      if (!menuEl) return;
      menuEl.classList.remove('is-clamped');
      menuEl.style.position = '';
      menuEl.style.top = '';
      menuEl.style.left = '';
      menuEl.style.right = '';
      menuEl.style.maxWidth = '';
      menuEl.style.maxHeight = '';
    }

    let pickerClampHandler = null;

    function unbindPickerMenuClamp() {
      if (!pickerClampHandler) return;
      window.removeEventListener('resize', pickerClampHandler);
      pickerClampHandler = null;
    }

    function clampPickerMenu(pickerEl, menuEl, opts) {
      opts = opts || {};
      if (!pickerEl || !menuEl) return;
      resetPickerMenuPosition(menuEl);
      const margin = opts.margin ?? 10;
      const gap = 4;
      const preferRight = !!opts.preferRight;
      const pickerRect = pickerEl.getBoundingClientRect();
      const vw = document.documentElement.clientWidth;
      const vh = document.documentElement.clientHeight;
      const maxWidth = Math.max(180, vw - margin * 2);
      menuEl.style.maxWidth = maxWidth + 'px';

      let menuWidth = menuEl.offsetWidth;
      let menuHeight = menuEl.offsetHeight;
      let left = preferRight ? pickerRect.right - menuWidth : pickerRect.left;
      if (left + menuWidth > vw - margin) left = vw - menuWidth - margin;
      if (left < margin) left = margin;
      if (menuWidth > maxWidth) {
        menuEl.style.maxWidth = maxWidth + 'px';
        menuWidth = menuEl.offsetWidth;
        left = margin;
      }

      let top = pickerRect.bottom + gap;
      if (top + menuHeight > vh - margin) {
        const above = pickerRect.top - menuHeight - gap;
        if (above >= margin) top = above;
        else menuEl.style.maxHeight = Math.max(120, vh - top - margin) + 'px';
      }

      menuEl.classList.add('is-clamped');
      menuEl.style.top = top + 'px';
      menuEl.style.left = left + 'px';
    }

    function bindPickerMenuClamp(pickerEl, menuEl, opts) {
      unbindPickerMenuClamp();
      const run = () => clampPickerMenu(pickerEl, menuEl, opts);
      pickerClampHandler = run;
      run();
      window.addEventListener('resize', run, { passive: true });
    }

    function closeColPicker() {
      unbindPickerMenuClamp();
      resetPickerMenuPosition($('col-picker-menu'));
      $('col-picker-menu').hidden = true;
      $('col-picker-btn').setAttribute('aria-expanded', 'false');
    }

    function openColPicker() {
      renderColPickerList();
      const picker = document.querySelector('.col-picker');
      const menu = $('col-picker-menu');
      menu.hidden = false;
      $('col-picker-btn').setAttribute('aria-expanded', 'true');
      bindPickerMenuClamp(picker, menu, { preferRight: true });
    }

    function resetColumnPrefs() {
      columnOverride = null;
      savePrefs();
      applyColumnVisibility();
      applyFilters();
      renderColPickerList();
    }

    function initColumnLayoutObserver() {
      const layoutEl = document.querySelector('.models-layout');
      if (!layoutEl) return;
      layoutBandWidth = layoutEl.clientWidth || window.innerWidth;
      applyColumnVisibility();
      if (typeof ResizeObserver === 'undefined') return;
      const ro = new ResizeObserver((entries) => {
        const w = entries[0]?.contentRect?.width;
        if (!w || Math.abs(w - layoutBandWidth) < 12) return;
        layoutBandWidth = w;
        clearTimeout(layoutResizeTimer);
        layoutResizeTimer = setTimeout(() => {
          if (!columnOverride) applyColumnVisibility();
          updateColPickerButton();
          if (!columnOverride && groupByFamily) applyFilters();
        }, 120);
      });
      ro.observe(layoutEl);
    }

    /* ── HELPERS ─────────────────────────────────────────── */
    function gotoInference(opts) {
      opts = opts || {};
      const params = new URLSearchParams();
      if (opts.profile) params.set('pick', opts.profile);
      if (opts.infFilterQ) params.set('q', opts.infFilterQ);
      const qs = params.toString();
      const msg = {
        type: 'sparky-portal-nav',
        view: 'inference',
        infLogFocus: !!opts.infLogFocus,
        profile: opts.profile || null,
        infFilterQ: opts.infFilterQ || null,
      };
      try {
        if (window.parent && window.parent !== window) { window.parent.postMessage(msg, location.origin); return; }
      } catch (_) {}
      location.href = '/' + (qs ? '?' + qs : '') + '#inference';
    }
    function primaryInferenceProfile(m) {
      const profiles = m.inference_profiles || [];
      if (!profiles.length) return null;
      const activeId = activeProfileId();
      if (activeId && profiles.some((p) => p.id === activeId)) return activeId;
      const rank = { works: 0, production: 1, testing: 2 };
      const pool = profiles.filter((p) => p.lifecycle in rank || p.enabled !== false);
      const list = (pool.length ? pool : profiles).slice();
      list.sort((a, b) => {
        const ra = rank[a.lifecycle] ?? 9;
        const rb = rank[b.lifecycle] ?? 9;
        if (ra !== rb) return ra - rb;
        return (Number(b.tok_s) || 0) - (Number(a.tok_s) || 0);
      });
      return list[0].id;
    }
    function inferenceNavAttrs(profileId, filterQ) {
      let s = '';
      if (profileId) s += ' data-inf-profile="' + esc(profileId) + '"';
      if (filterQ) s += ' data-inf-filter-q="' + esc(filterQ) + '"';
      return s;
    }
    document.addEventListener('click', (e) => {
      const link = e.target.closest('[data-portal-nav="inference"]');
      if (!link) return;
      e.preventDefault();
      gotoInference({
        infLogFocus: link.dataset.infLogFocus === '1',
        profile: link.dataset.infProfile || null,
        infFilterQ: link.dataset.infFilterQ || null,
      });
    });

    const tagKey = (t) => (t || '').toLowerCase();
    const formatTagLabel = (tag) => {
      if (!tag) return '';
      if (/^license:/i.test(tag)) return tag.split(':')[1].toUpperCase();
      return tag.split(/[-_]/).map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    };
    const isNoiseTag = (t) => {
      if (!t) return true;
      const k = tagKey(t);
      if (HF_NOISE.has(k)) return true;
      return /^(arxiv:|license:|region:|base_model:)/i.test(t);
    };
    const catalogCapabilities = (m) => m.capabilities || [];
    const catalogTagSet = (m) => new Set(catalogCapabilities(m).map(tagKey));
    const notableHfTags = (m) => {
      const seen = new Set(); const out = [];
      (m.tags || []).forEach((t) => {
        const k = tagKey(t);
        if (isNoiseTag(t) || k === tagKey(m.pipeline_tag) || seen.has(k)) return;
        seen.add(k); out.push(t);
      });
      return out.sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    };
    const collectCatalogTags = (models) => [...new Set(models.flatMap((m) => catalogCapabilities(m)))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const collectHfTasks = (models) => [...new Set(models.map((m) => m.pipeline_tag).filter(Boolean))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const tagLine = (items) => items.map((t) => esc(formatTagLabel(t))).join(' · ') || '—';
    const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmtDate = (iso, est) => {
      if (!iso) return '—';
      let text;
      try { text = new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
      catch { text = iso.slice(0, 10); }
      return est ? `<span class="release-est" title="Estimated from local files">~${text}</span>` : text;
    };
    const fmtRelease = (m) => fmtDate(m.release_date, m.release_date_source === 'local_earliest');
    const modelSummary = (m) => m.summary || m.description || '';
    const summaryBlock = (m) => {
      const text = modelSummary(m);
      if (!text) return '';
      return `<div class="detail-section model-about"><h4>About</h4><div class="model-summary">${esc(text)}</div></div>`;
    };
    const modelEngines = (m) => {
      if (m.engines && m.engines.length) return m.engines;
      return [...new Set((m.variants || []).map(v => v.engine).filter(Boolean))];
    };
    const fmtTime = (iso) => { if (!iso) return ''; try { return new Date(iso).toLocaleTimeString(); } catch { return ''; } };
    const fmtCtx = (n) => !n ? '—' : n >= 1000 ? (n / 1000).toFixed(0) + 'K' : String(n);
    const fmtParams = (m) => {
      if (m.param_active_b && m.param_b && m.param_active_b < m.param_b)
        return m.param_active_b + 'B active / ' + m.param_b + 'B';
      if (m.param_b) return m.param_b + 'B';
      return '—';
    };
    const sparkStatus = (m) => (m.spark_verify && m.spark_verify.spark_status) || 'unverified';
    const removalPending = (m) => !!(m.spark_verify && m.spark_verify.removal_pending);
    const removalShelf = (m) => !!(m.spark_verify && m.spark_verify.removal_shelf);
    const localSize = (m) => {
      if (m.model_kind === 'speculative_sidecar' && m.combined_size_human) return m.combined_size_human;
      return (m.local && m.local.present) ? m.local.size_human : '—';
    };
    const sidecarSizeDetail = (m) => {
      if (m.model_kind !== 'speculative_sidecar') return '';
      const parts = [];
      if (m.requires_target_size_human) parts.push('base ' + m.requires_target_size_human);
      if (m.sidecar_size_human) parts.push('add-on ' + m.sidecar_size_human);
      return parts.length ? parts.join(' + ') : '';
    };
    const isSidecarModel = (m) => m.model_kind === 'speculative_sidecar';
    const requiresTargetLine = (m) => {
      if (!isSidecarModel(m) || !m.requires_target) return '';
      const hint = m.requires_target_name ? ` (${m.requires_target_name})` : '';
      return `<span class="badge sidecar-req" title="Speculative add-on — needs base weights on disk">requires ${esc(m.requires_target)}${esc(hint)}</span>`;
    };
    const shelfSize = (m) => (m.shelf && m.shelf.present) ? m.shelf.size_human : '—';
    const benchRated = (m) => m.best_bench_tok_s != null && !Number.isNaN(Number(m.best_bench_tok_s));
    const parseDate = (iso) => { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; };
    const modelHasLocal = (m) => !!(m.local && m.local.present);
    const modelBusy = (m) => activeJob.running && activeJob.path === m.rel_path;
    const inferenceSwitching = () => !!(infStatus && infStatus.switch && infStatus.switch.running);

    function modelHasActiveInference(m) {
      const activeId = activeProfileId();
      if (!activeId) return false;
      return (m.inference_profiles || []).some((p) => p.id === activeId);
    }
    function activeProfileId() { return infStatus && infStatus.active && infStatus.active.id; }
    function parseStartedAt(iso) { if (!iso) return null; const t = Date.parse(iso); return Number.isNaN(t) ? null : t; }
    function formatLoadingElapsed(startedAtMs) {
      if (!startedAtMs) return '';
      const s = Math.max(0, Math.floor((Date.now() - startedAtMs) / 1000));
      if (s < 60) return ' (' + s + 's)';
      const m = Math.floor(s / 60); const r = s % 60;
      return ' (' + m + 'm ' + r + 's)';
    }
    function loadingPhaseKey(info) { const phase = info && info.phase; return phase === 'model' ? 'starting' : phase; }
    function inferenceLoadingInfo() {
      if (!infStatus) return null;
      if (infStatus.loading && infStatus.loading.profile) return infStatus.loading;
      const sw = infStatus.switch;
      if (sw && sw.running && sw.profile) return { phase: 'switch', profile: sw.profile, name: sw.profile, started_at: sw.started_at };
      const active = infStatus.active;
      if (active && !active.ready) return { phase: active.starting ? 'starting' : 'waiting', profile: active.id, name: active.name || active.id, started_at: active.started_at };
      return null;
    }
    function inferenceLoadingLabel(info) {
      const name = (info && (info.name || info.profile)) || '…';
      const elapsed = formatLoadingElapsed(parseStartedAt(info && info.started_at));
      const fallback = { switch: 'Switching', starting: 'Starting', waiting: 'Waiting', model: 'Starting' };
      const label = (info && info.phase_label) || fallback[loadingPhaseKey(info)] || 'Loading';
      return label + ' · ' + name + elapsed;
    }
    function inferenceLoadingTitle(info) {
      if (!info || !info.profile) return 'Inference loading';
      const parts = [];
      if (info.detail) parts.push(info.detail);
      if (info.expect && info.expect.hint) parts.push(info.expect.hint);
      if (parts.length) return parts.join(' ');
      const name = info.name || info.profile;
      if (loadingPhaseKey(info) === 'switch') return 'Switching to ' + name;
      if (loadingPhaseKey(info) === 'starting') return 'Engine starting — ' + name;
      return 'Waiting for engine — ' + name;
    }

    /* ── ARCH ────────────────────────────────────────────── */
    function modelArchitecture(m) {
      if (m.architecture === 'moe' || m.architecture === 'dense') return m.architecture;
      const caps = new Set((m.capabilities || []).map((c) => String(c).toLowerCase()));
      if (m.param_active_b != null && m.param_b != null && m.param_active_b < m.param_b) return 'moe';
      if (m.param_active_b != null && m.param_b != null && m.param_active_b === m.param_b) return 'dense';
      if (caps.has('moe')) return 'moe';
      if (caps.has('dense')) return 'dense';
      if (m.param_b != null && (m.param_active_b == null || m.param_active_b === 0)) return 'dense';
      return null;
    }
    function archLabel(m) { const a = modelArchitecture(m); return a === 'moe' ? 'MoE' : a === 'dense' ? 'Dense' : '—'; }
    function archTitle(m) {
      const a = modelArchitecture(m);
      if (a === 'moe') { const active = m.param_active_b != null ? `${m.param_active_b}B active` : 'sparse experts'; const total = m.param_b != null ? ` / ${m.param_b}B total` : ''; return `Mixture-of-Experts · ${active}${total}`; }
      if (a === 'dense' && m.param_b != null) return `Dense · ${m.param_b}B parameters per token`;
      if (a === 'dense') return 'Dense architecture';
      return 'Architecture unknown';
    }

    /* ── RAIL CELL RENDERERS (reused in table cells + pane) ── */
    function railEmpty() { return '<span class="rail-empty">—</span>'; }
    function railEngineCell(m) {
      const engines = modelEngines(m);
      if (!engines.length) return railEmpty();
      const labels = [...new Set(engines.map((e) => engineLabels[e] || e))];
      const text = labels.length > 1 ? labels.join('+') : labels[0];
      const tip = labels.map((e, i) => engineTitle(engines[i]) || e).join(' · ');
      return `<span class="badge engine engine-${esc(engineCssClass(engines[0]))}" title="${esc(tip)}">${esc(text)}</span>`;
    }
    function railInferenceCell(m) {
      const profiles = m.inference_profiles || [];
      if (!profiles.length) return railEmpty();
      const loading = inferenceLoadingInfo();
      if (loading && loading.profile) {
        const match = profiles.find((p) => p.id === loading.profile);
        if (match) { const short = loading.phase === 'switch' ? 'Switch' : 'Load'; return `<span class="badge inf-loading" title="${esc(inferenceLoadingTitle(loading))}">${esc(short)}</span>`; }
      }
      const activeId = activeProfileId();
      const active = profiles.find((p) => p.id === activeId);
      if (active && infStatus && infStatus.active && infStatus.active.ready) return `<span class="badge inf-active" title="${esc(active.id)}">● active</span>`;
      const testing = profiles.filter((p) => p.lifecycle === 'testing').length;
      if (testing) return `<span class="badge inf-profile" title="${testing} inference recipe${testing === 1 ? '' : 's'} in testing">${testing} testing</span>`;
      const n = profiles.length;
      return `<span class="badge inf-profile" title="${n} inference recipe${n === 1 ? '' : 's'}">${n} recipe${n === 1 ? '' : 's'}</span>`;
    }
    function railArchCell(m) {
      const a = modelArchitecture(m);
      if (!a) return railEmpty();
      return `<span class="badge arch-${a}" title="${esc(archTitle(m))}">${esc(archLabel(m))}</span>`;
    }
    function railBenchCell(m) {
      if (m.best_bench_tok_s == null || Number.isNaN(Number(m.best_bench_tok_s))) return railEmpty();
      const n = Math.round(m.best_bench_tok_s);
      return `<span title="${n} tok/s">${n}</span>`;
    }

    /* ── SORT ────────────────────────────────────────────── */
    function modelSortValue(m, col) {
      switch (col) {
        case 'model':   return (m.name || '').toLowerCase();
        case 'local':   return m.combined_size_bytes || (m.local && m.local.size_bytes) || 0;
        case 'shelf':   return (m.shelf && m.shelf.size_bytes) || 0;
        case 'ctx':     return m.max_context || 0;
        case 'params':  return m.param_b != null ? Number(m.param_b) : null;
        case 'active':  return m.param_active_b != null ? Number(m.param_active_b) : null;
        case 'spark':   return sparkStatus(m);
        case 'dl':      return m.status || '';
        case 'arch':    return modelArchitecture(m) || '';
        case 'bench':   return m.best_bench_tok_s != null ? Number(m.best_bench_tok_s) : null;
        case 'release_date': default: return parseDate(m.release_date);
      }
    }

    function compareModelsBySortState(a, b) {
      const av = modelSortValue(a, sortCol);
      const bv = modelSortValue(b, sortCol);
      if (window.SparkInventoryGrid) {
        const r = SparkInventoryGrid.compareValues({ _v: av }, { _v: bv }, '_v', sortDir);
        return r || (a.name || '').localeCompare(b.name || '');
      }
      // fallback without module
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      let r;
      if (typeof av === 'string' && typeof bv === 'string') {
        r = av.localeCompare(bv);
      } else {
        r = av < bv ? -1 : av > bv ? 1 : 0;
      }
      if (sortDir === 'desc') r = -r;
      return r || (a.name || '').localeCompare(b.name || '');
    }

    function sortModels(models) { return [...models].sort(compareModelsBySortState); }

    function handleColumnSort(col) {
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col; sortDir = 'asc';
      }
      savePrefs();
      applyFilters();
    }

    /* ── SPARK FILTER ────────────────────────────────────── */
    function loadSparkFilters(stored) {
      if (Array.isArray(stored.sparkFilters)) return stored.sparkFilters.map((f) => f === 'queued' ? 'pending-delete' : f).filter((f) => SPARK_FILTER_OPTS.includes(f));
      if (stored.worksOnly) return ['works'];
      const legacy = stored.sparkFilter || '';
      return legacy && SPARK_FILTER_OPTS.includes(legacy) ? [legacy] : [];
    }
    function modelMatchesSparkFilter(m) {
      if (!sparkFilters.length) return true;
      return sparkFilters.some((f) => {
        if (f === 'pending-delete') return removalPending(m);
        if (f === 'golden') return !!m.is_golden;
        return sparkStatus(m) === f;
      });
    }
    function updateSparkFilterChips() {
      document.querySelectorAll('#filter-chips .chip[data-spark]').forEach((chip) => {
        const val = chip.dataset.spark;
        const on = val === '' ? !sparkFilters.length : sparkFilters.includes(val);
        chip.classList.toggle('active', on);
        chip.classList.toggle('spark-works', on && val === 'works');
        chip.classList.toggle('spark-failed', on && val === 'failed');
        chip.classList.toggle('spark-wip', on && val === 'wip');
        chip.classList.toggle('spark-pending-delete', on && val === 'pending-delete');
        chip.classList.toggle('spark-golden', on && val === 'golden');
      });
    }
    function updateViewChips() {
      document.querySelectorAll('#filter-chips .chip[data-group]').forEach((chip) => {
        chip.classList.toggle('active', chip.dataset.group === (groupByFamily ? 'family' : 'flat'));
      });
    }
    function setGroupByFamily(on) { groupByFamily = !!on; updateViewChips(); savePrefs(); applyFilters(); }
    function toggleSparkFilter(value) {
      if (!value) { sparkFilters = []; }
      else if (sparkFilters.includes(value)) { sparkFilters = sparkFilters.filter((f) => f !== value); }
      else { sparkFilters = [...sparkFilters, value]; }
      updateSparkFilterChips(); applyFilters();
    }

    /* ── FAMILY GROUPING ─────────────────────────────────── */
    function modelFamilyKey(m) { return m.slug || (m.rel_path || m.id || '').split('/').pop() || m.id || 'other'; }
    function slugFamilyLabel(slug) {
      return (slug || '').split('-').map((w) => {
        if (/^\d+(\.\d+)?$/.test(w)) return w;
        if (/^[a-z]\d/i.test(w)) return w.toUpperCase();
        return w.charAt(0).toUpperCase() + w.slice(1);
      }).join(' ');
    }
    function modelFamilyLabel(items) {
      const names = items.map((m) => m.name).filter(Boolean);
      if (!names.length) return slugFamilyLabel(items[0] && items[0].slug);
      const stripped = names.map((n) => n.replace(/\s*\([^)]*\)\s*$/, '').trim()).filter(Boolean);
      const pick = [...stripped].sort((a, b) => a.length - b.length)[0];
      return pick || names[0];
    }
    function modelVariantTitle(m, familyLabel) {
      const name = m.name || '';
      if (!name || name === familyLabel) return '';
      if (name.startsWith(familyLabel)) { const tail = name.slice(familyLabel.length).trim(); return tail.replace(/^\((.+)\)$/, '$1') || tail; }
      const paren = name.match(/\(([^)]+)\)\s*$/);
      if (paren) return paren[1];
      return name;
    }
    function groupModels(models) {
      const groups = new Map();
      models.forEach((m) => { const key = modelFamilyKey(m); if (!groups.has(key)) groups.set(key, []); groups.get(key).push(m); });
      return [...groups.entries()].map(([key, items]) => {
        const sorted = [...items].sort((a, b) => compareModelsBySortState(a, b) || a.lab.localeCompare(b.lab));
        return { key, family: modelFamilyLabel(sorted), items: sorted };
      }).sort((a, b) => compareModelsBySortState(a.items[0], b.items[0]));
    }
    function modelGroupShouldOpen(key, multiGroup, group) {
      if (modelGroupsOpen.has(key)) return true;
      if (!multiGroup) return true;
      const hasExpanded = group.items.some((m) => m.id === selectedModelId);
      const hasHighlight = highlightPath && group.items.some((m) => m.rel_path === highlightPath || m.id === highlightPath);
      const hasLocal = group.items.some(modelHasLocal);
      const hasActive = group.items.some(modelHasActiveInference);
      return hasExpanded || hasHighlight || hasLocal || hasActive;
    }

    /* ── TABLE RENDER ────────────────────────────────────── */
    function renderTableHead() {
      const cells = TABLE_COLS.map((col) => {
        const isSorted = sortCol === col.key;
        const dir = isSorted ? sortDir : '';
        const ind = isSorted ? (dir === 'desc' ? ' ↓' : ' ↑') : '';
        const ariaSort = isSorted ? ` aria-sort="${dir === 'desc' ? 'descending' : 'ascending'}"` : '';
        const sortable = col.sortable ? ' sortable' : '';
        const sortAttr = col.sortable ? ` data-sort-col="${col.key}"` : '';
        return `<th class="col-${col.key}${sortable}"${ariaSort}${sortAttr} data-col="${col.key}">${esc(col.label)}${ind}</th>`;
      }).join('');
      $('models-thead').innerHTML = `<tr>${cells}</tr>`;
    }

    function renderModelTableRow(m, opts) {
      opts = opts || {};
      const grouped = !!opts.grouped;
      const familyLabel = opts.familyLabel || '';
      const id = esc(m.id);
      const queued = removalPending(m);
      const highlighted = highlightPath && (m.rel_path === highlightPath || m.id === highlightPath);
      const selected = selectedModelId === m.id;

      let modelCell;
      if (grouped) {
        const variant = modelVariantTitle(m, familyLabel);
        const variantHtml = variant ? `<span class="row-variant"> ${esc(variant)}</span>` : '';
        modelCell = `<span class="model-name" title="${esc(m.name)}"><span class="row-lab">${esc(m.lab)}</span>${variantHtml}</span>`
          + `<span class="model-path" title="${esc(m.rel_path || m.id)}">${esc(m.rel_path || m.id)}</span>`;
      } else {
        modelCell = `<span class="model-name" title="${esc(m.name)}">${esc(m.name)}</span>`
          + `<span class="model-path" title="${esc(m.rel_path || m.id)}">${esc(m.rel_path || m.id)}</span>`;
      }
      if (queued) modelCell += `<span class="pending-del-tag">✕ delete</span>`;
      if (m.is_golden) modelCell += `<span class="badge golden-tag">Golden</span>`;
      if (requiresTargetLine(m)) modelCell += requiresTargetLine(m);

      const spark = sparkStatus(m);
      const paramsVal = m.param_b ? m.param_b + 'B' : '—';
      const activeVal = m.param_active_b ? m.param_active_b + 'B' : '—';
      const caps = catalogCapabilities(m).slice(0, 3);
      const capsHtml = caps.length ? caps.map(c => `<span class="badge cap">${esc(formatTagLabel(c))}</span>`).join('') : '<span class="rail-empty">—</span>';

      const cls = ['model-row', selected ? 'selected' : '', queued ? 'pending-delete' : '', highlighted ? 'highlight' : '', grouped ? 'family-member' : ''].filter(Boolean).join(' ');
      const familyAttr = opts.familyKey ? ` data-family-key="${esc(opts.familyKey)}"` : '';
      const hiddenAttr = opts.hidden ? ' hidden' : '';

      return `<tr class="${cls}" data-id="${id}" data-path="${esc(m.rel_path || m.id)}"${familyAttr}${hiddenAttr}>
        <td class="col-model" data-col="model">${modelCell}</td>
        <td class="col-local" data-col="local">${esc(localSize(m))}</td>
        <td class="col-shelf" data-col="shelf">${esc(shelfSize(m))}</td>
        <td class="col-ctx" data-col="ctx">${esc(fmtCtx(m.max_context))}</td>
        <td class="col-params" data-col="params">${esc(paramsVal)}</td>
        <td class="col-active" data-col="active">${esc(activeVal)}</td>
        <td class="col-spark" data-col="spark"><span class="badge spark-${spark}">${esc(sparkLabels[spark])}</span></td>
        <td class="col-dl" data-col="dl"><span class="badge status-${esc(m.status || 'missing')}">${esc(m.status || 'missing')}</span></td>
        <td class="col-release_date" data-col="release_date">${fmtRelease(m)}</td>
        <td class="col-arch" data-col="arch">${railArchCell(m)}</td>
        <td class="col-engine" data-col="engine">${railEngineCell(m)}</td>
        <td class="col-inf" data-col="inf">${railInferenceCell(m)}</td>
        <td class="col-bench" data-col="bench">${railBenchCell(m)}</td>
        <td class="col-caps" data-col="caps">${capsHtml}</td>
      </tr>`;
    }

    function renderTable(models) {
      const empty = $('models-empty');
      const table = $('models-table');
      if (!models.length) {
        table.hidden = true; empty.hidden = false;
        $('models-tbody').innerHTML = '';
        return;
      }
      table.hidden = false; empty.hidden = true;

      renderTableHead();

      let rows = '';
      if (groupByFamily) {
        const groups = groupModels(models);
        const multiGroup = groups.length > 1;
        groups.forEach((g) => {
          if (g.items.length === 1) {
            rows += renderModelTableRow(g.items[0]);
            return;
          }
          const hasActive = g.items.some(modelHasActiveInference);
          const hasLocal = g.items.some(modelHasLocal);
          if (hasActive) modelGroupsOpen.add(g.key);
          const open = modelGroupShouldOpen(g.key, multiGroup, g);
          const localCount = g.items.filter(modelHasLocal).length;
          const localHint = localCount ? ` · ${localCount} local` : '';
          const activeTag = hasActive ? `<span class="family-active-tag">● active</span>` : '';
          const headCls = ['family-head-row', hasActive ? 'has-active' : '', !open ? 'collapsed' : ''].filter(Boolean).join(' ');
          rows += `<tr class="${headCls}" data-family-key="${esc(g.key)}">
            <td colspan="${visibleColumnCount()}">
              <button type="button" class="family-toggle" aria-label="Toggle family">▸</button>
              <span class="family-name">${esc(g.family)}</span>
              <span class="family-meta">${g.items.length} models${localHint}</span>
              ${activeTag}
            </td>
          </tr>`;
          g.items.forEach((m) => {
            rows += renderModelTableRow(m, { grouped: true, familyLabel: g.family, familyKey: g.key, hidden: !open });
          });
        });
      } else {
        rows = models.map((m) => renderModelTableRow(m)).join('');
      }
      $('models-tbody').innerHTML = rows;
      scrollToHighlight();
    }

    function render(models) {
      benchNoteDrafts = captureBenchNoteDrafts();
      renderTable(models);
      renderJobBanner();
    }

    /* ── DETAIL PANE ─────────────────────────────────────── */
    function openPane(modelId) {
      const model = all.find((m) => m.id === modelId);
      if (!model) return;
      selectedModelId = modelId;
      document.body.dataset.pane = '1';
      $('pane-title').textContent = model.name || model.id;
      $('pane-body').innerHTML = renderDetail(model);
      restoreOpenBenchHistories();
      updateSelectedRow();
    }

    function closePane() {
      selectedModelId = null;
      delete document.body.dataset.pane;
      $('pane-title').textContent = '';
      $('pane-body').innerHTML = '';
      updateSelectedRow();
    }

    function visibleModelRowIds() {
      return [...document.querySelectorAll('tr.model-row:not([hidden])')]
        .map((tr) => tr.dataset.id)
        .filter(Boolean);
    }

    function navigatePane(step) {
      const ids = visibleModelRowIds();
      if (!ids.length) return;
      let idx = selectedModelId ? ids.indexOf(selectedModelId) : -1;
      if (idx < 0) idx = step > 0 ? -1 : ids.length;
      idx = Math.max(0, Math.min(ids.length - 1, idx + step));
      openPane(ids[idx]);
      const tr = document.querySelector(`tr.model-row[data-id="${CSS.escape(ids[idx])}"]`);
      if (tr) tr.scrollIntoView({ block: 'nearest' });
    }

    function updateSelectedRow() {
      document.querySelectorAll('tr.model-row.selected').forEach((tr) => tr.classList.remove('selected'));
      if (selectedModelId) {
        const tr = document.querySelector(`tr.model-row[data-id="${CSS.escape(selectedModelId)}"]`);
        if (tr) tr.classList.add('selected');
      }
    }

    function refreshPane() {
      if (!selectedModelId) return;
      const model = all.find((m) => m.id === selectedModelId);
      if (!model) { closePane(); return; }
      benchNoteDrafts = captureBenchNoteDrafts();
      $('pane-title').textContent = model.name || model.id;
      $('pane-body').innerHTML = renderDetail(model);
      restoreOpenBenchHistories();
    }

    function paneInputFocused() {
      const el = document.activeElement;
      return !!el && el.closest && el.closest('#pane-body') &&
        (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
    }

    /* ── DETAIL CONTENT RENDERERS ────────────────────────── */
    function locBadge(label, loc, mounted) {
      if (!mounted && label === 'NAS') return '<span class="loc-badge warn">NAS offline</span>';
      if (loc && loc.present) return `<span class="loc-badge on">${esc(loc.size_human)}</span>`;
      return '<span class="loc-badge off">not present</span>';
    }

    function lifeBadge(lifecycle) {
      const lc = lifecycle || 'production';
      return `<span class="badge life-${esc(lc)}">${esc(lc)}</span>`;
    }

    function recipeFeatureBadges(p) {
      const tags = new Set((p.tags || []).map((t) => String(t).toLowerCase()));
      const spec = p.speculative || {};
      let html = '';
      if (spec.method === 'dflash' || tags.has('dflash')) html += '<span class="badge spec-dflash">DFlash</span>';
      if (p.mtp || spec.method === 'mtp' || tags.has('mtp')) html += '<span class="badge spec-mtp">MTP</span>';
      return html;
    }

    function renderGoldenBlock(m) {
      if (!m.is_golden) return '';
      const prof = m.golden_profile || '—';
      const gp = (m.inference_profiles || []).find((p) => p.id === prof);
      const ctx = gp && gp.ctx_ladder ? gp.ctx_ladder.golden_ctx : (m.max_context || '—');
      const tok = m.best_bench_tok_s != null ? Math.round(m.best_bench_tok_s) + ' tok/s' : '—';
      const ladderN = gp && gp.ctx_ladder && gp.ctx_ladder.rungs ? gp.ctx_ladder.rungs.length : 0;
      const kvN = gp && gp.kv_sweep && gp.kv_sweep.results ? gp.kv_sweep.results.length : 0;
      const matrixNote = (ladderN || kvN) ? `${ladderN} ctx rung${ladderN === 1 ? '' : 's'} · ${kvN} KV point${kvN === 1 ? '' : 's'} in git` : 'Bench matrix pending — run golden workflow';
      const localNote = (m.local && m.local.present) ? 'On disk locally' : 'Not downloaded — use Download from HF or NAS Fetch';
      return `<div class="detail-section golden-block"><h4>GB10 golden recipe</h4><div class="verify-note">${esc(localNote)}</div><div class="storage-row"><span class="storage-label">Profile</span><code>${esc(prof)}</code></div><div class="storage-row"><span class="storage-label">Headline</span><span>${esc(tok)}</span></div><div class="storage-row"><span class="storage-label">Matrix</span><span>${esc(matrixNote)}</span></div></div>`;
    }

    function renderKvSweepPanel(sweep) {
      const rows = sweep && Array.isArray(sweep.results) ? sweep.results : [];
      if (!rows.length) return '';
      const ctx = sweep.golden_ctx;
      const body = rows.map((r) => {
        const st = r.status || 'pending';
        const cls = st === 'ok' ? 'status-ready' : st === 'load_fail' ? 'status-failed' : 'status-wip';
        const tok = r.tok_s != null ? `${Math.round(r.tok_s)} tok/s` : '—';
        return `<tr><td>${esc(r.kv || '—')}</td><td>${fmtCtx(ctx)}</td><td><span class="badge ${cls}">${esc(st)}</span></td><td>${tok}</td></tr>`;
      }).join('');
      const when = sweep.tested_at ? sweep.tested_at.slice(0, 10) : '';
      const meta = `golden ctx ${fmtCtx(ctx)} · fill ${Math.round((sweep.fill_ratio || 0.75) * 100)}%`;
      return `<details class="ctx-ladder"><summary>KV sweep${when ? ' (' + when + ')' : ''}</summary><div class="verify-note">${esc(meta)}</div><table class="ctx-ladder-table"><thead><tr><th>KV</th><th>Ctx</th><th>Status</th><th>Decode</th></tr></thead><tbody>${body}</tbody></table></details>`;
    }

    function renderCtxLadderPanel(ladder) {
      if (!ladder || !Array.isArray(ladder.rungs) || !ladder.rungs.length) return '';
      const maxV = ladder.max_viable_ctx;
      const rows = ladder.rungs.map((r) => {
        const st = r.status || 'pending';
        const cls = st === 'ok' ? 'status-ready' : st === 'load_fail' ? 'status-failed' : 'status-wip';
        const tok = r.tok_s != null ? `${Math.round(r.tok_s)} tok/s` : '—';
        const fill = r.fill_target ? fmtCtx(r.fill_target) : '—';
        return `<tr><td>${fmtCtx(r.ctx)}</td><td>${fill}</td><td><span class="badge ${cls}">${esc(st)}</span></td><td>${tok}</td></tr>`;
      }).join('');
      const meta = `golden ${fmtCtx(ladder.golden_ctx)} → native ${fmtCtx(ladder.native_ctx)} · fill ${Math.round((ladder.fill_ratio || 0.75) * 100)}% · max viable ${fmtCtx(maxV)}`;
      const when = ladder.tested_at ? ladder.tested_at.slice(0, 10) : '';
      return `<details class="ctx-ladder"><summary>Context ladder${when ? ' (' + when + ')' : ''}</summary><div class="verify-note">${esc(meta)}</div><table class="ctx-ladder-table"><thead><tr><th>Ctx</th><th>Fill</th><th>Status</th><th>Decode</th></tr></thead><tbody>${rows}</tbody></table></details>`;
    }

    function renderBenchCompareStrip(profiles) {
      const rated = profiles.filter((p) => p.tok_s != null && !Number.isNaN(Number(p.tok_s)));
      if (rated.length < 2) return '';
      const sorted = [...rated].sort((a, b) => Number(b.tok_s) - Number(a.tok_s));
      const best = Number(sorted[0].tok_s) || 1;
      const cells = sorted.map((p) => {
        const n = Math.round(Number(p.tok_s));
        const pct = Math.round((n / best) * 100);
        return `<span class="bench-compare-chip" title="${esc(p.id)}">${recipeFeatureBadges(p)}<strong>${n}</strong> tok/s<span class="bench-compare-pct">${pct}%</span></span>`;
      }).join('');
      return `<div class="bench-compare-strip"><span class="bench-compare-label">Recipe compare</span>${cells}</div>`;
    }

    function inferenceSection(m) {
      const rel = m.rel_path || m.id;
      const onDisk = m.local && m.local.present;
      const profiles = m.inference_profiles || [];
      const switching = inferenceSwitching();
      const activeId = activeProfileId();
      const defaultProfile = primaryInferenceProfile(m);
      const defaultFilterQ = defaultProfile ? '' : (rel.split('/').pop() || rel);
      const openInfAttrs = inferenceNavAttrs(defaultProfile, defaultFilterQ);
      const rows = profiles.map((p) => {
        const lc = p.lifecycle || (p.enabled ? 'production' : 'draft');
        const tier = p.tier === 'heavy' ? '<span class="badge tier-heavy">heavy</span>' : '<span class="badge">fast</span>';
        const tokBadge = p.tok_s != null ? `<span class="badge tok-s">${Math.round(p.tok_s)} tok/s</span>` : '<span class="badge tok-s unbench">not benchmarked</span>';
        const note = p.notes ? `<div class="verify-note">${esc(p.notes)}</div>` : '';
        let actions = '';
        if (lc === 'draft') {
          actions = `<button type="button" class="btn primary" data-action="recipe-testing" data-profile="${esc(p.id)}">Mark testing</button><button type="button" class="btn" data-action="recipe-discard" data-profile="${esc(p.id)}">Discard</button>`;
        } else if (p.id === activeId) {
          const ready = infStatus && infStatus.active && infStatus.active.ready;
          const loadInfo = inferenceLoadingInfo();
          actions = ready
            ? '<span class="badge status-ready">active</span><a href="#" data-portal-nav="inference"' + inferenceNavAttrs(p.id, '') + '>Inference ↗</a>'
            : '<span class="badge inf-loading" title="' + esc(inferenceLoadingTitle(loadInfo)) + '">' + esc(inferenceLoadingLabel(loadInfo)) + '</span><a href="#" data-portal-nav="inference" data-inf-log-focus="1"' + inferenceNavAttrs(p.id, '') + '>View progress ↗</a>';
        } else if (switching && infStatus.switch && infStatus.switch.profile === p.id) {
          const loadInfo = inferenceLoadingInfo();
          actions = '<span class="badge inf-loading" title="' + esc(inferenceLoadingTitle(loadInfo)) + '">' + esc(inferenceLoadingLabel(loadInfo)) + '</span><a href="#" data-portal-nav="inference" data-inf-log-focus="1"' + inferenceNavAttrs(p.id, '') + '>View progress ↗</a>';
        } else if (switching) {
          actions = '<button type="button" class="btn" disabled>Switch in progress</button>';
        } else if (lc === 'testing' || p.enabled) {
          actions = `<button type="button" class="btn primary" data-action="start-profile" data-profile="${esc(p.id)}" data-tier="${esc(p.tier || '')}">Start</button>`
            + (lc === 'testing' ? `<button type="button" class="btn" data-action="recipe-promote" data-profile="${esc(p.id)}">Promote</button><button type="button" class="btn" data-action="recipe-discard" data-profile="${esc(p.id)}">Discard</button>` : '');
        } else {
          actions = '<span class="badge">off</span>';
        }
        const runCount = p.bench_run_count || 0;
        const histSummary = runCount ? `Benchmark history (${runCount})` : 'Benchmark history';
        const histOpen = benchHistoryOpen.has(p.id) ? ' open' : '';
        const ladderPanel = renderCtxLadderPanel(p.ctx_ladder) + renderKvSweepPanel(p.kv_sweep);
        return `<div class="inf-profile-block"><div class="inf-profile-row"><div class="inf-profile-info"><strong>${esc(p.name || p.id)}</strong><code>${esc(p.id)} · ${esc(p.engine || '')} · recipe</code>${note}</div><div class="inf-profile-actions">${lifeBadge(lc)}${recipeFeatureBadges(p)}${tier}${tokBadge}${actions}</div></div>${ladderPanel}<details class="bench-history" data-profile="${esc(p.id)}"${histOpen}><summary>${histSummary}</summary><div class="bench-history-panel"></div></details></div>`;
      }).join('');
      const create = onDisk && !isSidecarModel(m)
        ? `<div class="recipe-lab-create"><span class="verify-label">New recipe</span><button type="button" class="btn primary" data-action="recipe-scaffold" data-path="${esc(rel)}" title="Auto-detect engine (GGUF, eugr, MTP, DFlash)">Auto-scaffold</button></div>`
        : (isSidecarModel(m) ? '<div class="verify-note">Sidecar — recipes are managed from the base model.</div>' : '<div class="meta-warn">Model not on disk locally — fetch before creating a recipe.</div>');
      return `<div class="detail-section inference-block"><h4>Model Lab (recipes)</h4><div class="verify-note">Per <em>recipe</em> (engine + quant). Mark testing → <strong>Start</strong> here → bench on Inference → promote.</div>${renderBenchCompareStrip(profiles)}${rows || '<div class="meta-warn">No recipes yet.</div>'}${create}<div class="actions" style="margin-top:.55rem"><a href="#" data-portal-nav="inference"${openInfAttrs}>Open Inference tab ↗</a></div></div>`;
    }

    function renderDetail(m) {
      const rel = esc(m.rel_path || m.id);
      const spark = sparkStatus(m);
      const sv = m.spark_verify || {};
      const queued = removalPending(m);
      const busy = modelBusy(m);
      const verifyBtns = ['unverified', 'wip', 'works', 'failed'].map(s => {
        const label = s === 'unverified' ? 'Untested' : s === 'wip' ? 'Testing' : s === 'works' ? 'Works' : 'Failed';
        return `<button type="button" class="btn verify${spark === s ? ' active active-' + s : ''}" data-verify="${s}" data-path="${rel}">${label}</button>`;
      }).join('');
      const vars = (m.variants || []).length ? `<div class="variants detail-section"><table><tr><th>Format</th><th>Engine</th><th>Size</th><th>Status</th></tr>${m.variants.map(v => `<tr><td>${esc(v.format)}</td><td>${esc(v.engine)}</td><td>${esc(v.size_human)}</td><td>${esc(v.status)}</td></tr>`).join('')}</table></div>` : '';
      const queueBtn = queued
        ? `<button type="button" class="btn danger active" data-action="queue-removal" data-pending="0" data-path="${rel}">Cancel removal</button>`
        : `<button type="button" class="btn danger" data-action="queue-removal" data-pending="1" data-scope="local" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) ? 'disabled' : ''}>Queue local removal</button><button type="button" class="btn danger" data-action="queue-removal" data-pending="1" data-scope="both" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) || !(m.shelf && m.shelf.present) || !shelfMounted ? 'disabled' : ''} title="${!(m.shelf && m.shelf.present) ? 'Not on NAS shelf' : ''}">Queue full removal</button>`;
      const caps = catalogCapabilities(m);
      const task = m.pipeline_tag;
      const hfTags = notableHfTags(m);
      const hfPreview = hfTags.slice(0, 4);
      const hfExtra = hfTags.slice(4);
      const tagBlock = (caps.length || task || hfPreview.length) ? `<div class="detail-section tag-block">${caps.length ? `<div class="tag-line"><span class="tag-line-label">Catalog</span><span class="tag-line-val">${tagLine(caps)}</span></div>` : ''}${task ? `<div class="tag-line"><span class="tag-line-label">HF task</span><span class="tag-line-val"><span class="badge hf-task">${esc(formatTagLabel(task))}</span></span></div>` : ''}${hfPreview.length ? `<div class="tag-line"><span class="tag-line-label">HF tags</span><span class="tag-line-val">${tagLine(hfPreview)}</span></div>` : ''}${hfExtra.length ? `<details class="tag-more"><summary>${hfExtra.length} more HF tag${hfExtra.length === 1 ? '' : 's'}</summary>${tagLine(hfExtra)}</details>` : ''}${m.hf_url ? `<div class="tag-line" style="margin-top:.5rem"><span class="tag-line-label"></span><span class="tag-line-val"><a href="${esc(m.hf_url)}" target="_blank" rel="noopener">All tags on Hugging Face ↗</a></span></div>` : ''}</div>` : '';
      const goldenBlock = renderGoldenBlock(m);
      const fetchBtn = m.is_golden && !(m.local && m.local.present)
        ? `<button type="button" class="btn primary" data-action="fetch" data-path="${rel}" ${busy ? 'disabled' : ''}>Download from HF</button>`
        : '';
      const queueNote = queued
        ? (removalShelf(m)
          ? '<div class="queue-note">Pending delete — local + NAS copies purge daily at 03:00.</div>'
          : '<div class="queue-note">Pending delete — local copy purges daily at 03:00. NAS shelf copy is kept.</div>')
        : '';
      return `${tagBlock}${summaryBlock(m)}${goldenBlock}${isSidecarModel(m) && m.requires_target ? `<div class="detail-section"><h4>Speculative sidecar</h4><div class="verify-note">DFlash add-on for <code>${esc(m.requires_target)}</code>. Bench score and combined disk size include base + drafter.</div></div>` : ''}${inferenceSection(m)}<div class="detail-section verify-row"><span class="verify-label">Spark</span>${verifyBtns}</div>${sv.note ? `<div class="verify-note">${esc(sv.note)}</div>` : ''}<div class="detail-section storage">${isSidecarModel(m) ? `<div class="storage-row"><span class="storage-label">Combined</span><span>${esc(localSize(m))}</span></div><div class="storage-row"><span class="storage-label">Add-on</span>${locBadge('Local add-on', m.local, true)}</div>${m.requires_target ? `<div class="storage-row"><span class="storage-label">Requires</span><span><code>${esc(m.requires_target)}</code>${m.requires_target_size_human ? ' · ' + esc(m.requires_target_size_human) + ' base' : ''}</span></div>` : ''}` : `<div class="storage-row"><span class="storage-label">Local</span>${locBadge('Local', m.local, true)}</div>`}<div class="storage-row"><span class="storage-label">NAS</span>${locBadge('NAS', m.shelf, shelfMounted)}</div><div class="actions">${fetchBtn}<button type="button" class="btn primary" data-action="pull" data-path="${rel}" ${!shelfMounted || !(m.shelf && m.shelf.present) || busy ? 'disabled' : ''}>Fetch ↓</button><button type="button" class="btn" data-action="push" data-path="${rel}" ${!shelfMounted || !(m.local && m.local.present) || busy ? 'disabled' : ''}>Push ↑</button>${queueBtn}<button type="button" class="btn warn-outline" data-action="remove-local" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) || busy ? 'disabled' : ''}>Delete local now</button></div>${queueNote}</div>${vars}`;
    }

    /* ── BENCH HISTORY ───────────────────────────────────── */
    function formatBenchWhen(iso) { if (!iso) return '—'; return String(iso).slice(0, 19).replace('T', ' '); }

    function captureBenchNoteDrafts() {
      const drafts = {};
      document.querySelectorAll('.bench-note-input').forEach((ta) => {
        const key = (ta.dataset.profile || '') + ':' + (ta.dataset.runId || '');
        if (key !== ':') drafts[key] = ta.value;
      });
      return drafts;
    }

    function renderBenchHistoryPanel(panel, data, profile) {
      const runs = data.runs || [];
      if (!runs.length) { panel.innerHTML = '<div class="meta-warn">No runs yet — bench on Inference tab.</div>'; panel.dataset.loaded = '1'; return; }
      const latestId = (data.latest || {}).latest_run_id;
      const rows = runs.map((run) => {
        const tok = run.tok_s != null ? Math.round(run.tok_s) + ' tok/s' : '—';
        const range = (run.tok_s_min != null && run.tok_s_max != null) ? ` (${Math.round(run.tok_s_min)}–${Math.round(run.tok_s_max)})` : '';
        const sys = run.system_note ? `<div class="verify-note">${esc(run.system_note)}</div>` : '';
        const cls = run.id === latestId ? 'latest' : '';
        const draftKey = profile + ':' + run.id;
        const noteVal = benchNoteDrafts[draftKey] != null ? benchNoteDrafts[draftKey] : (run.note || '');
        return `<tr class="${cls}"><td>${esc(formatBenchWhen(run.measured_at))}</td><td>${esc(tok + range)}<br><code>${esc(run.method || '')}</code>${sys}</td><td><textarea class="bench-note-input" rows="2" data-profile="${esc(profile)}" data-run-id="${esc(run.id)}">${esc(noteVal)}</textarea><button type="button" class="btn bench-note-save" data-action="bench-note-save" data-profile="${esc(profile)}" data-run-id="${esc(run.id)}">Save note</button></td></tr>`;
      }).join('');
      panel.innerHTML = `<table class="bench-history-table"><thead><tr><th>When</th><th>Speed</th><th>Note</th></tr></thead><tbody>${rows}</tbody></table>`;
      panel.dataset.loaded = '1';
    }

    async function loadBenchHistory(detailsEl, opts) {
      opts = opts || {};
      const profile = detailsEl.dataset.profile;
      const panel = detailsEl.querySelector('.bench-history-panel');
      if (!profile || !panel) return;
      const cached = benchHistoryCache[profile];
      if (!opts.force && cached) { renderBenchHistoryPanel(panel, cached, profile); return; }
      panel.dataset.loaded = '0';
      panel.innerHTML = '<div class="meta-warn">Loading…</div>';
      try {
        const res = await fetch('/api/inference/benchmarks/' + encodeURIComponent(profile) + '/history', { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        benchHistoryCache[profile] = data;
        renderBenchHistoryPanel(panel, data, profile);
      } catch (err) {
        panel.dataset.loaded = '0';
        panel.innerHTML = `<div class="meta-warn">${esc(err.message)}</div>`;
      }
    }

    function restoreOpenBenchHistories() {
      document.querySelectorAll('#pane-body details.bench-history[open]').forEach((det) => {
        const panel = det.querySelector('.bench-history-panel');
        if (panel && panel.dataset.loaded === '1') return;
        loadBenchHistory(det);
      });
    }

    async function saveBenchNote(profile, runId, note, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/inference/benchmarks/' + encodeURIComponent(profile) + '/runs/' + encodeURIComponent(runId), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ note }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const cache = benchHistoryCache[profile];
        if (cache && cache.runs) { const run = cache.runs.find((r) => r.id === runId); if (run) run.note = note; }
        delete benchNoteDrafts[profile + ':' + runId];
        btn.textContent = 'Saved'; setTimeout(() => { btn.textContent = 'Save note'; }, 1500);
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    /* ── INFERENCE STATUS ────────────────────────────────── */
    function infStatusSnapshot(data) {
      if (!data) return '';
      const a = data.active; const loading = data.loading;
      return [a && a.id, a && a.ready, a && a.starting, data.switch && data.switch.running, data.switch && data.switch.profile, loading && loading.profile, loading && loading.phase, data.bench && data.bench.running].join(';');
    }

    async function refreshInferenceStatus() {
      try {
        const res = await fetch('/api/inference/status?lite=1', { cache: 'no-store' });
        if (!res.ok) return;
        infStatus = await res.json();
        const snap = infStatusSnapshot(infStatus);
        const prev = lastInfSnapshot;
        lastInfSnapshot = snap;
        if (prev && snap !== prev && (selectedModelId || highlightPath) && !document.hidden && !paneInputFocused()) refreshPane();
      } catch (_) {}
    }

    /* ── RECIPE PATCHING ─────────────────────────────────── */
    function patchRecipeOnModel(recipe) {
      if (!recipe || !recipe.id) return;
      const inv = recipe.inventory_path;
      if (!inv) return;
      const model = all.find((m) => (m.rel_path || m.id) === inv);
      if (!model) return;
      const profiles = [...(model.inference_profiles || [])];
      const i = profiles.findIndex((p) => p.id === recipe.id);
      const base = i >= 0 ? profiles[i] : { id: recipe.id, name: recipe.name, engine: recipe.engine, tier: recipe.tier };
      const updated = { ...base, lifecycle: recipe.lifecycle, enabled: recipe.lifecycle === 'production' || recipe.lifecycle === 'works' };
      if (i >= 0) profiles[i] = updated; else profiles.push(updated);
      model.inference_profiles = profiles;
