# Ornith 35B MoE eugr (nvfp4) — A/B compare
recipe_version: "1"
name: deepreinforce-ai-ornith-1-0-35b-nvfp4-eugr
description: eugr vLLM serve Ornith-1.0-35B nvfp4

model: ornith-1.0-35b-nvfp4
container: vllm-node

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.8
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 16384

command: |
  vllm serve /models/deepreinforce-ai/ornith-1.0-35b/nvfp4 \
    --host {host} \
    --port {port} \
    --served-model-name ornith-1.0-35b-nvfp4 \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --reasoning-parser qwen3 \
    --kv-cache-dtype auto \
    --attention-backend flashinfer \
    --moe-backend marlin \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --load-format fastsafetensors
