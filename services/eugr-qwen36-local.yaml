# Sparky-local recipe: Qwen3.6-35B-A3B NVFP4 from /models (single GB10)
recipe_version: "1"
name: Sparky Qwen3.6 NVFP4 local
description: nvidia/Qwen3.6-35B-A3B-NVFP4 from /models on sparky solo

model: nvidia/Qwen3.6-35B-A3B-NVFP4
container: vllm-node

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 65536
  max_num_seqs: 4
  max_num_batched_tokens: 8192

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

command: |
  vllm serve /models/nvidia/qwen3.6-35b-a3b/nvfp4 \
    --host {host} \
    --port {port} \
    --served-model-name qwen3.6-35b-a3b-nvfp4 \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --kv-cache-dtype auto \
    --attention-backend flashinfer \
    --moe-backend marlin \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --load-format fastsafetensors \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_xml \
    --enable-auto-tool-choice
