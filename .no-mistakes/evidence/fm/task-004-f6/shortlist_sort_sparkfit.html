<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TASK-004 Shortlist harness</title>
<!-- Real portal stylesheet (dark theme + .exp-* classes) -->
<link rel="stylesheet" href="../../../../portal/themes/portal.css">
<style>
  /* minimal scaffolding so .exp-card-body flexes like the real portal */
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; }
  .hwrap { flex: 1; min-height: 0; display: flex; flex-direction: column;
           padding: 1rem; gap: .5rem; }
  .exp-card-body { flex: 1; min-height: 0; }
  .exp-spark-badge { font-size: .62rem; font-family: ui-monospace, monospace;
    padding: .06rem .3rem; border-radius: 5px; border: 1px solid var(--border); }
  .exp-spark-badge.recommended { color: var(--accent); border-color: #3a5a2a; background: #141a10; }
  .exp-spark-badge.ok { color: var(--ok); border-color: #2a4a2a; }
  .exp-spark-badge.tight { color: var(--warn); border-color: #4a402a; }
  .exp-spark-badge.too_large, .exp-spark-badge.not_recommended { color: var(--down); border-color: #4a2a2a; }
  .exp-badge { font-size: .58rem; font-family: ui-monospace, monospace; padding: .03rem .26rem;
    border-radius: 4px; margin-right: .15rem; display: inline-block; }
  .exp-badge.gguf { background: #1a2a3a; color: #7eb8ff; }
  .exp-badge.nvfp4 { background: #2a1a3a; color: #c08aff; }
  .exp-badge.moe { background: #3a2a1a; color: #e8b84a; }
  .exp-badge.dense { background: #1a3a2a; color: #6bc46d; }
  .exp-badge.mtp { background: #3a1a2a; color: #e07ab8; }
  .exp-badge.vision { background: #1a3a3a; color: #6bd6d6; }
  .exp-badge.diffusion { background: #2a1a1a; color: #e07a7a; }
  .exp-empty { color: var(--muted); font-size: .78rem; padding: 1.5rem; text-align: center; }
  h1 { font-size: .9rem; color: var(--accent); margin: 0; font-weight: 700; }
  .note { color: var(--muted); font-size: .7rem; font-family: ui-monospace, monospace; }
</style>
</head>
<body class="exp-view">
  <div class="hwrap">
    <h1>TASK-004 · Explore → Shortlist compare view (live render of real JS + CSS)</h1>
    <div class="note">Sub-nav persisted in localStorage 'sparky-explore-tab' · status chips derived from download queue + disk · click headers to sort</div>

    <!-- Sub-nav: Browse | Shortlist | Downloads (real markup from index.html) -->
    <div class="exp-subnav" id="exp-subnav" role="tablist">
      <button type="button" class="exp-subnav-btn" id="exp-tab-browse" role="tab" aria-selected="false" data-exp-tab="browse">Browse</button>
      <button type="button" class="exp-subnav-btn active" id="exp-tab-shortlist" role="tab" aria-selected="true" data-exp-tab="shortlist">Shortlist <span class="exp-shortlist-count" id="exp-shortlist-count">7</span></button>
      <button type="button" class="exp-subnav-btn" id="exp-tab-downloads" role="tab" aria-selected="false" data-exp-tab="downloads">Downloads <span class="exp-shortlist-count" id="exp-downloads-count">2</span></button>
    </div>

    <div class="exp-card-body">
      <div class="exp-tabpane" id="exp-pane-shortlist" role="tabpanel">
        <div class="exp-shortlist-toolbar" id="exp-shortlist-toolbar">
          <div class="exp-shortlist-actions" id="exp-shortlist-bulk-actions">
            <span class="exp-shortlist-sel-label" id="exp-shortlist-sel-label">2 selected</span>
            <button type="button" class="exp-shortlist-btn danger" id="exp-bulk-remove">Remove selected</button>
            <button type="button" class="exp-shortlist-btn" id="exp-bulk-download">Download selected</button>
          </div>
          <div class="exp-shortlist-sort-row">
            <span class="exp-shortlist-summary" id="exp-shortlist-summary"></span>
            <button type="button" class="exp-shortlist-btn small" id="exp-shortlist-select-all">Select all</button>
          </div>
        </div>
        <div class="exp-shortlist-table-wrap" id="exp-shortlist-table-wrap">
          <div class="exp-empty">No models in Shortlist yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Real inventory-grid module (provides compareValues) -->
  <script src="../../../../portal/assets/spark-inventory-grid.js"></script>
  <script>
    // ---- state (mirrors index.html) ----
    let expShortlistItems = [];
    let expShortlistSelected = new Set();
    let expShortlistSort = { col: 'spark_fit', dir: 'asc' };

    // ---- real helpers copied verbatim from portal/index.html ----
    const $ = (id) => document.getElementById(id);
    function attrEsc(text) {
      return String(text).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }
    function escHtml(text) {
      return String(text || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }
    function engineLabel(engine, format) {
      if (engine === 'ds4') return 'DwarfStar';
      if (engine === 'llamacpp' || format === 'gguf') return 'llama.cpp';
      if (format === 'nvfp4') return 'vLLM · NVFP4';
      if (format === 'fp8') return 'vLLM · FP8';
      return 'vLLM · HF';
    }
    function expSparkFitOrder(fit) {
      return { recommended: 0, ok: 1, tight: 2, too_large: 3, not_recommended: 4 }[fit] ?? 5;
    }
    function expShortlistSortItems(items) {
      const { col, dir } = expShortlistSort;
      return items.slice().sort((a, b) => {
        let av, bv;
        if (col === 'spark_fit') {
          av = expSparkFitOrder((a.snapshot || {}).spark_fit);
          bv = expSparkFitOrder((b.snapshot || {}).spark_fit);
        } else if (col === 'size_bytes') {
          av = (a.snapshot || {}).size_bytes ?? null;
          bv = (b.snapshot || {}).size_bytes ?? null;
        } else if (col === 'added_at') {
          av = a.added_at || '';
          bv = b.added_at || '';
        } else if (col === 'repo') {
          av = (a.repo || '').toLowerCase();
          bv = (b.repo || '').toLowerCase();
        } else if (col === 'engine') {
          av = ((a.snapshot || {}).engine || '').toLowerCase();
          bv = ((b.snapshot || {}).engine || '').toLowerCase();
        } else if (col === 'status') {
          av = a.status || '';
          bv = b.status || '';
        } else {
          av = null; bv = null;
        }
        if (window.SparkInventoryGrid) {
          return SparkInventoryGrid.compareValues({ _v: av }, { _v: bv }, '_v', dir);
        }
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        const r = av < bv ? -1 : av > bv ? 1 : 0;
        return dir === 'desc' ? -r : r;
      });
    }
    function expShortlistStatusBadge(status) {
      const map = {
        downloading: '<span class="exp-status-chip downloading">downloading</span>',
        download_queued: '<span class="exp-status-chip queued">queued</span>',
        gated: '<span class="exp-status-chip gated">gated</span>',
        on_disk: '<span class="exp-status-chip on-disk">on disk</span>',
        saved: '<span class="exp-status-chip saved">shortlisted</span>',
      };
      return map[status] || '<span class="exp-status-chip saved">shortlisted</span>';
    }
    function renderShortlist() {
      const wrap = $('exp-shortlist-table-wrap');
      if (!wrap) return;
      const items = expShortlistSortItems(expShortlistItems);
      const total = items.length;
      const summEl = $('exp-shortlist-summary');
      if (summEl) summEl.textContent = total ? total + ' model' + (total === 1 ? '' : 's') + ' in Shortlist' : '';
      const selCount = expShortlistSelected.size;
      const bulkEl = $('exp-shortlist-bulk-actions');
      const selLabel = $('exp-shortlist-sel-label');
      if (bulkEl) bulkEl.hidden = selCount === 0;
      if (selLabel) selLabel.textContent = selCount + ' selected';
      if (!items.length) {
        wrap.innerHTML = '<div class="exp-empty">No models in Shortlist yet. Browse HF and click "Save to Shortlist".</div>';
        return;
      }
      const cols = [
        { key: 'repo', label: 'Repo' },
        { key: 'badges', label: 'Tags', sortable: false },
        { key: 'variant', label: 'Variant', sortable: false },
        { key: 'engine', label: 'Engine' },
        { key: 'size_bytes', label: 'Size' },
        { key: 'spark_fit', label: 'Spark fit' },
        { key: 'status', label: 'Status' },
        { key: 'added_at', label: 'Added' },
        { key: 'actions', label: '', sortable: false },
      ];
      const sortDir = (col) => expShortlistSort.col === col
        ? (expShortlistSort.dir === 'asc' ? ' ↑' : ' ↓') : '';
      const thCls = (col) => 'exp-sl-th' + (col !== 'badges' && col !== 'variant' && col !== 'actions' ? ' sortable' : '');
      const thead = '<thead><tr>'
        + cols.map((c) => '<th class="' + escHtml(thCls(c.key)) + '" data-sl-sort="' + escHtml(c.key) + '">'
          + escHtml(c.label) + escHtml(sortDir(c.key)) + '</th>').join('')
        + '</tr></thead>';
      const tbody = '<tbody>'
        + items.map((item) => {
          const snap = item.snapshot || {};
          const sel = expShortlistSelected.has(item.id);
          const status = item.status || 'saved';
          const badges = Array.isArray(snap.badges) ? snap.badges : [];
          const badgeHtml = badges.map((b) => '<span class="exp-badge ' + escHtml(b) + '">' + escHtml(b.toUpperCase()) + '</span>').join('');
          const sparkFit = snap.spark_fit || '';
          const sparkLabel = snap.spark_fit_label || sparkFit;
          const sparkStar = sparkFit === 'recommended' ? '★ ' : '';
          const sparkCell = sparkFit
            ? '<span class="exp-spark-badge ' + escHtml(sparkFit) + '">' + escHtml(sparkStar + sparkLabel) + '</span>'
            : '—';
          const addedDate = item.added_at ? item.added_at.slice(0, 10) : '—';
          return '<tr class="exp-sl-row' + (sel ? ' selected' : '') + '" data-sl-id="' + attrEsc(item.id) + '" data-sl-repo="' + attrEsc(item.repo) + '">'
            + '<td class="exp-sl-td exp-sl-repo"><label class="exp-sl-check-wrap">'
            + '<input type="checkbox" class="exp-sl-check" data-sl-check="' + attrEsc(item.id) + '"' + (sel ? ' checked' : '') + '>'
            + '<span class="exp-sl-repo-name" title="' + attrEsc(item.repo) + '">' + escHtml(item.repo) + '</span></label></td>'
            + '<td class="exp-sl-td">' + (badgeHtml || '—') + '</td>'
            + '<td class="exp-sl-td exp-sl-variant">' + escHtml(item.variant_label || item.intent || '—') + '</td>'
            + '<td class="exp-sl-td">' + escHtml(engineLabel(snap.engine, snap.format) || '—') + '</td>'
            + '<td class="exp-sl-td exp-sl-size">' + escHtml(snap.size_human || '—') + '</td>'
            + '<td class="exp-sl-td">' + sparkCell + '</td>'
            + '<td class="exp-sl-td">' + expShortlistStatusBadge(status) + '</td>'
            + '<td class="exp-sl-td exp-sl-date">' + escHtml(addedDate) + '</td>'
            + '<td class="exp-sl-td exp-sl-actions">'
            + '<button type="button" class="exp-sl-action-btn" data-sl-dl="' + attrEsc(item.id) + '" title="Queue download">↓</button>'
            + '<button type="button" class="exp-sl-action-btn danger" data-sl-rm="' + attrEsc(item.id) + '" title="Remove">✕</button>'
            + '</td></tr>';
        }).join('')
        + '</tbody>';
      wrap.innerHTML = '<div class="exp-shortlist-scroll"><table class="exp-sl-table">' + thead + tbody + '</table></div>';
    }

    // ---- realistic mock shortlist data exercising every column + status ----
    expShortlistItems = [
      { id: 'a1', repo: 'Qwen/Qwen3-Next-80B-A3B', intent: 'gguf_best', variant_label: 'Q4_K_M · 80B',
        added_at: '2026-06-24T09:12:00Z', status: 'downloading',
        snapshot: { format: 'gguf', engine: 'llamacpp', size_bytes: 46000000000, size_human: '46.0 GB',
          spark_fit: 'recommended', spark_fit_label: 'Fits', badges: ['gguf', 'moe'] } },
      { id: 'a2', repo: 'deepseek-ai/DeepSeek-V3.2-Exp', intent: 'nvfp4_best', variant_label: 'NVFP4 · 671B',
        added_at: '2026-06-23T18:40:00Z', status: 'download_queued',
        snapshot: { format: 'nvfp4', engine: 'vllm', size_bytes: 340000000000, size_human: '340 GB',
          spark_fit: 'tight', spark_fit_label: 'Tight', badges: ['nvfp4', 'moe', 'mtp'] } },
      { id: 'a3', repo: 'meta-llama/Llama-4-Scout-17B-16E', intent: 'gguf_best', variant_label: 'Q5_K_M',
        added_at: '2026-06-25T07:01:00Z', status: 'gated',
        snapshot: { format: 'gguf', engine: 'llamacpp', size_bytes: 21000000000, size_human: '21.0 GB',
          spark_fit: 'ok', spark_fit_label: 'OK', badges: ['gguf', 'moe', 'vision'] } },
      { id: 'a4', repo: 'google/Gemma-3-27B-it', intent: 'gguf_best', variant_label: 'Q4_K_M',
        added_at: '2026-06-20T12:30:00Z', status: 'on_disk',
        snapshot: { format: 'gguf', engine: 'llamacpp', size_bytes: 17000000000, size_human: '17.0 GB',
          spark_fit: 'recommended', spark_fit_label: 'Fits', badges: ['gguf', 'dense', 'vision'] } },
      { id: 'a5', repo: 'nvidia/Nemotron-Ultra-253B', intent: 'gguf_best', variant_label: 'Q4_K_M · 253B',
        added_at: '2026-06-19T22:15:00Z', status: 'saved',
        snapshot: { format: 'gguf', engine: 'llamacpp', size_bytes: 140000000000, size_human: '140 GB',
          spark_fit: 'too_large', spark_fit_label: 'Too large', badges: ['gguf', 'dense'] } },
      { id: 'a6', repo: 'mistralai/Mistral-Small-3.2-24B', intent: 'gguf_best', variant_label: 'Q6_K',
        added_at: '2026-06-26T01:05:00Z', status: 'saved',
        snapshot: { format: 'gguf', engine: 'llamacpp', size_bytes: 20000000000, size_human: '20.0 GB',
          spark_fit: 'recommended', spark_fit_label: 'Fits', badges: ['gguf', 'dense'] } },
      { id: 'a7', repo: 'black-forest-labs/FLUX.1-dev', intent: 'files', variant_label: 'fp8',
        added_at: '2026-06-18T10:00:00Z', status: 'saved',
        snapshot: { format: 'fp8', engine: 'vllm', size_bytes: 17000000000, size_human: '17.0 GB',
          spark_fit: 'not_recommended', spark_fit_label: 'Not recommended', badges: ['diffusion'] } },
    ];
    expShortlistSelected = new Set(['a1', 'a5']); // two selected -> bulk bar shows

    window.renderShortlist = renderShortlist;
    window.setSort = (col, dir) => { expShortlistSort = { col, dir }; renderShortlist(); };

    // wire sort click like the real delegated handler
    document.addEventListener('click', (e) => {
      const th = e.target.closest('[data-sl-sort]');
      if (!th) return;
      const col = th.dataset.slSort;
      if (!col || col === 'badges' || col === 'variant' || col === 'actions') return;
      if (expShortlistSort.col === col) {
        expShortlistSort.dir = expShortlistSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        expShortlistSort = { col, dir: 'asc' };
      }
      renderShortlist();
    });

    renderShortlist();
  </script>
</body>
</html>
