recipe_version: '1'
name: rdtand-qwen3-6-27b-eugr
description: eugr vLLM serve for rdtand/qwen3.6-27b
model: qwen3.6-27b
container: vllm-node
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 8192
command: "vllm serve /models/rdtand/qwen3.6-27b/prismaquant \\\n  --host {host} \\\
  \n  --port {port} \\\n  --served-model-name qwen3.6-27b \\\n  --tensor-parallel-size\
  \ {tensor_parallel} \\\n  --trust-remote-code \\\n  --kv-cache-dtype auto \\\n \
  \ --gpu-memory-utilization {gpu_memory_utilization} \\\n  --max-model-len {max_model_len}\
  \ \\\n  --max-num-seqs {max_num_seqs} \\\n  --max-num-batched-tokens {max_num_batched_tokens}\
  \ \\\n  --enable-chunked-prefill \\\n  --enable-prefix-caching \\\n  --load-format\
  \ auto\n"
