# spark-bot — Hermes agent on sparky (DGX Spark homelab)
# Deploy: hermes/scripts/deploy-spark-bot.sh
services:
  spark-bot:
    image: nousresearch/hermes-agent:latest
    container_name: spark-bot
    restart: unless-stopped
    command: gateway run
    ports:
      - "9119:9119"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/hermes/data/spark-bot/data:/opt/data
      - /opt/hermes/data/workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - /opt/hermes/data/spark-bot/data/.env
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      GATEWAY_ALLOW_ALL_USERS: "true"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    shm_size: 512m