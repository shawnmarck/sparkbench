  <script src="/assets/sparky-theme.js"></script>
  <script>
    if (document.documentElement.classList.contains('embedded-pending')) {
      document.body.classList.add('embedded');
      document.documentElement.classList.remove('embedded-pending');
    }
    SparkyTheme.init();
  </script>
  <script>
    let all = [], shelfMounted = false, activeJob = { running: false };
    let infStatus = null, highlightPath = null;
    let expandedId = null, pollTimer = null, jobTimer = null, infPollTimer = null;
    let lastInfSnapshot = '';
    let suppressBenchHistoryToggle = false;
    let suppressModelGroupToggle = false;
    const benchHistoryOpen = new Set();
    const modelGroupsOpen = new Set();
    const benchHistoryCache = {};
    let benchNoteDrafts = {};
    const REFRESH_MS = 30000, JOB_POLL_MS = 2000, INF_POLL_MS = 10000, PREFS_KEY = 'spark-models-filters';
    const sparkLabels = { unverified: 'Untested', wip: 'Testing', works: 'Works', failed: 'Failed' };
    const engineLabels = { vllm: 'vLLM', eugr: 'vLLM', llamacpp: 'GGUF' };
    const engineCssClass = (e) => (e === 'eugr' ? 'vllm' : e);
    const engineTitle = (e) => {
      if (e === 'eugr') return 'vLLM via eugr spark-vllm-docker (port 8000)';
      if (e === 'vllm') return 'vLLM';
      if (e === 'llamacpp') return 'llama.cpp GGUF (port 8081)';
      return e || '';
    };
    const jobLabels = { pull: 'Fetching', push: 'Pushing', 'remove-local': 'Deleting' };
    const SPARK_FILTER_OPTS = ['unverified', 'wip', 'works', 'failed', 'pending-delete'];
    let sparkFilters = [];
    let tagFilter = [];
    let hfTaskFilter = '';
    let groupByFamily = false;
    const HF_NOISE = new Set(['transformers', 'safetensors', 'endpoints_compatible', 'text-generation-inference', 'eval-results', 'gguf', 'ggml']);

    const $ = (id) => document.getElementById(id);
    const tagKey = (t) => (t || '').toLowerCase();
    const formatTagLabel = (tag) => {
      if (!tag) return '';
      if (/^license:/i.test(tag)) return tag.split(':')[1].toUpperCase();
      return tag.split(/[-_]/).map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    };
    const isNoiseTag = (t) => {
      if (!t) return true;
      const k = tagKey(t);
      if (HF_NOISE.has(k)) return true;
      return /^(arxiv:|license:|region:|base_model:)/i.test(t);
    };
    const catalogCapabilities = (m) => m.capabilities || [];
    const catalogTagSet = (m) => new Set(catalogCapabilities(m).map(tagKey));
    const notableHfTags = (m) => {
      const seen = new Set();
      const out = [];
      (m.tags || []).forEach((t) => {
        const k = tagKey(t);
        if (isNoiseTag(t) || k === tagKey(m.pipeline_tag) || seen.has(k)) return;
        seen.add(k);
        out.push(t);
      });
      return out.sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    };
    const collectCatalogTags = (models) => [...new Set(models.flatMap((m) => catalogCapabilities(m)))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const collectHfTasks = (models) => [...new Set(models.map((m) => m.pipeline_tag).filter(Boolean))].sort((a, b) => formatTagLabel(a).localeCompare(formatTagLabel(b)));
    const tagLine = (items) => items.map((t) => esc(formatTagLabel(t))).join(' · ') || '—';
    const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmtDate = (iso, est) => {
      if (!iso) return '—';
      let text;
      try { text = new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
      catch { text = iso.slice(0, 10); }
      return est ? `<span class="release-est" title="Estimated from local files">~${text}</span>` : text;
    };
    const fmtRelease = (m) => fmtDate(m.release_date, m.release_date_source === 'local_earliest');
    const modelSummary = (m) => m.summary || m.description || '';
    const summaryBlock = (m) => {
      const text = modelSummary(m);
      if (!text) return '';
      return `<div class="detail-section model-about"><h4>About</h4><div class="model-summary">${esc(text)}</div></div>`;
    };
    const modelEngines = (m) => {
      if (m.engines && m.engines.length) return m.engines;
      return [...new Set((m.variants || []).map(v => v.engine).filter(Boolean))];
    };
    const engineBadgeHtml = (m) => modelEngines(m).map(e =>
      `<span class="badge engine engine-${esc(engineCssClass(e))}" title="${esc(engineTitle(e))}">${esc(engineLabels[e] || e)}</span>`
    ).join('');
    const fmtTime = (iso) => { if (!iso) return ''; try { return new Date(iso).toLocaleTimeString(); } catch { return ''; } };
    const fmtCtx = (n) => !n ? '—' : n >= 1000 ? (n / 1000).toFixed(0) + 'K' : String(n);
    const fmtParams = (m) => {
      if (m.param_active_b && m.param_b) return m.param_active_b + 'B active / ' + m.param_b + 'B';
      if (m.param_b) return m.param_b + 'B';
      return '—';
    };
    const sparkStatus = (m) => (m.spark_verify && m.spark_verify.spark_status) || 'unverified';
    const removalPending = (m) => !!(m.spark_verify && m.spark_verify.removal_pending);

    function loadSparkFilters(stored) {
      if (Array.isArray(stored.sparkFilters)) {
        return stored.sparkFilters
          .map((f) => (f === 'queued' ? 'pending-delete' : f))
          .filter((f) => SPARK_FILTER_OPTS.includes(f));
      }
      if (stored.worksOnly) return ['works'];
      const legacy = stored.sparkFilter || '';
      return legacy && SPARK_FILTER_OPTS.includes(legacy) ? [legacy] : [];
    }

    function modelMatchesSparkFilter(m) {
      if (!sparkFilters.length) return true;
      return sparkFilters.some((f) => {
        if (f === 'pending-delete') return removalPending(m);
        return sparkStatus(m) === f;
      });
    }

    function updateSparkFilterChips() {
      document.querySelectorAll('#filter-chips .chip[data-spark]').forEach((chip) => {
        const val = chip.dataset.spark;
        const on = val === '' ? !sparkFilters.length : sparkFilters.includes(val);
        chip.classList.toggle('active', on);
        chip.classList.toggle('spark-works', on && val === 'works');
        chip.classList.toggle('spark-failed', on && val === 'failed');
        chip.classList.toggle('spark-wip', on && val === 'wip');
        chip.classList.toggle('spark-pending-delete', on && val === 'pending-delete');
      });
    }

    function updateViewChips() {
      document.querySelectorAll('#filter-chips .chip[data-group]').forEach((chip) => {
        const mode = chip.dataset.group;
        chip.classList.toggle('active', mode === (groupByFamily ? 'family' : 'flat'));
      });
    }

    function setGroupByFamily(on) {
      groupByFamily = !!on;
      updateViewChips();
      savePrefs();
      applyFilters();
    }
    const parseDate = (iso) => { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; };
    const localSize = (m) => (m.local && m.local.present) ? m.local.size_human : '—';
    const shelfSize = (m) => (m.shelf && m.shelf.present) ? m.shelf.size_human : '—';

    const benchRated = (m) => m.best_bench_tok_s != null && !Number.isNaN(Number(m.best_bench_tok_s));

    function compareBenchSpeed(a, b, desc) {
      const aRated = benchRated(a);
      const bRated = benchRated(b);
      if (aRated !== bRated) return aRated ? -1 : 1;
      if (!aRated) return a.name.localeCompare(b.name);
      const diff = Number(a.best_bench_tok_s) - Number(b.best_bench_tok_s);
      return (desc ? -diff : diff) || a.name.localeCompare(b.name);
    }

    const sortMode = () => $('sort').value;
    const nSort = (v) => v == null ? -1 : Number(v);

    function compareModels(a, b, mode) {
      switch (mode) {
        case 'newest': return parseDate(b.release_date) - parseDate(a.release_date) || a.name.localeCompare(b.name);
        case 'oldest': return parseDate(a.release_date) - parseDate(b.release_date) || a.name.localeCompare(b.name);
        case 'name-desc': return b.name.localeCompare(a.name);
        case 'name-asc':
        default: return a.name.localeCompare(b.name);
        case 'size-desc': return (b.local && b.local.size_bytes || b.size_bytes || 0) - (a.local && a.local.size_bytes || a.size_bytes || 0);
        case 'size-asc': return (a.local && a.local.size_bytes || a.size_bytes || 0) - (b.local && b.local.size_bytes || b.size_bytes || 0);
        case 'ctx-desc': return nSort(b.max_context) - nSort(a.max_context) || a.name.localeCompare(b.name);
        case 'ctx-asc': return nSort(a.max_context) - nSort(b.max_context) || a.name.localeCompare(b.name);
        case 'params-desc': return nSort(b.param_b) - nSort(a.param_b) || a.name.localeCompare(b.name);
        case 'params-asc': return nSort(a.param_b) - nSort(b.param_b) || a.name.localeCompare(b.name);
        case 'bench-desc': return compareBenchSpeed(a, b, true);
        case 'bench-asc': return compareBenchSpeed(a, b, false);
        case 'lab': return a.lab.localeCompare(b.lab) || a.name.localeCompare(b.name);
        case 'path': return (a.rel_path || a.id).localeCompare(b.rel_path || b.id);
      }
    }

    function sortModels(models) {
      const mode = sortMode();
      const arr = [...models];
      arr.sort((a, b) => compareModels(a, b, mode));
      return arr;
    }

    function modelFamilyKey(m) {
      return m.slug || (m.rel_path || m.id || '').split('/').pop() || m.id || 'other';
    }

    function slugFamilyLabel(slug) {
      return (slug || '').split('-').map((w) => {
        if (/^\d+(\.\d+)?$/.test(w)) return w;
        if (/^[a-z]\d/i.test(w)) return w.toUpperCase();
        return w.charAt(0).toUpperCase() + w.slice(1);
      }).join(' ');
    }

    function modelFamilyLabel(items) {
      const names = items.map((m) => m.name).filter(Boolean);
      if (!names.length) return slugFamilyLabel(items[0] && items[0].slug);
      const stripped = names.map((n) => n.replace(/\s*\([^)]*\)\s*$/, '').trim()).filter(Boolean);
      const pick = [...stripped].sort((a, b) => a.length - b.length)[0];
      return pick || names[0];
    }

    function modelVariantTitle(m, familyLabel) {
      const name = m.name || '';
      if (!name || name === familyLabel) return '';
      if (name.startsWith(familyLabel)) {
        const tail = name.slice(familyLabel.length).trim();
        return tail.replace(/^\((.+)\)$/, '$1') || tail;
      }
      const paren = name.match(/\(([^)]+)\)\s*$/);
      if (paren) return paren[1];
      return name;
    }

    function modelHasLocal(m) {
      return !!(m.local && m.local.present);
    }

    function modelHasActiveInference(m) {
      const activeId = activeProfileId();
      if (!activeId) return false;
      return (m.inference_profiles || []).some((p) => p.id === activeId);
    }

    function groupModels(models) {
      const groups = new Map();
      models.forEach((m) => {
        const key = modelFamilyKey(m);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(m);
      });
      const mode = sortMode();
      return [...groups.entries()].map(([key, items]) => {
        const sorted = [...items].sort((a, b) => compareModels(a, b, mode) || a.lab.localeCompare(b.lab));
        return { key, family: modelFamilyLabel(sorted), items: sorted };
      }).sort((a, b) => compareModels(a.items[0], b.items[0], mode));
    }

    function modelGroupShouldOpen(key, multiGroup, group) {
      if (modelGroupsOpen.has(key)) return true;
      if (!multiGroup) return true;
      const hasExpanded = group.items.some((m) => m.id === expandedId);
      const hasHighlight = highlightPath && group.items.some((m) => m.rel_path === highlightPath || m.id === highlightPath);
      const hasLocal = group.items.some(modelHasLocal);
      const hasActive = group.items.some(modelHasActiveInference);
      return hasExpanded || hasHighlight || hasLocal || hasActive;
    }

    function locBadge(label, loc, mounted) {
      if (!mounted && label === 'NAS') return '<span class="loc-badge warn">NAS offline</span>';
      if (loc && loc.present) return `<span class="loc-badge on">${esc(loc.size_human)}</span>`;
      return '<span class="loc-badge off">not present</span>';
    }

    function modelBusy(m) { return activeJob.running && activeJob.path === m.rel_path; }

    function inferenceSwitching() {
      return !!(infStatus && infStatus.switch && infStatus.switch.running);
    }

    function parseStartedAt(iso) {
      if (!iso) return null;
      const t = Date.parse(iso);
      return Number.isNaN(t) ? null : t;
    }

    function formatLoadingElapsed(startedAtMs) {
      if (!startedAtMs) return '';
      const s = Math.max(0, Math.floor((Date.now() - startedAtMs) / 1000));
      if (s < 60) return ' (' + s + 's)';
      const m = Math.floor(s / 60);
      const r = s % 60;
      return ' (' + m + 'm ' + r + 's)';
    }

    function loadingPhaseKey(info) {
      const phase = info && info.phase;
      return phase === 'model' ? 'starting' : phase;
    }

    function inferenceLoadingInfo() {
      if (!infStatus) return null;
      if (infStatus.loading && infStatus.loading.profile) return infStatus.loading;
      const sw = infStatus.switch;
      if (sw && sw.running && sw.profile) {
        return {
          phase: 'switch',
          profile: sw.profile,
          name: sw.profile,
          started_at: sw.started_at,
        };
      }
      const active = infStatus.active;
      if (active && !active.ready) {
        return {
          phase: active.starting ? 'starting' : 'waiting',
          profile: active.id,
          name: active.name || active.id,
          started_at: active.started_at,
        };
      }
      return null;
    }

    function inferenceLoadingLabel(info) {
      const name = (info && (info.name || info.profile)) || '…';
      const elapsed = formatLoadingElapsed(parseStartedAt(info && info.started_at));
      const fallback = { switch: 'Switching', starting: 'Starting', waiting: 'Waiting', model: 'Starting' };
      const label = (info && info.phase_label) || fallback[loadingPhaseKey(info)] || 'Loading';
      return label + ' · ' + name + elapsed;
    }

    function inferenceLoadingTitle(info) {
      if (!info || !info.profile) return 'Inference loading';
      const parts = [];
      if (info.detail) parts.push(info.detail);
      if (info.expect && info.expect.hint) parts.push(info.expect.hint);
      if (parts.length) return parts.join(' ');
      const name = info.name || info.profile;
      if (loadingPhaseKey(info) === 'switch') return 'Switching to ' + name;
      if (loadingPhaseKey(info) === 'starting') return 'Engine starting — ' + name;
      return 'Waiting for engine — ' + name;
    }

    function activeProfileId() {
      return infStatus && infStatus.active && infStatus.active.id;
    }

    function inferenceBadge(m) {
      const profiles = m.inference_profiles || [];
      if (!profiles.length) return '';
      const loading = inferenceLoadingInfo();
      if (loading && loading.profile) {
        const match = profiles.find((p) => p.id === loading.profile);
        if (match) {
          return `<span class="badge inf-loading" title="${esc(inferenceLoadingTitle(loading))}">${esc(inferenceLoadingLabel(loading))}</span>`;
        }
      }
      const activeId = activeProfileId();
      const active = profiles.find((p) => p.id === activeId);
      if (active && infStatus.active.ready) {
        return `<span class="badge inf-active">${esc(active.id)} · active</span>`;
      }
      const testing = profiles.filter((p) => p.lifecycle === 'testing').length;
      if (testing) return `<span class="badge inf-profile">${testing} testing</span>`;
      return `<span class="badge inf-profile">${profiles.length} recipe${profiles.length === 1 ? '' : 's'}</span>`;
    }

    function railEmpty() {
      return '<span class="rail-empty">—</span>';
    }

    function railEngineCell(m) {
      const engines = modelEngines(m);
      if (!engines.length) return railEmpty();
      const labels = [...new Set(engines.map((e) => engineLabels[e] || e))];
      const text = labels.length > 1 ? labels.join('+') : labels[0];
      const tip = labels.map((e, i) => engineTitle(engines[i]) || e).join(' · ');
      return `<span class="badge engine engine-${esc(engineCssClass(engines[0]))}" title="${esc(tip)}">${esc(text)}</span>`;
    }

    function railInferenceCell(m) {
      const profiles = m.inference_profiles || [];
      if (!profiles.length) return railEmpty();
      const loading = inferenceLoadingInfo();
      if (loading && loading.profile) {
        const match = profiles.find((p) => p.id === loading.profile);
        if (match) {
          const short = (loading.phase === 'switch' ? 'Switch' : 'Load');
          return `<span class="badge inf-loading" title="${esc(inferenceLoadingTitle(loading))}">${esc(short)}</span>`;
        }
      }
      const activeId = activeProfileId();
      const active = profiles.find((p) => p.id === activeId);
      if (active && infStatus && infStatus.active && infStatus.active.ready) {
        return `<span class="badge inf-active" title="${esc(active.id)}">● active</span>`;
      }
      const testing = profiles.filter((p) => p.lifecycle === 'testing').length;
      if (testing) {
        return `<span class="badge inf-profile" title="${testing} inference recipe${testing === 1 ? '' : 's'} in testing (not production yet)">${testing} testing</span>`;
      }
      const n = profiles.length;
      return `<span class="badge inf-profile" title="${n} inference recipe${n === 1 ? '' : 's'} linked to this model">${n} recipe${n === 1 ? '' : 's'}</span>`;
    }

    function railBenchCell(m) {
      if (m.best_bench_tok_s == null || Number.isNaN(Number(m.best_bench_tok_s))) return railEmpty();
      const n = Math.round(m.best_bench_tok_s);
      return `<span title="${n} tok/s">${n}</span>`;
    }

    function renderStatusRail(m) {
      const spark = sparkStatus(m);
      const queued = removalPending(m);
      return `<div class="row-rail" aria-label="Status">`
        + `<span class="rail-cell spark"><span class="badge spark-${spark}">${esc(sparkLabels[spark])}</span></span>`
        + `<span class="rail-cell dl"><span class="badge status-${m.status || 'missing'}">${esc(m.status || 'missing')}</span></span>`
        + `<span class="rail-cell engine">${railEngineCell(m)}</span>`
        + `<span class="rail-cell inf">${railInferenceCell(m)}</span>`
        + `<span class="rail-cell bench">${railBenchCell(m)}</span>`
        + `<span class="rail-cell flag">${queued ? '<span class="rail-flag-del" title="Pending delete">✕</span>' : railEmpty()}</span>`
        + `</div>`;
    }

    function renderGridHead() {
      return `<div class="model-grid-head" aria-hidden="true">`
        + `<span class="grid-head-title">Model</span>`
        + `<span class="grid-head-rail">Spark</span>`
        + `<span class="grid-head-rail">Download</span>`
        + `<span class="grid-head-rail engine">Engine</span>`
        + `<span class="grid-head-rail inf">Inference</span>`
        + `<span class="grid-head-rail bench">Bench</span>`
        + `<span class="grid-head-rail flag">!</span>`
        + `<span class="grid-head-spacer"></span></div>`;
    }

    function lifeBadge(lifecycle) {
      const lc = lifecycle || 'production';
      return `<span class="badge life-${esc(lc)}">${esc(lc)}</span>`;
    }

    function recipeFeatureBadges(p) {
      const tags = new Set((p.tags || []).map((t) => String(t).toLowerCase()));
      const spec = p.speculative || {};
      let html = '';
      if (spec.method === 'dflash' || tags.has('dflash')) {
        html += '<span class="badge spec-dflash">DFlash</span>';
      }
      if (p.mtp || spec.method === 'mtp' || tags.has('mtp')) {
        html += '<span class="badge spec-mtp">MTP</span>';
      }
      return html;
    }

    function renderBenchCompareStrip(profiles) {
      const rated = profiles.filter((p) => p.tok_s != null && !Number.isNaN(Number(p.tok_s)));
      if (rated.length < 2) return '';
      const sorted = [...rated].sort((a, b) => Number(b.tok_s) - Number(a.tok_s));
      const best = Number(sorted[0].tok_s) || 1;
      const cells = sorted.map((p) => {
        const n = Math.round(Number(p.tok_s));
        const pct = Math.round((n / best) * 100);
        return `<span class="bench-compare-chip" title="${esc(p.id)}">`
          + `${recipeFeatureBadges(p)}<strong>${n}</strong> tok/s`
          + `<span class="bench-compare-pct">${pct}%</span></span>`;
      }).join('');
      return `<div class="bench-compare-strip"><span class="bench-compare-label">Recipe compare</span>${cells}</div>`;
    }

    function inferenceSection(m) {
      const rel = m.rel_path || m.id;
      const onDisk = m.local && m.local.present;
      const profiles = m.inference_profiles || [];
      const switching = inferenceSwitching();
      const activeId = activeProfileId();
      const rows = profiles.map((p) => {
        const lc = p.lifecycle || (p.enabled ? 'production' : 'draft');
        const tier = p.tier === 'heavy' ? '<span class="badge tier-heavy">heavy</span>' : '<span class="badge">fast</span>';
        const tokBadge = p.tok_s != null
          ? `<span class="badge tok-s">${Math.round(p.tok_s)} tok/s</span>`
          : '<span class="badge tok-s unbench">not benchmarked</span>';
        const note = p.notes ? `<div class="verify-note">${esc(p.notes)}</div>` : '';
        let actions = '';
        if (lc === 'draft') {
          actions = `<button type="button" class="btn primary" data-action="recipe-testing" data-profile="${esc(p.id)}">Mark testing</button>`
            + `<button type="button" class="btn" data-action="recipe-discard" data-profile="${esc(p.id)}">Discard</button>`;
        } else if (p.id === activeId) {
          const ready = infStatus && infStatus.active && infStatus.active.ready;
          const loadInfo = inferenceLoadingInfo();
          actions = ready
            ? '<span class="badge status-ready">active</span><a href="/#inference" target="_top">Inference ↗</a>'
            : '<span class="badge inf-loading" title="' + esc(inferenceLoadingTitle(loadInfo)) + '">' + esc(inferenceLoadingLabel(loadInfo)) + '</span>'
              + '<a href="/#inference" target="_top">View progress ↗</a>';
        } else if (switching && infStatus.switch && infStatus.switch.profile === p.id) {
          const loadInfo = inferenceLoadingInfo();
          actions = '<span class="badge inf-loading" title="' + esc(inferenceLoadingTitle(loadInfo)) + '">' + esc(inferenceLoadingLabel(loadInfo)) + '</span>'
            + '<a href="/#inference" target="_top">View progress ↗</a>';
        } else if (switching) {
          actions = '<button type="button" class="btn" disabled>Switch in progress</button>';
        } else if (lc === 'testing' || p.enabled) {
          actions = `<button type="button" class="btn primary" data-action="start-profile" data-profile="${esc(p.id)}" data-tier="${esc(p.tier || '')}">Start</button>`
            + (lc === 'testing'
              ? `<button type="button" class="btn" data-action="recipe-promote" data-profile="${esc(p.id)}">Promote</button>`
                + `<button type="button" class="btn" data-action="recipe-discard" data-profile="${esc(p.id)}">Discard</button>`
              : '');
        } else {
          actions = '<span class="badge">off</span>';
        }
        const runCount = p.bench_run_count || 0;
        const histSummary = runCount
          ? `Benchmark history (${runCount})`
          : 'Benchmark history';
        const histOpen = benchHistoryOpen.has(p.id) ? ' open' : '';
        return `<div class="inf-profile-block"><div class="inf-profile-row"><div class="inf-profile-info"><strong>${esc(p.name || p.id)}</strong>`
          + `<code>${esc(p.id)} · ${esc(p.engine || '')} · recipe</code>${note}</div>`
          + `<div class="inf-profile-actions">${lifeBadge(lc)}${recipeFeatureBadges(p)}${tier}${tokBadge}${actions}</div></div>`
          + `<details class="bench-history" data-profile="${esc(p.id)}"${histOpen}><summary>${histSummary}</summary>`
          + `<div class="bench-history-panel"></div></details></div>`;
      }).join('');
      const create = onDisk ? `<div class="recipe-lab-create">`
        + `<span class="verify-label">New recipe</span>`
        + `<button type="button" class="btn primary" data-action="recipe-scaffold" data-path="${esc(rel)}" title="Auto-detect engine (GGUF, eugr, MTP, DFlash)">Auto-scaffold</button>`
        + `</div>` : '<div class="meta-warn">Model not on disk locally — fetch before creating a recipe.</div>';
      return `<div class="detail-section inference-block"><h4>Model Lab (recipes)</h4>`
        + `<div class="verify-note">Per <em>recipe</em> (engine + quant). Mark testing → <strong>Start</strong> here → bench on Inference → promote. Spark status syncs on mark testing.</div>`
        + renderBenchCompareStrip(profiles)
        + (rows || '<div class="meta-warn">No recipes yet.</div>')
        + create
        + '<div class="actions" style="margin-top:.55rem"><a href="/#inference" target="_top">Open Inference tab ↗</a></div></div>';
    }

    function renderDetail(m) {
      const rel = esc(m.rel_path || m.id);
      const spark = sparkStatus(m);
      const sv = m.spark_verify || {};
      const queued = removalPending(m);
      const busy = modelBusy(m);
      const verifyBtns = ['unverified', 'wip', 'works', 'failed'].map(s => {
        const label = s === 'unverified' ? 'Untested' : s === 'wip' ? 'Testing' : s === 'works' ? 'Works' : 'Failed';
        return `<button type="button" class="btn verify${spark === s ? ' active active-' + s : ''}" data-verify="${s}" data-path="${rel}">${label}</button>`;
      }).join('');
      const vars = (m.variants || []).length ? `<div class="variants detail-section"><table>
        <tr><th>Format</th><th>Engine</th><th>Size</th><th>Status</th></tr>
        ${m.variants.map(v => `<tr><td>${esc(v.format)}</td><td>${esc(v.engine)}</td><td>${esc(v.size_human)}</td><td>${esc(v.status)}</td></tr>`).join('')}
      </table></div>` : '';
      const queueBtn = queued
        ? `<button type="button" class="btn danger active" data-action="queue-removal" data-pending="0" data-path="${rel}">Cancel removal</button>`
        : `<button type="button" class="btn danger" data-action="queue-removal" data-pending="1" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) ? 'disabled' : ''}>Queue removal</button>`;
      const caps = catalogCapabilities(m);
      const task = m.pipeline_tag;
      const hfTags = notableHfTags(m);
      const hfPreview = hfTags.slice(0, 4);
      const hfExtra = hfTags.slice(4);
      const tagBlock = (caps.length || task || hfPreview.length) ? `<div class="detail-section tag-block">
          ${caps.length ? `<div class="tag-line"><span class="tag-line-label">Catalog</span><span class="tag-line-val">${tagLine(caps)}</span></div>` : ''}
          ${task ? `<div class="tag-line"><span class="tag-line-label">HF task</span><span class="tag-line-val">${task ? `<span class="badge hf-task">${esc(formatTagLabel(task))}</span>` : '—'}</span></div>` : ''}
          ${hfPreview.length ? `<div class="tag-line"><span class="tag-line-label">HF tags</span><span class="tag-line-val">${tagLine(hfPreview)}</span></div>` : ''}
          ${hfExtra.length ? `<details class="tag-more"><summary>${hfExtra.length} more HF tag${hfExtra.length === 1 ? '' : 's'}</summary>${tagLine(hfExtra)}</details>` : ''}
          ${m.hf_url ? `<div class="tag-line" style="margin-top:.5rem"><span class="tag-line-label"></span><span class="tag-line-val"><a href="${esc(m.hf_url)}" target="_blank" rel="noopener">All tags on Hugging Face ↗</a></span></div>` : ''}
        </div>` : '';
      return `
        ${tagBlock}
        ${summaryBlock(m)}
        ${inferenceSection(m)}
        <div class="detail-section verify-row"><span class="verify-label">Spark</span>${verifyBtns}</div>
        ${sv.note ? `<div class="verify-note">${esc(sv.note)}</div>` : ''}
        <div class="detail-section storage">
          <div class="storage-row"><span class="storage-label">Local</span>${locBadge('Local', m.local, true)}</div>
          <div class="storage-row"><span class="storage-label">NAS</span>${locBadge('NAS', m.shelf, shelfMounted)}</div>
          <div class="actions">
            <button type="button" class="btn primary" data-action="pull" data-path="${rel}" ${!shelfMounted || !(m.shelf && m.shelf.present) || busy ? 'disabled' : ''}>Fetch ↓</button>
            <button type="button" class="btn" data-action="push" data-path="${rel}" ${!shelfMounted || !(m.local && m.local.present) || busy ? 'disabled' : ''}>Push ↑</button>
            ${queueBtn}
            <button type="button" class="btn warn-outline" data-action="remove-local" data-path="${rel}" data-name="${esc(m.name)}" data-local="${esc(localSize(m))}" data-shelf="${esc(shelfSize(m))}" ${!(m.local && m.local.present) || busy ? 'disabled' : ''}>Delete now</button>
          </div>
          ${queued ? '<div class="queue-note">Pending delete — local copy purges daily at 03:00. NAS shelf copy is kept.</div>' : ''}
        </div>
        ${vars}`;
    }

    function renderModelRow(m, opts) {
      opts = opts || {};
      const grouped = !!opts.grouped;
      const familyLabel = opts.familyLabel || '';
      const id = esc(m.id);
      const open = expandedId === m.id;
      const queued = removalPending(m);
      const highlighted = highlightPath && (m.rel_path === highlightPath || m.id === highlightPath);
      let titleHtml;
      if (grouped) {
        const variant = modelVariantTitle(m, familyLabel);
        const variantHtml = variant ? `<span class="row-variant">${esc(variant)}</span>` : '';
        titleHtml = `<strong title="Lab variant"><span class="row-lab">${esc(m.lab)}</span>${variantHtml}</strong>`
          + `<span class="row-path" title="Canonical shelf path on Spark and NAS"><span class="row-path-label">path</span>${esc(m.rel_path || m.id)}</span>`;
      } else {
        titleHtml = `<strong title="Display name">${esc(m.name)}</strong>`
          + `<span class="row-path" title="Canonical shelf path on Spark and NAS"><span class="row-path-label">path</span>${esc(m.rel_path || m.id)}</span>`;
      }
      const nested = grouped ? ' nested' : '';
      return `<article class="model-row${nested}${open ? ' open' : ''}${queued ? ' pending-delete' : ''}${highlighted ? ' highlight' : ''}" data-id="${id}" data-path="${esc(m.rel_path || m.id)}">
        <button type="button" class="row-main" data-expand="${id}">
          <div class="row-title">${titleHtml}</div>
          ${renderStatusRail(m)}
          <span class="chevron">▸</span>
          <div class="row-meta">
            <span><b>Local</b> ${esc(localSize(m))}</span>
            <span><b>Shelf</b> ${esc(shelfSize(m))}</span>
            <span><b>Released</b> ${fmtRelease(m)}</span>
            <span><b>Ctx</b> ${fmtCtx(m.max_context)}</span>
            <span><b>Params</b> ${fmtParams(m)}</span>
          </div>
        </button>
        <div class="row-detail">${open ? renderDetail(m) : ''}</div>
      </article>`;
    }

    function renderModelGroup(group, multiGroup) {
      const hasActive = group.items.some(modelHasActiveInference);
      const hasLocal = group.items.some(modelHasLocal);
      if (hasActive) modelGroupsOpen.add(group.key);
      const open = modelGroupShouldOpen(group.key, multiGroup, group);
      const localCount = group.items.filter(modelHasLocal).length;
      const localHint = localCount
        ? `<span class="model-family-group-meta">${localCount} local</span>` : '';
      const activeTag = hasActive ? '<span class="model-family-group-active-tag">● active</span>' : '';
      const groupCls = 'model-family-group'
        + (hasActive ? ' has-active' : '')
        + (hasLocal ? ' has-local' : '');
      const rows = group.items.map((m) => renderModelRow(m, { grouped: true, familyLabel: group.family })).join('');
      return `<details class="${groupCls}" data-model-group="${esc(group.key)}"${open ? ' open' : ''}>`
        + `<summary><span class="model-family-group-name">${esc(group.family)}</span>`
        + activeTag + localHint
        + `<span class="model-family-group-count">(${group.items.length})</span></summary>`
        + `<div class="model-group-rows">${rows}</div></details>`;
    }

    function patchExpandedRow(prevId, nextId) {
      if (prevId && prevId !== nextId) {
        const prevRow = document.querySelector('[data-id="' + CSS.escape(prevId) + '"]');
        if (prevRow) {
          prevRow.classList.remove('open');
          const detail = prevRow.querySelector('.row-detail');
          if (detail) detail.innerHTML = '';
        }
      }
      if (!nextId) return true;
      const model = all.find((m) => m.id === nextId);
      if (!model) return false;
      const row = document.querySelector('[data-id="' + CSS.escape(nextId) + '"]');
      if (!row) return false;
      row.classList.add('open');
      const detail = row.querySelector('.row-detail');
      if (detail) detail.innerHTML = renderDetail(model);
      return true;
    }

    function render(models) {
      const list = $('list');
      list.className = 'model-list model-inventory';
      if (!models.length) { list.innerHTML = '<div class="empty">No models match filters.</div>'; return; }
      suppressBenchHistoryToggle = true;
      suppressModelGroupToggle = true;
      let body = '';
      if (groupByFamily) {
        const groups = groupModels(models);
        const multiGroup = groups.length > 1;
        body = '<div class="model-family-groups">' + groups.map((g) => {
          if (g.items.length === 1) return renderModelRow(g.items[0]);
          return renderModelGroup(g, multiGroup);
        }).join('') + '</div>';
      } else {
        body = models.map((m) => renderModelRow(m)).join('');
      }
      list.innerHTML = renderGridHead() + '<div class="model-rows">' + body + '</div>';
      suppressModelGroupToggle = false;
      suppressBenchHistoryToggle = false;
      renderJobBanner();
      scrollToHighlight();
      restoreOpenBenchHistories();
    }

    function scrollToHighlight() {
      if (!highlightPath) return;
      const row = $('list').querySelector('[data-path="' + CSS.escape(highlightPath) + '"]');
      if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function renderJobBanner() {
      const el = $('job-banner');
      if (!activeJob.running) { el.classList.remove('active'); el.textContent = ''; return; }
      const tail = (activeJob.log_tail || []).slice(-2).join(' · ');
      el.classList.add('active');
      el.textContent = `${jobLabels[activeJob.action] || activeJob.action} ${activeJob.path || '…'} (pid ${activeJob.pid})${tail ? ' — ' + tail : ''}`;
    }

    function readPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { return {}; }
    }

    function savePrefs() {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        q: $('q').value, lab: $('lab').value, status: $('status').value,
        sort: $('sort').value, sparkFilters, tagFilter, hfTaskFilter, groupByFamily,
      }));
    }

    function updateTagPickerButton() {
      const btn = $('tag-picker-btn');
      if (!tagFilter.length) btn.textContent = 'All';
      else if (tagFilter.length === 1) btn.textContent = formatTagLabel(tagFilter[0]);
      else btn.textContent = `${tagFilter.length} selected`;
    }

    function renderTagPickerList(available, query) {
      const list = $('tag-picker-list');
      const q = (query || '').toLowerCase();
      list.innerHTML = '';
      available.filter((t) => !q || formatTagLabel(t).toLowerCase().includes(q) || tagKey(t).includes(q)).forEach((tag) => {
        const k = tagKey(tag);
        const row = document.createElement('label');
        row.className = 'tag-picker-item';
        row.innerHTML = `<input type="checkbox" value="${esc(k)}" ${tagFilter.includes(k) ? 'checked' : ''}><span>${esc(formatTagLabel(tag))}</span>`;
        row.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) {
            if (!tagFilter.includes(k)) tagFilter = [...tagFilter, k];
          } else {
            tagFilter = tagFilter.filter((t) => t !== k);
          }
          updateTagPickerButton();
          applyFilters();
        });
        list.appendChild(row);
      });
      if (!list.children.length) list.innerHTML = '<div class="tag-picker-item" style="cursor:default;color:var(--muted)">No matches</div>';
    }

    function setTagFilter(next) {
      tagFilter = [...next].map(tagKey);
      updateTagPickerButton();
      renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value);
      applyFilters();
    }

    function closeTagPicker() {
      $('tag-picker-menu').hidden = true;
      $('tag-picker-btn').setAttribute('aria-expanded', 'false');
    }

    function openTagPicker() {
      renderTagPickerList(collectCatalogTags(all), $('tag-picker-search').value);
      $('tag-picker-menu').hidden = false;
      $('tag-picker-btn').setAttribute('aria-expanded', 'true');
      $('tag-picker-search').focus();
    }

    function toggleSparkFilter(value) {
      if (!value) {
        sparkFilters = [];
      } else if (sparkFilters.includes(value)) {
        sparkFilters = sparkFilters.filter((f) => f !== value);
      } else {
        sparkFilters = [...sparkFilters, value];
      }
      updateSparkFilterChips();
      applyFilters();
    }

    function applyFilters() {
      const q = $('q').value.toLowerCase();
      const lab = $('lab').value, status = $('status').value;
      hfTaskFilter = tagKey($('hf-task').value);
      savePrefs();
      let filtered = all.filter(m => {
        if (lab && m.lab !== lab) return false;
        if (tagFilter.length && !tagFilter.every((t) => catalogTagSet(m).has(t))) return false;
        if (hfTaskFilter && tagKey(m.pipeline_tag) !== hfTaskFilter) return false;
        if (status && m.status !== status) return false;
        if (!modelMatchesSparkFilter(m)) return false;
        if (q) {
          const hay = [m.name, m.lab, m.slug, m.hf_repo, m.why_downloaded, modelSummary(m), m.pipeline_tag, ...catalogCapabilities(m), ...notableHfTags(m)].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      filtered = sortModels(filtered);
      const queuedTotal = all.filter(removalPending).length;
      const queuedPart = queuedTotal ? ` · ${queuedTotal} pending delete` : '';
      const filterBits = [];
      if (tagFilter.length) filterBits.push(tagFilter.map((t) => formatTagLabel(t)).join(' + '));
      if (hfTaskFilter) filterBits.push(formatTagLabel(hfTaskFilter));
      const tagPart = filterBits.length ? ` · ${filterBits.join(' · ')}` : '';
      $('summary').innerHTML = `Showing ${filtered.length} of ${all.length}${tagPart}${queuedPart} · updated ${fmtDate(window.__generated)} ${fmtTime(window.__generated)}`;
      if (queuedTotal) $('summary').classList.add('meta-danger'); else $('summary').classList.remove('meta-danger');
      benchNoteDrafts = captureBenchNoteDrafts();
      render(filtered);
    }

    function populateFilters(models, preserve) {
      const stored = readPrefs();
      const storedTags = (stored.tagFilter || (stored.cap ? [stored.cap] : [])).map(tagKey);
      const prev = preserve ? {
        lab: $('lab').value, status: $('status').value, hfTaskFilter,
        sort: $('sort').value, q: $('q').value, sparkFilters, tagFilter, groupByFamily,
      } : {
        sort: 'newest',
        sparkFilters: loadSparkFilters(stored),
        q: stored.q || '', lab: stored.lab || '', status: stored.status || '',
        tagFilter: storedTags,
        hfTaskFilter: tagKey(stored.hfTaskFilter || ''),
        groupByFamily: !!stored.groupByFamily,
      };
      const fill = (id, key, items, fn) => {
        const el = $(id), first = el.options[0].outerHTML;
        el.innerHTML = first;
        items.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = fn ? fn(v) : v; el.appendChild(o); });
        if (prev[key] && [...el.options].some(o => o.value === prev[key])) el.value = prev[key];
      };
      fill('lab', 'lab', [...new Set(models.map(m => m.lab))].sort(), v => v.split(/[-_]/).map(w => w[0].toUpperCase() + w.slice(1)).join(' '));
      fill('status', 'status', [...new Set(models.map(m => m.status))].sort(), null);
      fill('hf-task', 'hfTaskFilter', collectHfTasks(models), (v) => formatTagLabel(v));
      const catalogKeys = new Set(collectCatalogTags(models).map(tagKey));
      tagFilter = (prev.tagFilter || []).map(tagKey).filter((k) => catalogKeys.has(k));
      hfTaskFilter = prev.hfTaskFilter || '';
      if (hfTaskFilter && ![...$('hf-task').options].some((o) => o.value === hfTaskFilter)) hfTaskFilter = '';
      $('hf-task').value = hfTaskFilter;
      updateTagPickerButton();
      renderTagPickerList(collectCatalogTags(models), '');
      $('sort').value = prev.sort || 'newest';
      $('q').value = prev.q || '';
      sparkFilters = prev.sparkFilters || [];
      groupByFamily = !!prev.groupByFamily;
      updateSparkFilterChips();
      updateViewChips();
    }

    function formatBenchWhen(iso) {
      if (!iso) return '—';
      return String(iso).slice(0, 19).replace('T', ' ');
    }

    function captureBenchNoteDrafts() {
      const drafts = {};
      document.querySelectorAll('.bench-note-input').forEach((ta) => {
        const key = (ta.dataset.profile || '') + ':' + (ta.dataset.runId || '');
        if (key !== ':') drafts[key] = ta.value;
      });
      return drafts;
    }

    function infStatusSnapshot(data) {
      if (!data) return '';
      const a = data.active;
      const loading = data.loading;
      return [
        a && a.id, a && a.ready, a && a.starting,
        data.switch && data.switch.running, data.switch && data.switch.profile,
        loading && loading.profile, loading && loading.phase,
        data.bench && data.bench.running,
      ].join(';');
    }

    function renderBenchHistoryPanel(panel, data, profile) {
      const runs = data.runs || [];
      if (!runs.length) {
        panel.innerHTML = '<div class="meta-warn">No runs yet — bench on Inference tab.</div>';
        panel.dataset.loaded = '1';
        return;
      }
      const latestId = (data.latest || {}).latest_run_id;
      const rows = runs.map((run) => {
        const tok = run.tok_s != null ? Math.round(run.tok_s) + ' tok/s' : '—';
        const range = (run.tok_s_min != null && run.tok_s_max != null)
          ? ` (${Math.round(run.tok_s_min)}–${Math.round(run.tok_s_max)})` : '';
        const sys = run.system_note ? `<div class="verify-note">${esc(run.system_note)}</div>` : '';
        const cls = run.id === latestId ? 'latest' : '';
        const draftKey = profile + ':' + run.id;
        const noteVal = benchNoteDrafts[draftKey] != null ? benchNoteDrafts[draftKey] : (run.note || '');
        return `<tr class="${cls}"><td>${esc(formatBenchWhen(run.measured_at))}</td>`
          + `<td>${esc(tok + range)}<br><code>${esc(run.method || '')}</code>${sys}</td>`
          + `<td><textarea class="bench-note-input" rows="2" data-profile="${esc(profile)}" data-run-id="${esc(run.id)}">${esc(noteVal)}</textarea>`
          + `<button type="button" class="btn bench-note-save" data-action="bench-note-save" data-profile="${esc(profile)}" data-run-id="${esc(run.id)}">Save note</button></td></tr>`;
      }).join('');
      panel.innerHTML = `<table class="bench-history-table"><thead><tr><th>When</th><th>Speed</th><th>Note</th></tr></thead><tbody>${rows}</tbody></table>`;
      panel.dataset.loaded = '1';
    }

    async function loadBenchHistory(detailsEl, opts) {
      opts = opts || {};
      const profile = detailsEl.dataset.profile;
      const panel = detailsEl.querySelector('.bench-history-panel');
      if (!profile || !panel) return;
      const cached = benchHistoryCache[profile];
      if (!opts.force && cached) {
        renderBenchHistoryPanel(panel, cached, profile);
        return;
      }
      panel.dataset.loaded = '0';
      panel.innerHTML = '<div class="meta-warn">Loading…</div>';
      try {
        const res = await fetch('/api/inference/benchmarks/' + encodeURIComponent(profile) + '/history', { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        benchHistoryCache[profile] = data;
        renderBenchHistoryPanel(panel, data, profile);
      } catch (err) {
        panel.dataset.loaded = '0';
        panel.innerHTML = `<div class="meta-warn">${esc(err.message)}</div>`;
      }
    }

    function restoreOpenBenchHistories() {
      document.querySelectorAll('details.bench-history[open]').forEach((det) => {
        const panel = det.querySelector('.bench-history-panel');
        if (panel && panel.dataset.loaded === '1') return;
        loadBenchHistory(det);
      });
    }

    async function saveBenchNote(profile, runId, note, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(
          '/api/inference/benchmarks/' + encodeURIComponent(profile) + '/runs/' + encodeURIComponent(runId),
          {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note }),
          }
        );
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const cache = benchHistoryCache[profile];
        if (cache && cache.runs) {
          const run = cache.runs.find((r) => r.id === runId);
          if (run) run.note = note;
        }
        delete benchNoteDrafts[profile + ':' + runId];
        btn.textContent = 'Saved';
        setTimeout(() => { btn.textContent = 'Save note'; }, 1500);
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function refreshInferenceStatus() {
      try {
        const res = await fetch('/api/inference/status?lite=1', { cache: 'no-store' });
        if (!res.ok) return;
        infStatus = await res.json();
        const snap = infStatusSnapshot(infStatus);
        const prev = lastInfSnapshot;
        lastInfSnapshot = snap;
        if (prev && snap !== prev && (expandedId || highlightPath) && !document.hidden) {
          applyFilters();
        }
      } catch (_) {}
    }

    function patchRecipeOnModel(recipe) {
      if (!recipe || !recipe.id) return;
      const inv = recipe.inventory_path;
      if (!inv) return;
      const model = all.find((m) => (m.rel_path || m.id) === inv);
      if (!model) return;
      const profiles = [...(model.inference_profiles || [])];
      const i = profiles.findIndex((p) => p.id === recipe.id);
      const base = i >= 0 ? profiles[i] : {
        id: recipe.id,
        name: recipe.name,
        engine: recipe.engine,
        tier: recipe.tier,
      };
      const updated = {
        ...base,
        lifecycle: recipe.lifecycle,
        enabled: recipe.lifecycle === 'production' || recipe.lifecycle === 'works',
      };
      if (i >= 0) profiles[i] = updated;
      else profiles.push(updated);
      model.inference_profiles = profiles;
      if (recipe.lifecycle === 'testing') {
        const sv = model.spark_verify || {};
        const st = sv.spark_status || 'unverified';
        if (st === 'unverified') {
          model.spark_verify = { ...sv, spark_status: 'wip' };
        }
      }
      applyFilters();
    }

    function removeRecipeFromModel(profileId) {
      for (const model of all) {
        const profiles = model.inference_profiles;
        if (!profiles || !profiles.some((p) => p.id === profileId)) continue;
        model.inference_profiles = profiles.filter((p) => p.id !== profileId);
        applyFilters();
        return;
      }
    }

    async function recipeApi(path, body, btn) {
      btn.disabled = true;
      btn.classList.add('busy');
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confirm: true, ...body }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        if (data.recipe) patchRecipeOnModel(data.recipe);
        else if (path.includes('/discard') && body.profile) removeRecipeFromModel(body.profile);
        await refreshInferenceStatus();
        loadData(true).catch(() => {});
        setTimeout(() => loadData(true).catch(() => {}), 2000);
        return data;
      } catch (err) {
        alert(err.message);
        return null;
      } finally {
        btn.disabled = false;
        btn.classList.remove('busy');
      }
    }

    async function startProfile(profileId, tier, btn) {
      if (tier === 'heavy') {
        const ok = confirm('Heavy profile (“' + profileId + '”) may take several minutes to load.\n\nContinue?');
        if (!ok) return;
      }
      btn.disabled = true;
      btn.classList.add('busy');
      try {
        const body = { profile: profileId, confirm: true };
        if (tier === 'heavy') body.confirm_heavy = true;
        const res = await fetch('/api/inference/switch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        await refreshInferenceStatus();
        applyFilters();
        window.top.location.href = '/#inference';
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('busy');
      }
    }

    async function setSparkVerify(path, spark_status, btn) {
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, spark_status }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function setRemovalQueue(path, pending, btn) {
      if (pending && btn.dataset.shelf === '—') {
        if (!confirm(`"${btn.dataset.name}" is NOT on NAS shelf.\n\nQueue ${btn.dataset.local} for deletion anyway?`)) return;
      } else if (pending) {
        if (!confirm(`Queue "${btn.dataset.name}" (${btn.dataset.local}) for removal?\n\nPurges at 03:00. NAS copy (${btn.dataset.shelf}) kept.`)) return;
      }
      btn.disabled = true;
      try {
        const res = await fetch('/api/models/removal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, pending }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        const model = all.find(m => (m.rel_path || m.id) === path);
        if (model) model.spark_verify = data.spark_verify;
        applyFilters();
      } catch (err) { alert(err.message); } finally { btn.disabled = false; }
    }

    async function modelAction(action, path, btn, extra) {
      if (activeJob.running) return;
      if (action === 'remove-local') {
        const msg = btn.dataset.shelf && btn.dataset.shelf !== '—'
          ? `Delete "${btn.dataset.name}" (${btn.dataset.local}) NOW?\n\nNAS copy (${btn.dataset.shelf}) is kept.`
          : `WARNING: "${btn.dataset.name}" is NOT on NAS.\n\nDelete ${btn.dataset.local} immediately?`;
        if (!confirm(msg)) return;
      }
      btn.disabled = true; btn.classList.add('busy');
      try {
        const res = await fetch('/api/shelf/' + action, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path, confirm: true, ...extra }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || res.statusText);
        await refreshShelfStatus();
        startJobPoll();
      } catch (err) { alert(err.message); btn.disabled = false; btn.classList.remove('busy'); }
    }

    function startJobPoll() {
      if (jobTimer) return;
      jobTimer = setInterval(async () => {
        await refreshShelfStatus();
        if (!activeJob.running) { clearInterval(jobTimer); jobTimer = null; loadData(true).catch(() => {}); }
      }, JOB_POLL_MS);
    }

    async function refreshShelfStatus() {
      try {
        const res = await fetch('/api/shelf/status', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        shelfMounted = !!data.shelf_mounted;
        activeJob = data.job || { running: false };
        $('shelf-meta').textContent = shelfMounted ? 'NAS online' : 'NAS offline';
        renderJobBanner();
        if (activeJob.running) startJobPoll();
      } catch (_) {}
    }

    $('list').addEventListener('toggle', (e) => {
      const grp = e.target.closest('details.model-family-group');
      if (grp && grp.dataset.modelGroup && grp.isConnected) {
        if (suppressModelGroupToggle) return;
        if (grp.open) modelGroupsOpen.add(grp.dataset.modelGroup);
        else modelGroupsOpen.delete(grp.dataset.modelGroup);
        return;
      }
      if (suppressBenchHistoryToggle) return;
      const det = e.target.closest('details.bench-history');
      if (!det || !det.dataset.profile || !det.isConnected) return;
      if (det.open) {
        benchHistoryOpen.add(det.dataset.profile);
        loadBenchHistory(det, { force: !benchHistoryCache[det.dataset.profile] });
      } else {
        benchHistoryOpen.delete(det.dataset.profile);
      }
    }, true);

    $('list').addEventListener('click', (e) => {
      const expand = e.target.closest('[data-expand]');
      if (expand) {
        const id = expand.dataset.expand;
        const prevId = expandedId;
        const nextId = expandedId === id ? null : id;
        const model = all.find((m) => m.id === id);
        if (model) modelGroupsOpen.add(modelFamilyKey(model));
        expandedId = nextId;
        if (!patchExpandedRow(prevId, nextId)) applyFilters();
        return;
      }
      const vbtn = e.target.closest('[data-verify]');
      if (vbtn) { e.stopPropagation(); setSparkVerify(vbtn.dataset.path, vbtn.dataset.verify, vbtn); return; }
      const qbtn = e.target.closest('[data-action="queue-removal"]');
      if (qbtn && !qbtn.disabled) { e.stopPropagation(); setRemovalQueue(qbtn.dataset.path, qbtn.dataset.pending === '1', qbtn); return; }
      const scaffoldBtn = e.target.closest('[data-action="recipe-scaffold"]');
      if (scaffoldBtn && !scaffoldBtn.disabled) {
        e.stopPropagation();
        recipeApi(
          '/api/inference/recipes/scaffold',
          { inventory_path: scaffoldBtn.dataset.path, auto: true },
          scaffoldBtn
        );
        return;
      }
      const testBtn = e.target.closest('[data-action="recipe-testing"]');
      if (testBtn && !testBtn.disabled) {
        e.stopPropagation();
        recipeApi('/api/inference/recipes/testing', { profile: testBtn.dataset.profile }, testBtn);
        return;
      }
      const promoteBtn = e.target.closest('[data-action="recipe-promote"]');
      if (promoteBtn && !promoteBtn.disabled) {
        e.stopPropagation();
        if (!confirm('Mark recipe works “' + promoteBtn.dataset.profile + '” as works?')) return;
        recipeApi('/api/inference/recipes/promote', { profile: promoteBtn.dataset.profile }, promoteBtn);
        return;
      }
      const discardBtn = e.target.closest('[data-action="recipe-discard"]');
      if (discardBtn && !discardBtn.disabled) {
        e.stopPropagation();
        if (!confirm('Discard draft recipe “' + discardBtn.dataset.profile + '”?')) return;
        recipeApi('/api/inference/recipes/discard', { profile: discardBtn.dataset.profile }, discardBtn);
        return;
      }
      const sbtn = e.target.closest('[data-action="start-profile"]');
      if (sbtn && !sbtn.disabled) {
        e.stopPropagation();
        startProfile(sbtn.dataset.profile, sbtn.dataset.tier, sbtn);
        return;
      }
      const noteBtn = e.target.closest('[data-action="bench-note-save"]');
      if (noteBtn && !noteBtn.disabled) {
        e.stopPropagation();
        const row = noteBtn.closest('td');
        const input = row ? row.querySelector('.bench-note-input') : null;
        const note = input ? input.value.trim() : '';
        saveBenchNote(noteBtn.dataset.profile, noteBtn.dataset.runId, note, noteBtn);
        return;
      }
      const btn = e.target.closest('[data-action]');
      if (!btn || btn.disabled) return;
      e.stopPropagation();
      const extra = (btn.dataset.action === 'remove-local' && (!btn.dataset.shelf || btn.dataset.shelf === '—')) ? { force: true } : {};
      modelAction(btn.dataset.action, btn.dataset.path, btn, extra);
    });

    let filterDebounce = null;
    function scheduleApplyFilters() {
      clearTimeout(filterDebounce);
      filterDebounce = setTimeout(() => applyFilters(), 120);
    }
    ['q'].forEach(id => {
      $(id).addEventListener('input', scheduleApplyFilters);
      $(id).addEventListener('change', applyFilters);
    });
    ['lab','status','sort','hf-task'].forEach(id => {
      $(id).addEventListener('input', applyFilters);
      $(id).addEventListener('change', applyFilters);
    });

    $('filter-chips').addEventListener('click', (e) => {
      const groupChip = e.target.closest('[data-group]');
      if (groupChip) {
        setGroupByFamily(groupChip.dataset.group === 'family');
        return;
      }
      const sparkChip = e.target.closest('[data-spark]');
      if (sparkChip) toggleSparkFilter(sparkChip.dataset.spark);
    });

    $('tag-picker-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if ($('tag-picker-menu').hidden) openTagPicker();
      else closeTagPicker();
    });
    $('tag-picker-clear').addEventListener('click', () => setTagFilter([]));
    $('tag-picker-done').addEventListener('click', () => closeTagPicker());
    $('tag-picker-search').addEventListener('input', (e) => renderTagPickerList(collectCatalogTags(all), e.target.value));
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.tag-picker')) closeTagPicker();
    });
    function loadData(preserve) {
      return fetch('models.json?' + Date.now(), { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          all = data.models || [];
          shelfMounted = !!data.shelf_mounted;
          window.__generated = data.generated_at;
          if (highlightPath) {
            const hit = all.find((m) => m.rel_path === highlightPath || m.id === highlightPath);
            if (hit) {
              expandedId = hit.id;
              modelGroupsOpen.add(modelFamilyKey(hit));
            }
          }
          populateFilters(all, preserve);
          applyFilters();
          refreshShelfStatus();
          refreshInferenceStatus();
        });
    }

    highlightPath = new URLSearchParams(location.search).get('highlight');

    loadData(false).catch(err => {
      $('summary').textContent = 'Failed to load models.json';
      $('list').innerHTML = `<div class="empty">${esc(String(err))}</div>`;
    });
    pollTimer = setInterval(() => loadData(true).catch(() => {}), REFRESH_MS);
    infPollTimer = setInterval(() => refreshInferenceStatus(), INF_POLL_MS);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        loadData(true).catch(() => {});
        refreshInferenceStatus();
      }
    });
  </script>
</body>
</html>
