# Merged into /opt/hermes/data/spark-bot/data/config.yaml at deploy time.

model:
  provider: xai-oauth
  default: grok-4-fast-reasoning

fallback_providers:
  - provider: zai
    model: glm-5-turbo
  - provider: openrouter
    model: deepseek/deepseek-v4-flash

terminal:
  backend: ssh
  cwd: /opt/spark
  ssh_host: host.docker.internal
  ssh_user: YOUR_USERNAME
  ssh_port: 22
  ssh_key: /opt/data/home/.ssh/spark-bot-terminal
  timeout: 180
  lifetime_seconds: 600

memory:
  enabled: true

skills:
  auto_save: true

display:
  personality: default
  compact: true
  show_reasoning: false

dashboard:
  basic_auth:
    username: YOUR_USERNAME
    # Generate with: python3 -c "import hashlib, os, base64; s=os.urandom(16); print('scrypt$16384$8$1$'+base64.b64encode(s).decode()+'$'+base64.b64encode(hashlib.scrypt(b'YOUR_PASSWORD',salt=s,n=16384,r=8,p=1)).decode())"
    password_hash: ~
